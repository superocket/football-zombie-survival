    z.x+=z.vx+z.knockX; z.y+=z.vy+z.knockY;

    z.x=Math.max(PITCH.x+z.w/2, Math.min(PITCH.x+PITCH.w-z.w/2, z.x));
    z.y=Math.max(PITCH.y+z.h/2, Math.min(PITCH.y+PITCH.h-z.h/2, z.y));
    z.animFrame=Math.floor(frameCount/(10))%2;

    // Growl (on-screen only)
    if(frameCount>=z.nextGrowl){
      const scx=sx(z.x),scy=sy(z.y);
      const onScreen=scx>0&&scx<VW&&scy>0&&scy<VH;
      if(onScreen){
        if(z.id==='fast'){
          // Short running grunt every ~60 frames (1s)
          z.nextGrowl=frameCount+55+Math.floor(Math.random()*15);
          SFX.runGrowl();
        } else {
          // Normal random growl
          z.nextGrowl=frameCount+Math.floor(Math.random()*250+90);
          SFX.growl();
        }
      } else {
        z.nextGrowl=frameCount+60;
      }
    }

    // Attack player
    const zContactR = z.id==='giant' ? z.w/2 : z.w/2;
    if(d<zContactR+player.w/2+3){
      if(megaDash.active) continue; // invincible during mega dash
      if(samurai.active) continue;  // invincible during samurai (sword kills on touch)
      if(invincibleMode) continue;  // invincible mode: freeze HP
      const dmg = z.id==='big'?0.3:z.id==='giant'?0.5:0.22;
      player.hp -= dmg;
      if(frameCount%20===0){
        player.hitFlash=18;
        player.stunned = z.id==='fast' ? 20 : (z.id==='giant' || z.id==='big') ? 30 : 30;
        const kForce = z.id==='giant'?11:z.id==='big'?7:5.5;
        player.knockX = (player.x-z.x)/d * kForce;
        player.knockY = (player.y-z.y)/d * kForce;
        player.hitDirX = (player.x-z.x)/d;
        player.hitDirY = (player.y-z.y)/d;
        SFX.playerScream();
        screenBlast(14);
      }
    }
  }

  // STEP 2: Zombie-zombie collisions
  // Only check pairs within a reasonable radius to keep perf good
  for(let i=0;i<aliveZ.length;i++){
    const a = aliveZ[i];
    if(a.dead) continue;
    for(let j=i+1;j<aliveZ.length;j++){
      const b = aliveZ[j];
      if(b.dead) continue;

      const dx = b.x-a.x, dy = b.y-a.y;
      const dist = Math.sqrt(dx*dx+dy*dy)||0.01;
      const minDist = (a.w+b.w)*0.5 + 1; // combined half-widths + 1px gap

      if(dist < minDist){
        const nx = dx/dist, ny = dy/dist;
        const overlap = minDist - dist;

        // Check if either zombie is being knocked back hard (ball hit)
        const aKnock = Math.sqrt(a.knockX*a.knockX+a.knockY*a.knockY);
        const bKnock = Math.sqrt(b.knockX*b.knockX+b.knockY*b.knockY);

        if(aKnock > 2.0){
          // A is flying — chain push B strongly
          const chainForce = Math.min(aKnock * 0.65, 7);
          b.knockX += (a.knockX/aKnock) * chainForce;
          b.knockY += (a.knockY/aKnock) * chainForce;
          b.hitFlash = 6;
          // A loses some momentum (energy transfer)
          a.knockX *= 0.75; a.knockY *= 0.75;
        } else if(bKnock > 2.0){
          // B is flying — chain push A strongly
          const chainForce = Math.min(bKnock * 0.65, 7);
          a.knockX += (b.knockX/bKnock) * chainForce * -1;
          a.knockY += (b.knockY/bKnock) * chainForce * -1;
          a.hitFlash = 6;
          b.knockX *= 0.75; b.knockY *= 0.75;
        } else {
          // Normal walking proximity — soft gentle separation only
          // Use a small fraction so zombies can still crowd tightly
          const sep = overlap * 0.18;
          a.x -= nx * sep; a.y -= ny * sep;
          b.x += nx * sep; b.y += ny * sep;
        }
      }
    }
  }

  // Fast zombie sfx when many on screen
  const fastOnScreen = zombies.filter(z=>!z.dead&&(z.id==='fast')&&sx(z.x)>0&&sx(z.x)<VW).length;
  if(fastOnScreen>0 && frameCount%60===0) SFX.fastZombie();

  zombies = zombies.filter(z=>!z.dead||z.deadAnim>0);

  // ── Wave progression (wave = kill milestone) ──
  const newWave = 1 + Math.floor(totalKills/20);
  if(newWave > wave){
    wave = newWave;
    waveAnnounce = 160;
    waveBreakTimer = 120; // 2s spawn freeze
    SFX.waveUp();
    player.hp = Math.min(player.maxHp, player.hp+10);

    // Every 5th wave: purge ALL zombies with explosions, keep speed
    if(wave % 5 === 0){
      // Capture speed phase before purge — persists for next wave
      zombieSpeedMult = totalKills>=180 ? 2.0
                      : totalKills>=100 ? 1.70
                      : totalKills>=50  ? 1.45
                      : totalKills>=20  ? 1.20
                      : 1.0;
      // Explode all alive zombies
      for(const z of zombies){
        if(z.dead) continue;
        if(z.id==='giant'){
          const a=Math.random()*Math.PI*2;
          damageGiant(z, Math.cos(a), Math.sin(a));
        } else {
          z.dead = true; z.deadAnim = 38;
          score += z.pts; totalKills++;
          if(killsByType[z.id]!==undefined) killsByType[z.id]++;
          const a = Math.random()*Math.PI*2;
          z.knockX = Math.cos(a)*12; z.knockY = Math.sin(a)*12;
          z.flyingCorpse = true;
          goreExplosion(z.x, z.y, Math.cos(a), Math.sin(a), z.body);
          scorePopup(z.x, z.y, z.pts);
        }
      }
      SFX.bombExplode(); screenBlast(22);
      // Flash message handled by waveAnnounce
    }
  }

  // ── Particles ──
  particles.forEach(p=>{
    if(p.type==='puddle'){
      p.life--;
      return;
    }
    // ── Giant head: bounces then shatters ──
    if(p.type==='giantHead'){
      if(!p.exploded){
        p.vy += 0.38; // gravity
        p.x  += p.vx;
        p.y  += p.vy;
        p.rot = (p.rot||0) + (p.rotV||0);
        p.vx *= 0.97;
        if(p.y >= p.groundY){
          p.y = p.groundY;
          p.bounces = (p.bounces||0) + 1;
          if(p.bounces >= p.maxBounces){
            // Head shatters — spawn gore chunks
            p.exploded = true;
            SFX.explode();
            const headColors=[p.skin||'#9e9e9e','#111','#ff1744','#eee','#c62828'];
            for(let i=0;i<22;i++){
              const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*5;
              particles.push({
                x:p.x+(Math.random()-0.5)*14, y:p.y+(Math.random()-0.5)*8,
                vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
                life:480, maxLife:480,
                color:headColors[Math.floor(Math.random()*headColors.length)],
                sz:3+Math.random()*6, type:'chunk', gravity:0.18,
                bounceCount:0, landed:false,
                groundY:p.groundY+4+Math.random()*10,
                rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.35
              });
            }
            // Blood burst
            blood(p.x, p.y, 18);
            p.life = 0; // remove head particle
          } else {
            p.vy = -p.vy * (0.45 - p.bounces*0.1);
            p.vx *= 0.55;
            p.rotV = (p.rotV||0) * 0.6;
            SFX.chunkLand();
          }
        }
      }
      p.life--;
      return;
    }
    if(p.type==='chunk'||p.type==='dirt'||p.type==='iceChunk'){
      if(p.landed){
        p.rotV*=0.85;
        if(p.rot!=null) p.rot+=p.rotV||0;
        p.life--;
        return;
      }
      p.vy+=p.gravity||0.18;
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.92;
      if(p.rot!=null) p.rot+=p.rotV||0;
      if(p.y >= (p.groundY||p.y+1) && p.bounceCount<2){
        p.y = p.groundY||p.y;
        p.vy = -p.vy * (0.35 - p.bounceCount*0.12);
        p.vx *= 0.6;
        p.rotV *= 0.5;
        p.bounceCount++;
        if(p.bounceCount===1 && p.type==='chunk') SFX.chunkLand();
      } else if(p.y >= (p.groundY||p.y+1)){
        p.y = p.groundY||p.y;
        p.vx=0; p.vy=0; p.landed=true;
      }
      p.life--;
      return;
    }
    // Default: blood splatter etc
    p.x+=p.vx; p.y+=p.vy;
    if(p.gravity) p.vy+=p.gravity;
    p.vx*=0.87; p.vy*=0.87;
    if(p.rot!=null) p.rot+=p.rotV||0;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  updateCamera();
  updateBiome();

  // ── Boss Serpent Squelette — spawn au désert (biome 1) et au cimetière (biome 3) ──
  if((biome===1||biome===3) && !snake.active && !snake.dead && !snake.everSpawned) initSnakeBoss();
  updateSnakeBoss();
  updateSnakeFireballs();

  // ── Obstacle collisions (player + zombies, NOT balls) ──
  if(biomeObstacles.length>0){
    checkObstacleCollision(player, player.w/2, player.h/2);
    for(const z of zombies){
      if(!z.dead && z.emerging===0) checkObstacleCollision(z, z.w/2, z.h/2);
    }
  }

  // ── One Up score milestone check ──
  while(score >= oneUpScoreThreshold){
    oneUpCount++;
    oneUpScoreThreshold += 10000;
    oneUpAnim = 120; // show earn animation for 2s
    sfxOneUpEarn();
    cam.shake=6;
    // Visual sparkle burst
    for(let i=0;i<24;i++){
      const a=(i/24)*Math.PI*2;
      particles.push({x:player.x,y:player.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,
        life:40,maxLife:40,color:i%2===0?'#e8ff00':'#ffffff',sz:4+Math.random()*4,type:'star'});
    }
  }
  if(oneUpAnim>0) oneUpAnim--;

  // ── Update One Up FX ──
  updateOneUpFX();

  if(player.hp<=0){
    if(oneUpCount>0 && oneUpFX.phase===0){
      // Trigger 1UP instead of game over
      player.hp=0;
      triggerOneUp();
    } else if(oneUpFX.phase===0){
      player.hp=0; gameOver=true;
    }
  }
  waveAnnounce--;
  // Refresh current target every frame for arrow display
  nearestVisible();
}

// ══════════════════════════════════════
// DRAW
// ══════════════════════════════════════
function pr(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),w,h); }

function drawPitch(){
  const bc = getCurrentBiomeColors();
  const stripes=22, sw=PITCH.w/stripes;
  const pitchScreenH = Math.round(PITCH.h * ZOOM); // zoomed height
  for(let i=0;i<stripes;i++){
    const bx=sx(PITCH.x+i*sw);
    const bw=Math.ceil(sw*ZOOM)+2;
    if(bx>VW||bx+bw<0)continue;
    ctx.fillStyle=i%2===0?bc.g1:bc.g2;
    ctx.fillRect(Math.round(bx), Math.round(sy(PITCH.y)), bw, pitchScreenH);
  }
  ctx.strokeStyle=bc.line; ctx.lineWidth=2;
  const px=x=>sx(x), py=y=>sy(y);
  const pw=w=>Math.round(w*ZOOM), ph=h=>Math.round(h*ZOOM);

  // Pitch dimensions
  const cx  = PITCH.x+PITCH.w/2;
  const midY= PITCH.y+PITCH.h/2;

  // Goal width = 1/4 of pitch width, centered
  const goalW = Math.round(PITCH.w*0.28);
  const goalX1 = cx - goalW/2;
  const goalX2 = cx + goalW/2;

  // ── Outer border — draw as 4 separate lines so we can open goal mouths ──
  // Left side (full height)
  ctx.beginPath();ctx.moveTo(px(PITCH.x),py(PITCH.y));ctx.lineTo(px(PITCH.x),py(PITCH.y+PITCH.h));ctx.stroke();
  // Right side (full height)
  ctx.beginPath();ctx.moveTo(px(PITCH.x+PITCH.w),py(PITCH.y));ctx.lineTo(px(PITCH.x+PITCH.w),py(PITCH.y+PITCH.h));ctx.stroke();
  // Top: left segment + right segment (gap = goal mouth)
  ctx.beginPath();ctx.moveTo(px(PITCH.x),py(PITCH.y));ctx.lineTo(px(goalX1),py(PITCH.y));ctx.stroke();
  ctx.beginPath();ctx.moveTo(px(goalX2),py(PITCH.y));ctx.lineTo(px(PITCH.x+PITCH.w),py(PITCH.y));ctx.stroke();
  // Bottom: same
  ctx.beginPath();ctx.moveTo(px(PITCH.x),py(PITCH.y+PITCH.h));ctx.lineTo(px(goalX1),py(PITCH.y+PITCH.h));ctx.stroke();
  ctx.beginPath();ctx.moveTo(px(goalX2),py(PITCH.y+PITCH.h));ctx.lineTo(px(PITCH.x+PITCH.w),py(PITCH.y+PITCH.h));ctx.stroke();

  // ── Goal posts ── (small vertical lines outside pitch at goal mouth)
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
  const postH = ph(30);
  // Top goal
  ctx.strokeRect(px(goalX1)-2, py(PITCH.y)-postH, 3, postH);
  ctx.strokeRect(px(goalX2)-1, py(PITCH.y)-postH, 3, postH);
  ctx.beginPath();ctx.moveTo(px(goalX1)-1,py(PITCH.y)-postH);ctx.lineTo(px(goalX2)+1,py(PITCH.y)-postH);ctx.stroke();
  // Bottom goal
  ctx.strokeRect(px(goalX1)-2, py(PITCH.y+PITCH.h), 3, postH);
  ctx.strokeRect(px(goalX2)-1, py(PITCH.y+PITCH.h), 3, postH);
  ctx.beginPath();ctx.moveTo(px(goalX1)-1,py(PITCH.y+PITCH.h)+postH);ctx.lineTo(px(goalX2)+1,py(PITCH.y+PITCH.h)+postH);ctx.stroke();

  ctx.strokeStyle=bc.line; ctx.lineWidth=2;

  // ── Halfway line ──
  ctx.beginPath();ctx.moveTo(px(PITCH.x),py(midY));ctx.lineTo(px(PITCH.x+PITCH.w),py(midY));ctx.stroke();

  // ── Center circle — scaled to pitch width ──
  const circleR = PITCH.w * 0.12;
  ctx.beginPath();ctx.arc(px(cx),py(midY),circleR*ZOOM,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=bc.line;ctx.beginPath();ctx.arc(px(cx),py(midY),4*ZOOM,0,Math.PI*2);ctx.fill();

  // ── Penalty areas (proportional to pitch) ──
  const paW=Math.round(PITCH.w*0.55), paH=Math.round(PITCH.h*0.12);
  const gaH=Math.round(PITCH.h*0.05);
  ctx.strokeRect(px(cx-paW/2), py(PITCH.y), pw(paW), ph(paH));
  ctx.strokeRect(px(cx-goalW/2), py(PITCH.y), pw(goalW), ph(gaH));
  ctx.strokeRect(px(cx-paW/2), py(PITCH.y+PITCH.h-paH), pw(paW), ph(paH));
  ctx.strokeRect(px(cx-goalW/2), py(PITCH.y+PITCH.h-gaH), pw(goalW), ph(gaH));

  // ── Penalty spots ──
  const penDist = Math.round(PITCH.h*0.1);
  ctx.fillStyle=bc.line;
  ctx.beginPath();ctx.arc(px(cx),py(PITCH.y+penDist),4*ZOOM,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px(cx),py(PITCH.y+PITCH.h-penDist),4*ZOOM,0,Math.PI*2);ctx.fill();

  // ── Corner arcs ──
  const cr=18*ZOOM;
  [[PITCH.x,PITCH.y,0,Math.PI/2],[PITCH.x+PITCH.w,PITCH.y,Math.PI/2,Math.PI],
   [PITCH.x+PITCH.w,PITCH.y+PITCH.h,Math.PI,1.5*Math.PI],[PITCH.x,PITCH.y+PITCH.h,1.5*Math.PI,Math.PI*2]
  ].forEach(([cx2,cy2,s2,e])=>{ctx.beginPath();ctx.arc(px(cx2),py(cy2),cr,s2,e);ctx.stroke();});
}

function drawStands(){
  const bc = getCurrentBiomeColors();
  ctx.fillStyle = bc.stand;
  ctx.fillRect(0,0,VW,VH);
}

function drawPlayer(){
  const x=Math.round(sx(player.x)), y=Math.round(sy(player.y));
  const d=player.dir, leg=player.animFrame;
  const fl=player.hitFlash>0&&frameCount%3<2;

  // ── Shadow ──
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(x,y+13,10,3,0,0,Math.PI*2);ctx.fill();

  // ── Leg animation offsets ──
  // leg 0=idle, 1=step fwd, 2=idle, 3=step back
  const legFwd  = (leg===1)?3:(leg===3)?-3:0;  // front leg Y offset
  const legBack = (leg===1)?-2:(leg===3)?2:0;   // back leg Y offset

  // ── KICK ANIMATION — big visible leg swing ──
  if(player.kickAnim>0){
    // Phase 0→1→0 over 35 frames: peak at frame 25 (hold), snap back fast
    const kt = player.kickAnim/18;
    // Slow rise, hold at peak, fast snap back
    let kickPhase;
    if(player.kickAnim > 6){
      kickPhase = Math.min(1, (18-player.kickAnim)/5); // rises over first 5f
    } else {
      kickPhase = player.kickAnim/6; // snaps back over last 6f
    }

    const d2 = player.dir;
    // Upper leg: raises forward from hip
    const hipX = x + d2*3;
    const hipY = y + 5;
    const thighLen = 12;
    // Thigh swings forward — angle goes from 90° (down) to 30° (forward+up)
    const thighAngle = (Math.PI/2) - kickPhase*(Math.PI*0.55);
    const kneeX = Math.round(hipX + Math.cos(thighAngle)*thighLen * d2);
    const kneeY = Math.round(hipY + Math.sin(thighAngle)*thighLen);

    // Draw thigh (upper leg) as thick line
    ctx.strokeStyle='#1976d2'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(kneeX, kneeY); ctx.stroke();

    // Shin swings even more forward at peak
    const shinLen = 11;
    const shinAngle = thighAngle - kickPhase*(Math.PI*0.45);
    const footX = Math.round(kneeX + Math.cos(shinAngle)*shinLen * d2);
    const footY = Math.round(kneeY + Math.sin(shinAngle)*shinLen);

    ctx.strokeStyle='#e8b89a'; ctx.lineWidth=3; // skin colour for shin
    ctx.beginPath(); ctx.moveTo(kneeX, kneeY); ctx.lineTo(footX, footY); ctx.stroke();

    // Shoe — big visible block at foot tip
    ctx.fillStyle='#111';
    ctx.fillRect(footX - 1, footY - 1, 5, 3);
    // White stripe on shoe
    ctx.fillStyle='#fff';
    ctx.fillRect(footX + (d2>0?1:-3), footY - 1, 2, 1);
  }

  // ── SHORTS (white) ──
  pr(x-5, y+2, 10, 6, fl?'#ffaaaa':'#e0e0e0');
  // shorts stripe
  pr(x-5, y+2, 10, 1, '#bdbdbd');

  // ── LEGS (skin) ──
  // Back leg
  pr(x-3, y+7+legBack, 4, 8, '#e8b89a');
  // Front leg
  pr(x-1, y+7+legFwd,  4, 8, '#f0c8a8');

  // ── SOCKS (blue) + SHOES (black) ──
  pr(x-4, y+13+legBack, 4, 3, '#1565c0');
  pr(x,   y+13+legFwd,  4, 3, '#1565c0');
  pr(x-5, y+15+legBack, 5, 2, '#111');  // shoe back
  pr(x-1, y+15+legFwd,  5, 2, '#111');  // shoe front

  // ── JERSEY (blue) ──
  const jerseyC = fl?'#ff5555':'#1976d2';
  pr(x-6, y-5, 12, 8, jerseyC);
  // jersey collar
  pr(x-2, y-5, 4, 2, '#ffffff');
  // jersey number "9"
  ctx.fillStyle=fl?'#ffaaaa':'#ffffff';
  ctx.font='bold 5px Courier New'; ctx.textAlign='center';
  ctx.fillText('9', x, y-1);

  // ── ARMS ──
  const armC = fl?'#ff5555':'#1976d2';
  // back arm
  pr(x-9, y-4+legBack, 3, 7, armC);
  pr(x-9, y+2+legBack, 3, 2, '#e8b89a'); // forearm skin
  // front arm
  pr(x+6, y-4+legFwd,  3, 7, armC);
  pr(x+6, y+2+legFwd,  3, 2, '#e8b89a');

  // ── HEAD (bigger — 14x14px pixel art) ──
  // Neck
  pr(x-2, y-8, 4, 4, '#e8b89a');
  // Head base
  pr(x-7, y-22, 14, 14, '#f5c99a');
  // Hair (dark brown, covers top 4px)
  pr(x-7, y-22, 14, 5, '#4e342e');
  // Ear left
  pr(x-8, y-17, 2, 3, '#e0a87a');
  // Ear right
  pr(x+6, y-17, 2, 3, '#e0a87a');
  // Eyes — 2 pixels wide each, with white + pupil
  const eyeY = y-16;
  const eyeLX = d>0 ? x-3 : x-4;  // eye positions shift with direction
  const eyeRX = d>0 ? x+1 : x;
  // whites
  pr(eyeLX, eyeY, 3, 3, '#ffffff');
  pr(eyeRX, eyeY, 3, 3, '#ffffff');
  // pupils (shift toward facing direction)
  pr(eyeLX+d, eyeY+1, 2, 2, '#1a1a1a');
  pr(eyeRX+d, eyeY+1, 2, 2, '#1a1a1a');
  // eyebrows
  pr(eyeLX, eyeY-2, 3, 1, '#4e342e');
  pr(eyeRX, eyeY-2, 3, 1, '#4e342e');
  // mouth (small smile)
  pr(x-2, y-10, 2, 1, '#c8805a');
  pr(x,   y-10, 2, 1, '#c8805a');

  // Stun indicator: yellow "ZAP" flicker + stun bar above player
  if(player.stunned>0){
    // Flicker stun stars
    if(frameCount%4<2){
      const starOff=[[0,-18],[6,-15],[-6,-15]];
      starOff.forEach(([ox,oy])=>{
        ctx.fillStyle='#ffeb3b';
        ctx.beginPath();ctx.arc(x+ox,y+oy,2.5,0,Math.PI*2);ctx.fill();
      });
    }
    // Stun bar
    const sbW=28, sbH=3, sbX=x-sbW/2, sbY=y-22;
    ctx.fillStyle='#222';ctx.fillRect(sbX,sbY,sbW,sbH);
    ctx.fillStyle='#ffeb3b';ctx.fillRect(sbX,sbY,sbW*(player.stunned/40),sbH);
    // "!" text
    ctx.fillStyle='#ffeb3b';ctx.font='bold 9px Courier New';ctx.textAlign='center';
    ctx.fillText('!',x,y-25);
  }

  // ── Cooldown reload ring around ball (at feet) ──
  if(!ball.active && player.stunned<=0){
    const maxCD2=60, minCD2=10, killB=Math.min(100,Math.floor(totalKills/5)*5);
    const cMax=Math.max(minCD2,maxCD2-killB);
    const progress = 1-(shootCooldown/cMax);
    if(progress<1){
      const ballBounceDraw = Math.abs(Math.sin(ball.bounce))*6;
    const bfx=x+player.dir*8, bfy=y+player.h/2-ball.r-ballBounceDraw;
      ctx.strokeStyle='rgba(232,255,0,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bfx,bfy,ball.r+3,-Math.PI/2,-Math.PI/2+progress*Math.PI*2);ctx.stroke();
    }
  }
}

function drawBall(){
  const ballArc = ball.active ? Math.round(ball.z) : 0; // height offset (px up)
  const bx = Math.round(sx(ball.x));
  const by = Math.round(sy(ball.y)) - ballArc; // ball drawn higher when arcing

  // Shadow on ground (stays at ground level, shrinks+fades as ball rises)
  const shadowScale = Math.max(0.2, 1 - ballArc/30);
  const shadowAlpha = 0.35 * shadowScale;
  ctx.fillStyle='rgba(0,0,0,'+shadowAlpha+')';
  ctx.beginPath();
  ctx.ellipse(bx, by+ballArc+ball.r, ball.r*1.1*shadowScale, ball.r*0.4*shadowScale, 0,0,Math.PI*2);
  ctx.fill();

  // Motion trail
  if(ball.active){
    for(let i=1;i<=4;i++){
      ctx.fillStyle='rgba(255,255,255,'+(0.09-i*0.018)+')';
      ctx.beginPath();
      ctx.arc(bx-ball.vx*i*0.5, by-ball.vy*i*0.5, ball.r*(1-i*0.2), 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Ball itself
  ctx.save();ctx.translate(bx,by);ctx.rotate(ball.spin);
  if(fx.iceBall.active){
    // Icy blue-white ball
    ctx.shadowColor='#aaeeff'; ctx.shadowBlur=14;
    ctx.fillStyle='#ddf6ff';ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(100,200,255,0.7)';ctx.beginPath();ctx.arc(0,0,2.8,0,Math.PI*2);ctx.fill();
    [[0,-5],[4,3],[-4,3]].forEach(([a,b])=>{ctx.fillStyle='rgba(150,220,255,0.9)';ctx.beginPath();ctx.arc(a,b,1.8,0,Math.PI*2);ctx.fill();});
    // Crystal sparkle
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillRect(-1,-ball.r+2,2,3); ctx.fillRect(-ball.r+2,-1,3,2);
  } else {
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,0,2.8,0,Math.PI*2);ctx.fill();
    [[0,-5],[4,3],[-4,3]].forEach(([a,b])=>{ctx.fillStyle='#333';ctx.beginPath();ctx.arc(a,b,1.8,0,Math.PI*2);ctx.fill();});
  }
  ctx.restore();
}

function drawZombie(z){
  const x=Math.round(sx(z.x)), y=Math.round(sy(z.y));
  if(x<-55||x>VW+55||y<-65||y>VH+65)return;
  const hw=Math.round(z.w/2), hh=Math.round(z.h/2), sc=z.scale;
  const fl=z.hitFlash>0&&frameCount%2===0;

  // ── GIANT: dessiné directement en pixels écran, proportions × (ZOOM*4/14 * 14) ──
  // La hitbox monde est w:56,h:80 → en pixels écran: hw_px=56*ZOOM/2, hh_px=80*ZOOM/2
  // On dessine en coordonnées écran (x,y) = centre du zombie à l'écran
  if(z.id==='giant' && !z.dead && z.emerging===0){
    // Le zombie normal est dessiné en pixels fixes (hw=7, hh=10 pour w:14, h:20)
    // Le géant = exactement ×4 ces pixels fixes
    const G = 4; // facteur d'échelle visuel pur
    const ghw = 7*G;   // 28px — demi-largeur visuelle
    const ghh = 10*G;  // 40px — demi-hauteur visuelle
    const gd  = z.dir||1;

    // ── JUMP: offset vertical by arc (in screen pixels) ──
    const arcPx = z.jumpArc ? z.jumpArc * ZOOM : 0;
    // y already = sy(z.y), so shift up by arcPx
    const yd = y - arcPx; // draw at elevated position

    // ── CHARGE WARNING: pulsing ground target circle ──
    if(z.jumpPhase===1){
      const chargeProgress = 1 - (z.jumpTimer/50);
      const tx2=sx(z.jumpTargetX), ty2=sy(z.jumpTargetY);
      ctx.save();
      ctx.globalAlpha = 0.25 + chargeProgress*0.45;
      ctx.strokeStyle='#ff4400';
      ctx.lineWidth=3+chargeProgress*3;
      const crossR=30+chargeProgress*20;
      ctx.beginPath(); ctx.arc(tx2,ty2,crossR,0,Math.PI*2); ctx.stroke();
      // Cross hairs
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(tx2-crossR-8,ty2); ctx.lineTo(tx2+crossR+8,ty2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tx2,ty2-crossR-8); ctx.lineTo(tx2,ty2+crossR+8); ctx.stroke();
      ctx.globalAlpha=1; ctx.restore();
    }

    // ── AIRBORNE: ground shadow below (at z.y) ──
    if(z.jumpPhase===2 && arcPx>0){
      ctx.save();
      ctx.globalAlpha=0.35*(arcPx/(120*ZOOM));
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.ellipse(x, y+4, ghw*0.85*(1+arcPx/(120*ZOOM)*0.4), 5*G, 0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.restore();
    }

    const fl = z.hitFlash>0 && (z.hitFlash%4<2);
    const gskin  = fl ? '#ff6666' : (z.skin||'#9e9e9e');
    const gshirt = fl ? '#cc0000' : (z.shirt||'#c62828');
    const gpants = z.pants||'#1565c0';
    const gleg   = (z.animFrame===0 ? 3 : -3) * G;
    const ghOff  = 2*G*gd;

    // Shadow (on ground, not elevated)
    if(z.jumpPhase!==2){
      ctx.fillStyle='rgba(0,0,0,0.32)';
      ctx.beginPath();ctx.ellipse(x, yd+ghh+2*G, ghw*0.9, 3*G, 0,0,Math.PI*2);ctx.fill();
    }

    // Jambes — haut des jambes = yd + hh*0.05*G
    const glegTop = yd + Math.round(ghh*0.05);
    const glegH   = ghh - Math.round(ghh*0.05) + 2*G;
    ctx.fillStyle=gpants;
    ctx.fillRect(x - 4*G, glegTop - gleg, 5*G, glegH);
    ctx.fillRect(x + 1*G, glegTop + gleg, 5*G, glegH);
    // Jean highlight
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.fillRect(x - 3*G, yd + Math.round(ghh*0.1), 2*G, Math.round(ghh*0.6));
    // Chaussures
    ctx.fillStyle='#111';
    ctx.fillRect(x - 5*G, yd + ghh - gleg, 6*G, 3*G);
    ctx.fillRect(x,        yd + ghh + gleg, 6*G, 3*G);

    // Torse — descend de yd-ghh jusqu'à glegTop exactement
    const gtorsoTop = yd - ghh;
    const gtorsoH   = glegTop - gtorsoTop;
    ctx.fillStyle=gshirt;
    ctx.fillRect(x - ghw + ghOff, gtorsoTop, ghw*2, gtorsoH);
    // Déchirures chemise
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(x - ghw + ghOff + 2*G, gtorsoTop + 4*G, Math.round(3.5*G), 2*G);
    ctx.fillRect(x - ghw + ghOff + 3*G, gtorsoTop + 8*G, 2*G, G);
    // Bosse dorsale
    const gbumpX = gd>0 ? x - ghw + ghOff - G : x + Math.round(ghw*0.5) + ghOff;
    ctx.fillStyle=gshirt;
    ctx.fillRect(gbumpX, gtorsoTop - 4*G, Math.round(7*G), Math.round(4.5*G));

    // Cou
    const gneckH = 4*G;
    ctx.fillStyle=gskin;
    ctx.fillRect(x - 2*G + ghOff, gtorsoTop - gneckH, 4*G, gneckH);

    // Tête
    const gheadW = Math.round(14*G * 1.2);
    const gheadH = Math.round(14*G * 0.55);
    const gheadX = x - Math.round(gheadW/2) + ghOff;
    const gheadY = gtorsoTop - gneckH - gheadH - 2*G;
    ctx.fillStyle=gskin;
    ctx.fillRect(gheadX, gheadY, gheadW, gheadH);
    // Cheveux
    ctx.fillStyle='#2a2a2a';
    ctx.fillRect(gheadX+G,           gheadY-3*G, 3*G, 4*G);
    ctx.fillRect(gheadX+5*G,         gheadY-5*G, 3*G, 6*G);
    ctx.fillRect(gheadX+gheadW-7*G,  gheadY-4*G, 3*G, 5*G);
    ctx.fillRect(gheadX+gheadW-3*G,  gheadY-2*G, 2*G, 3*G);
    // Boulons Frankenstein
    ctx.fillStyle='#777';
    ctx.fillRect(gheadX-3*G, gheadY+Math.round(gheadH*0.55), 4*G, 5*G);
    ctx.fillRect(gheadX+gheadW-G, gheadY+Math.round(gheadH*0.55), 4*G, 5*G);
    ctx.fillStyle='#aaa';
    ctx.fillRect(gheadX-2*G, gheadY+Math.round(gheadH*0.55)+G, 2*G, 2*G);
    ctx.fillRect(gheadX+gheadW, gheadY+Math.round(gheadH*0.55)+G, 2*G, 2*G);
    // Cicatrice
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(gheadX+3*G, gheadY+6*G, gheadW-6*G, G);
    for(let si=0;si<3;si++) ctx.fillRect(gheadX+5*G+si*4*G, gheadY+4*G, G, 4*G);
    // Oreille
    const gearX = gd>0 ? gheadX+gheadW : gheadX-3*G;
    ctx.fillStyle=gskin;
    ctx.fillRect(gearX, gheadY+Math.round(gheadH*0.38), 3*G, 6*G);
    // Yeux rouges
    const geyeY  = gheadY + Math.round(gheadH*0.32);
    const geyeSz = Math.max(4*G, Math.round(gheadW*0.22));
    const geShift= gd>0?G:-G;
    const geye1X = gheadX + 2*G + (gd>0?G:0);
    const geye2X = gheadX + gheadW - geyeSz - 2*G + (gd>0?0:-G);
    ctx.fillStyle='#111';
    ctx.fillRect(geye1X-G, geyeY-G, geyeSz+2*G, geyeSz+2*G);
    ctx.fillRect(geye2X-G, geyeY-G, geyeSz+2*G, geyeSz+2*G);
    ctx.fillStyle='#fff';
    ctx.fillRect(geye1X, geyeY, geyeSz, geyeSz);
    ctx.fillRect(geye2X, geyeY, geyeSz, geyeSz);
    ctx.fillStyle='#ff1744';
    ctx.fillRect(geye1X+geShift, geyeY+G, geyeSz-2*G, geyeSz-2*G);
    ctx.fillRect(geye2X+geShift, geyeY+G, geyeSz-2*G, geyeSz-2*G);
    ctx.fillStyle='#000';
    ctx.fillRect(geye1X+G+geShift, geyeY+2*G, Math.max(G,geyeSz-4*G), Math.max(G,geyeSz-4*G));
    ctx.fillRect(geye2X+G+geShift, geyeY+2*G, Math.max(G,geyeSz-4*G), Math.max(G,geyeSz-4*G));
    // Bouche
    const gmouthY = gheadY + Math.round(gheadH*0.72);
    ctx.fillStyle='#111';
    ctx.fillRect(gheadX+3*G, gmouthY, gheadW-6*G, 4*G);
    ctx.fillStyle='#eee';
    ctx.fillRect(gheadX+4*G, gmouthY, 3*G, 2*G);
    ctx.fillRect(gheadX+gheadW-7*G, gmouthY, 3*G, 2*G);

    // Bras
    const aThick = Math.max(3, Math.round(3*G));
    const armLen = Math.round(14*G*0.65);
    const handSz = Math.max(3, Math.round(3*G));
    const asX    = gd>0 ? x+ghw+ghOff : x-ghw+ghOff;
    const aBaseY = gtorsoTop + Math.round(gtorsoH*0.25);
    const arm2Len= Math.round(armLen*0.65);
    const a2Y    = aBaseY + aThick + 2*G;
    const a2X    = gd>0 ? asX : asX-arm2Len;
    ctx.fillStyle=gskin;
    ctx.fillRect(a2X, a2Y, arm2Len, aThick);
    ctx.fillRect(gd>0?a2X+arm2Len:a2X-handSz, a2Y, handSz, handSz+G);
    ctx.fillRect(gd>0?asX:asX-armLen, aBaseY, armLen, aThick);
    ctx.fillRect(gd>0?asX+armLen:asX-armLen-handSz, aBaseY, handSz, handSz+G);

    // Barre de vie
    const ghpW = gheadW + 20*G, ghpH = 4*G;
    const ghpX = x - Math.round(ghpW/2), ghpY = gheadY - 10*G;
    ctx.fillStyle='#333'; ctx.fillRect(ghpX, ghpY, ghpW, ghpH);
    ctx.fillStyle = z.hp>=z.maxHp?'#66bb6a':(z.hp>4?'#ef5350':'#ff1744');
    ctx.fillRect(ghpX, ghpY, Math.round(ghpW*(z.hp/z.maxHp)), ghpH);
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(ghpX,ghpY,ghpW,ghpH);

    // Label
    ctx.fillStyle = fl?'#ff4444':(z.jumpPhase===2?'#ff8800':'#ff6600');
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(z.jumpPhase===1?'⚠️ GÉANT':z.jumpPhase===2?'💥 GÉANT':'👊 GÉANT', x, ghpY-4);

    return;
  }

  // ── EMERGING ANIMATION — 3 phases over 180 frames ──
  // Phase 1 (0-60f):   Ground cracks, hand shoots up with fingers open, then lowers back
  // Phase 2 (60-130f): Head rises from hole
  // Phase 3 (130-180f): Foot plants on ground, zombie stands and walks
  if(z.emerging>0){
    const ef = 180 - z.emerging; // elapsed: 0→180
    const sk = z.skin||'#9e9e9e';
    const eyeC = z.id==='fast'?'#ccff00':'#ff1744';
    const d2 = z.dir||1;

    // Dirt hole — always visible throughout animation
    ctx.fillStyle='rgba(38,20,10,0.92)';
    ctx.beginPath();ctx.ellipse(x, y+hh+2, hw*1.5, 8, 0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(93,64,55,0.6)';
    ctx.beginPath();ctx.ellipse(x, y+hh+2, hw*0.9, 4, 0,0,Math.PI*2);ctx.fill();

    // Ground crack lines (phase 1 only)
    if(ef < 60){
      const cp = ef/60;
      ctx.strokeStyle='rgba(60,35,15,'+(cp*0.8)+')';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,y+hh+2);ctx.lineTo(x-Math.round(cp*10),y+hh-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+hh+2);ctx.lineTo(x+Math.round(cp*8),y+hh-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+hh+2);ctx.lineTo(x-Math.round(cp*6),y+hh+5);ctx.stroke();
    }

    // ── PHASE 1 (0-60f): Hand rises then lowers back into hole ──
    if(ef < 65){
      // BRUSQUE rise (8f), HOLD at peak (15f), normal lower (37f)
      let p1;
      if(ef <= 8)       p1 = ef/8;              // 0→1 fast snap up
      else if(ef <= 23) p1 = 1.0;               // hold at peak
      else              p1 = 1-(ef-23)/37;      // 1→0 normal lower

      const rise = Math.round(p1 * 22); // max 22px above hole
      const hy = y+hh+2 - rise;
      const hx = x - 3;

      // Wrist / forearm
      pr(hx, hy, 6, Math.min(14, Math.round(p1*16)+2), sk);

      // Fingers spread wide when rising
      if(p1 > 0.25){
        const fp = Math.min(1,(p1-0.25)/0.75);
        const flen = Math.round(fp*9);
        ctx.fillStyle=sk;
        ctx.fillRect(hx-5, hy-flen,    2, flen+2); // pinky (far left)
        ctx.fillRect(hx-2, hy-flen-2,  2, flen+4); // ring
        ctx.fillRect(hx+1, hy-flen-4,  2, flen+6); // middle (tallest)
        ctx.fillRect(hx+4, hy-flen-2,  2, flen+4); // index
        ctx.fillRect(hx+7, hy-flen+1,  2, flen+1); // thumb (shorter, side)
        // Dark nails at tip
        ctx.fillStyle='#1a1a1a';
        ctx.fillRect(hx-5, hy-flen-1,   2, 2);
        ctx.fillRect(hx-2, hy-flen-3,   2, 2);
        ctx.fillRect(hx+1, hy-flen-5,   2, 2);
        ctx.fillRect(hx+4, hy-flen-3,   2, 2);
        ctx.fillRect(hx+7, hy-flen,     2, 2);
      }

      // Dirt debris burst — only during first 15 frames (hand breaking through)
      if(ef < 15 && ef%3===0){
        // We trigger these once; they are already in the particles array from spawnDirt
        // Add extra burst each frame for visual
        const burst = 2;
        for(let bi=0;bi<burst;bi++){
          const ang = Math.random()*Math.PI*2;
          const spd = 1.5+Math.random()*3;
          particles.push({x:z.x+(Math.random()-0.5)*8, y:z.y+(Math.random()-0.5)*4,
            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1.5,
            life:360, maxLife:360,
            color:Math.random()<0.5?'#6d4c41':'#8d6e63',
            sz:2+Math.random()*4, type:'dirt', gravity:0.14,
            bounceCount:0, landed:false,
            groundY:z.y+8+Math.random()*10,
            rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.25});
        }
      }
    }

    // ── PHASE 2 (60-130f): Head rises from hole ──
    if(ef >= 60){
      const p2 = Math.min(1,(ef-60)/70);
      const headW2 = Math.round(z.w*1.2);
      const headH2 = Math.round(z.h*0.5);
      const headTopY = y+hh+2 - Math.round(p2*(headH2 + hh*0.85));
      const hx2 = x - Math.round(headW2/2);
      // Clip above ground
      ctx.save();
      ctx.beginPath();ctx.rect(-999,-999,VW+1998,y+hh+6+999);ctx.clip();
      pr(hx2, headTopY, headW2, headH2, sk);
      // Hair tufts
      ctx.fillStyle='#2a2a2a';
      ctx.fillRect(hx2+1,headTopY-3,3,4);
      ctx.fillRect(hx2+5,headTopY-5,3,6);
      ctx.fillRect(hx2+headW2-7,headTopY-4,3,5);
      // Eyes appear at p2>0.5
      if(p2>0.5){
        const eyY=headTopY+Math.round(headH2*0.32);
        ctx.fillStyle='#111';ctx.fillRect(hx2+2,eyY-1,5,6);ctx.fillRect(hx2+headW2-7,eyY-1,5,6);
        pr(hx2+3,eyY,4,4,'#fff');pr(hx2+headW2-7,eyY,4,4,'#fff');
        ctx.fillStyle=eyeC;ctx.fillRect(hx2+4,eyY+1,2,2);ctx.fillRect(hx2+headW2-6,eyY+1,2,2);
        ctx.fillStyle='#000';ctx.fillRect(hx2+5,eyY+2,1,1);ctx.fillRect(hx2+headW2-5,eyY+2,1,1);
        const mY=headTopY+Math.round(headH2*0.72);
        ctx.fillStyle='#111';ctx.fillRect(hx2+3,mY,headW2-6,3);
        ctx.fillStyle='#eee';ctx.fillRect(hx2+4,mY,3,2);ctx.fillRect(hx2+headW2-7,mY,3,2);
      }
      // Neck bolts
      if(p2>0.75){
        pr(hx2-3,headTopY+Math.round(headH2*0.55),4,5,'#777');
        pr(hx2+headW2-1,headTopY+Math.round(headH2*0.55),4,5,'#777');
      }
      ctx.restore();

      // Body strip follows head up
      if(p2>0.65){
        const bp=(p2-0.65)/0.35;
        const bodyClipH=Math.round(z.h*bp*0.6);
        ctx.save();
        ctx.beginPath();ctx.rect(x-hw-5,y+hh+2-bodyClipH,hw*2+10,bodyClipH);ctx.clip();
        pr(x-hw+2,y-hh,z.w,Math.round(z.h*0.5),z.shirt||'#c62828');
        ctx.restore();
      }
    }

    // ── PHASE 3 (130-180f): Foot plants on ground ──
    if(ef >= 130){
      const p3=Math.min(1,(ef-130)/50);
      const footSide=-d2;
      const footX=x+footSide*10;
      // Foot arcs up then stamps down
      const footArcH=Math.round(Math.sin(p3*Math.PI)*16);
      const footTopY=y+hh+2-footArcH;
      ctx.fillStyle=z.pants||'#1565c0';
      ctx.fillRect(footX-3,footTopY-Math.round(p3*8),6,Math.round(p3*8)+2);
      ctx.fillStyle='#111';
      ctx.fillRect(footX-4,footTopY,9,4);
      // Dust when foot hits
      if(p3>0.88){
        const da=(p3-0.88)/0.12;
        ctx.fillStyle='rgba(130,90,50,'+(0.55*(1-da))+')';
        ctx.beginPath();ctx.ellipse(footX,y+hh+3,Math.round(da*14),3,0,0,Math.PI*2);ctx.fill();
      }
    }

    return; // skip normal zombie draw while emerging
  }

  if(z.dead){
    // Giant has its own death animation (giantDeathExplosion) — skip the red rectangle
    if(z.id==='giant') return;
    const deathScale = 1;
    if(!z.flyingCorpse){
      ctx.globalAlpha=Math.max(0,z.deadAnim/38);
      ctx.fillStyle=C.blood;
      ctx.save();
      ctx.translate(x,y);
      ctx.translate(-x,-y);
      ctx.fillRect(x-hw,y-hh,z.w,z.h);
      ctx.restore();
      ctx.globalAlpha=1;
    } else {
      // Flying corpse: tumbling body with blood
      const t=z.deadAnim/38;
      ctx.globalAlpha=Math.max(0,t);
      ctx.save();
      ctx.translate(x,y);
      // Rotate based on knock velocity direction
      const angle=Math.atan2(z.knockY,z.knockX)+(1-t)*Math.PI*3;
      ctx.rotate(angle);
      ctx.scale(deathScale,deathScale);
      ctx.fillStyle=z.body||'#4caf50';
      ctx.fillRect(-hw,-hh,z.w,z.h);
      ctx.fillStyle=C.blood;
      ctx.fillRect(-hw+1,-hh+1,Math.round(z.w*0.5),Math.round(z.h*0.4));
      ctx.restore();
      ctx.globalAlpha=1;
    }
    return;
  }

  // Sprinter blink
  // no blink for fast

  const d     = z.dir||1;
  const skin  = fl ? '#ff6666' : (z.skin||'#9e9e9e');
  const shirt = fl ? '#cc0000' : (z.shirt||'#c62828');
  const pants = z.pants||'#1565c0';
  const legAnim = z.animFrame===0 ? 3 : -3;

  // ── Shadow ──
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(x,y+hh+2,hw*0.9,3,0,0,Math.PI*2);ctx.fill();

  // ── LEGS / PANTS ──
  pr(x-4,   y+Math.round(hh*0.05)-legAnim, 5, hh+2, pants);
  pr(x+1,   y+Math.round(hh*0.05)+legAnim, 5, hh+2, pants);
  // Jean highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(x-3, y+Math.round(hh*0.1), 2, Math.round(hh*0.6));

  // ── SHOES ──
  pr(x-5, y+hh-legAnim, 6, 3, '#111');
  pr(x,   y+hh+legAnim, 6, 3, '#111');

  // ── TORSO (shirt) — hunched: body center shifted toward d ──
  const hOff = d*2; // hunch offset
  pr(x-hw+hOff, y-hh, z.w, Math.round(z.h*0.5), shirt);
  // Torn shirt details
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(x-hw+hOff+2, y-hh+4, Math.round(z.w*0.35), 2);
  ctx.fillRect(x-hw+hOff+3, y-hh+8, Math.round(z.w*0.2), 1);

  // ── HUNCHBACK BUMP ──
  const bumpX = d>0 ? x-hw+hOff-1 : x+hw/2+hOff;
  pr(bumpX, y-hh-4, Math.round(z.w*0.5), Math.round(z.h*0.18)+2, shirt);

  // ── NECK ──
  pr(x-2+hOff, y-hh-4, 4, 5, skin);

  // ── HEAD — Frankenstein: tall rectangle, flat top, hair tufts ──
  const headW = Math.round(z.w * 1.2);           // wider than body
  const headH = Math.round(z.h * 0.55);           // tall
  const headX = x - Math.round(headW/2) + hOff;
  const headY = y - hh - headH - 2;

  // Head base block
  pr(headX, headY, headW, headH, skin);

  // Hair tufts on top (dark spiky bits)
  ctx.fillStyle='#2a2a2a';
  ctx.fillRect(headX+1,       headY-3, 3, 4);
  ctx.fillRect(headX+5,       headY-5, 3, 6);
  ctx.fillRect(headX+headW-7, headY-4, 3, 5);
  ctx.fillRect(headX+headW-3, headY-2, 2, 3);

  // Flat top shading
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(headX, headY, headW, 2);

  // Neck bolts (Frankenstein) — square studs on each side
  pr(headX-3, headY+Math.round(headH*0.55), 4, 5, '#777');
  pr(headX+headW-1, headY+Math.round(headH*0.55), 4, 5, '#777');
  // Bolt highlight
  ctx.fillStyle='#aaa';
  ctx.fillRect(headX-2, headY+Math.round(headH*0.55)+1, 2, 2);
  ctx.fillRect(headX+headW, headY+Math.round(headH*0.55)+1, 2, 2);

  // Forehead scar stitches
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(headX+3, headY+6, headW-6, 1);
  for(let si=0;si<3;si++){
    ctx.fillRect(headX+5+si*4, headY+4, 1, 4);
  }

  // Ear on facing side only
  const earX = d>0 ? headX+headW : headX-3;
  pr(earX, headY+Math.round(headH*0.38), 3, 6, skin);

  // ── EYES — big square eyes, Frankenstein-style ──
  const eyeColor = z.id==='fast'?'#ccff00':'#ff1744';
  const eyeY = headY + Math.round(headH*0.32);
  const eyeSize = Math.max(4, Math.round(headW*0.22));
  // Eyes shift inward toward facing direction
  const eShift = d>0 ? 1 : -1;
  const eye1X = headX + 2 + (d>0?1:0);
  const eye2X = headX + headW - eyeSize - 2 + (d>0?0:-1);
  // Dark sockets
  ctx.fillStyle='#111';
  ctx.fillRect(eye1X-1, eyeY-1, eyeSize+2, eyeSize+2);
  ctx.fillRect(eye2X-1, eyeY-1, eyeSize+2, eyeSize+2);
  // White sclera
  pr(eye1X, eyeY, eyeSize, eyeSize, '#fff');
  pr(eye2X, eyeY, eyeSize, eyeSize, '#fff');
  // Coloured pupils (shifted toward facing dir)
  ctx.fillStyle=eyeColor;
  ctx.fillRect(eye1X+eShift, eyeY+1, eyeSize-2, eyeSize-2);
  ctx.fillRect(eye2X+eShift, eyeY+1, eyeSize-2, eyeSize-2);
  // Dark pupil center
  ctx.fillStyle='#000';
  ctx.fillRect(eye1X+1+eShift, eyeY+2, Math.max(1,eyeSize-4), Math.max(1,eyeSize-4));
  ctx.fillRect(eye2X+1+eShift, eyeY+2, Math.max(1,eyeSize-4), Math.max(1,eyeSize-4));

  // ── MOUTH — simple open rectangle ──
  const mouthY = headY + Math.round(headH*0.72);
  pr(headX+3, mouthY, headW-6, 4, '#111');
  // Two top teeth
  pr(headX+4, mouthY, 3, 2, '#eee');
  pr(headX+headW-7, mouthY, 3, 2, '#eee');

  // ── ARMS — mid-torso height, slightly longer, simple flat hands ──
  const aThick = Math.max(3, Math.round(3*sc));
  const armLen = Math.round(z.w * 0.65);   // a bit longer
  const handSz = Math.max(3, Math.round(3*sc)); // small flat square hand

  // Shoulder X: edge of torso
  const sX = d>0 ? x+hw+hOff : x-hw+hOff;

  // Arms at upper-mid torso — just below chest, clear of face
  const armBaseY = y - Math.round(hh*0.55); // upper torso height

  // Arm 2 (back/lower — always shorter)
  const arm2Len = Math.round(armLen * 0.65); // shorter than arm1
  const a2Y = armBaseY + aThick + 2;
  const a2X = d>0 ? sX : sX - arm2Len;
  pr(a2X, a2Y, arm2Len, aThick, skin);
  // Hand 2
  const h2X = d>0 ? a2X+arm2Len : a2X - handSz;
  pr(h2X, a2Y, handSz, handSz+1, skin);

  // Arm 1 (front/higher — longer)
  const a1Y = armBaseY;
  const a1X = d>0 ? sX : sX - armLen;
  pr(a1X, a1Y, armLen, aThick, skin);
  // Hand 1
  const h1X = d>0 ? a1X+armLen : a1X - handSz;
  pr(h1X, a1Y, handSz, handSz+1, skin);

  // ── Speed label ──
  if(z.id==='fast'){
    ctx.fillStyle='#ccff00';
    ctx.font='bold 8px Courier New';
    ctx.textAlign='center';
    ctx.fillText('!',x,headY-4);
  }

  // ── HP bar (multi-hp zombies) ──
  if(z.maxHp>1){
    const bw=z.w+10,bh=4,bx2=x-bw/2,by2=headY-10;
    pr(bx2,by2,bw,bh,'#333');
    pr(bx2,by2,bw*(z.hp/z.maxHp),bh,z.hp>=z.maxHp?'#66bb6a':'#ef5350');
  }

  ctx.globalAlpha=1;
}

function drawParticles(){
  // Draw puddles first (bottom layer), then blood, then chunks on top
  const order=['puddle','blood','star','chunk','dirt','giantHead',null];
  for(const t of order){
    for(const p of particles){
      if((t===null?(!p.type||p.text):(p.type!==t))) continue;
      const px2=Math.round(sx(p.x)), py2=Math.round(sy(p.y));
      if(px2<-20||px2>VW+20||py2<-20||py2>VH+20) continue;

      // ── Giant head rendering ──
      if(p.type==='giantHead'){
        if(p.exploded) continue;
        const alpha = Math.min(1, p.life/p.maxLife * 3);
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.translate(px2, py2);
        ctx.rotate(p.rot||0);
        const G=4, gd=p.dir||1;
        const gheadW=Math.round(14*G*1.2), gheadH=Math.round(14*G*0.55);
        const hx=-gheadW/2, hy=-gheadH/2;
        // Head body
        ctx.fillStyle=p.skin||'#9e9e9e';
        ctx.fillRect(hx,hy,gheadW,gheadH);
        // Hair
        ctx.fillStyle='#2a2a2a';
        ctx.fillRect(hx+G,hy-3*G,3*G,4*G);
        ctx.fillRect(hx+5*G,hy-5*G,3*G,6*G);
        ctx.fillRect(hx+gheadW-7*G,hy-4*G,3*G,5*G);
        // Bolts
        ctx.fillStyle='#777';
        ctx.fillRect(hx-3*G,hy+Math.round(gheadH*0.55),4*G,5*G);
        ctx.fillRect(hx+gheadW-G,hy+Math.round(gheadH*0.55),4*G,5*G);
        // Eyes (red, dead X)
        ctx.fillStyle='#ff1744';
        const eyeSz=Math.max(4*G,Math.round(gheadW*0.22));
        ctx.fillRect(hx+2*G,hy+Math.round(gheadH*0.32),eyeSz,eyeSz);
        ctx.fillRect(hx+gheadW-eyeSz-2*G,hy+Math.round(gheadH*0.32),eyeSz,eyeSz);
        ctx.fillStyle='#000';
        // X marks over eyes
        ctx.lineWidth=3*G/4; ctx.strokeStyle='#000';
        const e1x=px2+(hx+2*G+eyeSz/2-gheadW/2); // not used in rotated ctx
        // Draw X in rotated ctx
        ctx.beginPath();
        ctx.moveTo(hx+2*G,hy+Math.round(gheadH*0.32));
        ctx.lineTo(hx+2*G+eyeSz,hy+Math.round(gheadH*0.32)+eyeSz);
        ctx.moveTo(hx+2*G+eyeSz,hy+Math.round(gheadH*0.32));
        ctx.lineTo(hx+2*G,hy+Math.round(gheadH*0.32)+eyeSz);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(hx+gheadW-eyeSz-2*G,hy+Math.round(gheadH*0.32));
        ctx.lineTo(hx+gheadW-2*G,hy+Math.round(gheadH*0.32)+eyeSz);
        ctx.moveTo(hx+gheadW-2*G,hy+Math.round(gheadH*0.32));
        ctx.lineTo(hx+gheadW-eyeSz-2*G,hy+Math.round(gheadH*0.32)+eyeSz);
        ctx.stroke();
        // Mouth open (dead)
        ctx.fillStyle='#111';
        ctx.fillRect(hx+3*G,hy+Math.round(gheadH*0.72),gheadW-6*G,6*G);
        ctx.restore();
        continue;
      }
      // Solid 3s (180f), fade 8s (480f) — total 660f
      const fadeStart=480;
      let alpha;
      if(p.type==='puddle'||(p.type==='chunk'&&p.landed)||(p.type==='iceChunk'&&p.landed)){
        alpha = p.life > fadeStart ? 0.88 : (p.life/fadeStart)*0.88;
      } else {
        alpha = p.life/p.maxLife;
      }
      ctx.globalAlpha=Math.max(0,alpha);

      if(p.text){
        ctx.fillStyle=p.color; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
        ctx.fillText(p.text,px2,py2);
      } else if(p.type==='chunk'){
        // Chunks render as rotated squares (tumbling body pieces)
        ctx.save();
        ctx.translate(px2,py2);
        ctx.rotate(p.rot||0);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
        ctx.restore();
      } else if(p.type==='iceChunk'){
        // Frozen body chunks — use the ice draw function
        drawIceChunkParticle(p,px2,py2);
      } else if(p.type==='puddle'){
        // Puddles are ellipses on the ground
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.ellipse(px2,py2,p.sz,p.sz*0.5,0,0,Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillStyle=p.color;
        ctx.fillRect(px2-p.sz/2,py2-p.sz/2,p.sz,p.sz);
      }
      ctx.globalAlpha=1;
    }
  }
}

// ── Helper : pixel-art shotgun centré sur (cx,cy), scale s ──
function drawPixelShotgun(cx, cy, s){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  const gc='#cfd8dc', sc='#6d4c41', dc='#455a64';
  ctx.fillStyle=sc;
  ctx.fillRect(-11,-1,6,4);
  ctx.fillRect(-11,2,4,3);
  ctx.fillStyle=dc;
  ctx.fillRect(-5,-2,7,5);
  ctx.fillStyle='#ff7043';
  ctx.fillRect(-1,1,5,3);
  ctx.fillStyle=gc;
  ctx.fillRect(2,-1,10,3);
  ctx.fillStyle='#eceff1';
  ctx.fillRect(11,-1,2,3);
  ctx.fillStyle=dc;
  ctx.fillRect(-2,3,2,3);
  ctx.restore();
}

// ── Draw powerup squares ──
function drawPowerups(){
  const t=frameCount;
  for(const pu of powerups){
    const px2=Math.round(sx(pu.x)), py2=Math.round(sy(pu.y));
    if(px2<-50||px2>VW+50||py2<-50||py2>VH+50) continue;
    const blinkPhase = pu.life < 180;
    if(blinkPhase && Math.floor(t/7)%2===0) continue;
    const sz=22, half=sz/2;
    const glow=pu.def.glow, col=pu.def.color;
    ctx.save();
    const pulse=0.7+0.3*Math.sin(t*0.12);
    for(let layer=4;layer>0;layer--){
      ctx.globalAlpha=(0.07+layer*0.04)*pulse;
      ctx.fillStyle=glow;
      ctx.fillRect(px2-half-layer*3, py2-half-layer*3, sz+layer*6, sz+layer*6);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(0,0,0,0.82)';
    ctx.fillRect(px2-half-2,py2-half-2,sz+4,sz+4);
    ctx.strokeStyle=glow; ctx.lineWidth=2.5;
    ctx.shadowColor=glow; ctx.shadowBlur=12*pulse;
    ctx.strokeRect(px2-half,py2-half,sz,sz);
    ctx.shadowBlur=0;
    ctx.fillStyle=col;
    ctx.fillRect(px2-half,py2-half,sz,sz);
    ctx.font='16px Courier New'; ctx.textAlign='center';
    ctx.globalAlpha=1;
    if(pu.def.icon==='GUN'){
      drawPixelShotgun(px2, py2, 1);
    } else {
      ctx.fillText(pu.def.icon, px2, py2+6);
    }
    ctx.fillStyle='#ffffff'; ctx.font='bold 7px Courier New';
    ctx.fillText(pu.def.label, px2, py2+half+9);
    ctx.restore();
  }
}

// ── Draw thunderbolts — blue bolt top→ground, stops at impact, shockwave ──
function drawThunderbolts(){
  for(const tb of thunderbolts){
    const age=tb.maxLife-tb.life;            // 0→maxLife elapsed
    const totalLife=tb.maxLife;

    // Phase 1 (0→20f): bolt travels from top of screen down to ground
    const travelFrames=20;
    const impactFrames=totalLife-travelFrames; // 40f of impact glow

    const bx=Math.round(sx(tb.x));
    const byTop=-10; // just above screen top
    const byGround=Math.round(sy(tb.yEnd)); // ground impact point on screen

    ctx.save();

    if(age<=travelFrames){
      // Bolt tip progresses from top to ground
      const t=age/travelFrames;
      const byTip=Math.round(byTop+(byGround-byTop)*t);
      const fadeAlpha=Math.min(1,age/4); // quick fade in

      ctx.globalAlpha=fadeAlpha;
      // Draw bolt from top to current tip
      const segs=12;
      // Layer 1: wide outer glow
      ctx.shadowColor='#1565c0'; ctx.shadowBlur=28;
      ctx.strokeStyle='#0d47a1'; ctx.lineWidth=13; ctx.lineCap='round';
      _drawBoltPath(ctx,bx,byTop,bx,byTip,segs,20);
      // Layer 2: mid blue
      ctx.shadowColor='#42a5f5'; ctx.shadowBlur=16;
      ctx.strokeStyle='#1976d2'; ctx.lineWidth=6;
      _drawBoltPath(ctx,bx,byTop,bx,byTip,segs,14);
      // Layer 3: bright core
      ctx.shadowColor='#90caf9'; ctx.shadowBlur=8;
      ctx.strokeStyle='#e3f2fd'; ctx.lineWidth=2;
      _drawBoltPath(ctx,bx,byTop,bx,byTip,segs,6);
      // Tip flash
      ctx.fillStyle='#e3f2fd'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(bx,byTip,6*t+2,0,Math.PI*2); ctx.fill();

    } else {
      // Phase 2: full bolt visible + ground shockwave expanding
      const impactAge=age-travelFrames;
      const impactProg=impactAge/impactFrames; // 0→1
      const fadeAlpha=Math.max(0,1-impactProg);

      ctx.globalAlpha=fadeAlpha;
      // Full bolt (slightly jagged, stable)
      ctx.shadowColor='#1565c0'; ctx.shadowBlur=24;
      ctx.strokeStyle='#0d47a1'; ctx.lineWidth=10; ctx.lineCap='round';
      _drawBoltPath(ctx,bx,byTop,bx,byGround,12,16);
      ctx.shadowColor='#42a5f5'; ctx.shadowBlur=12;
      ctx.strokeStyle='#1976d2'; ctx.lineWidth=5;
      _drawBoltPath(ctx,bx,byTop,bx,byGround,12,10);
      ctx.shadowColor='#90caf9'; ctx.shadowBlur=6;
      ctx.strokeStyle='#e3f2fd'; ctx.lineWidth=2;
      _drawBoltPath(ctx,bx,byTop,bx,byGround,12,5);

      // Ground shockwave ring (expands outward)
      const ringR=impactProg*90*ZOOM*0.5; // expands to ~90 world units radius
      ctx.shadowColor='#42a5f5'; ctx.shadowBlur=20*(1-impactProg);
      ctx.strokeStyle='#1565c0'; ctx.lineWidth=4*(1-impactProg);
      ctx.globalAlpha=fadeAlpha*0.8;
      ctx.beginPath(); ctx.arc(bx,byGround,ringR,0,Math.PI*2); ctx.stroke();
      // Inner bright flash
      ctx.fillStyle='#e3f2fd'; ctx.shadowBlur=30*(1-impactProg);
      ctx.globalAlpha=fadeAlpha*(1-impactProg)*0.7;
      ctx.beginPath(); ctx.arc(bx,byGround,10*(1-impactProg),0,Math.PI*2); ctx.fill();

      // Electric ground arcs radiating outward
      ctx.globalAlpha=fadeAlpha*0.6*(1-impactProg);
      ctx.strokeStyle='#42a5f5'; ctx.lineWidth=1.5; ctx.shadowBlur=10;
      const arcCount=6;
      for(let i=0;i<arcCount;i++){
        const a=(i/arcCount)*Math.PI*2+impactProg*0.8;
        const len=(40+Math.random()*30)*impactProg*ZOOM*0.5;
        ctx.beginPath();
        ctx.moveTo(bx,byGround);
        ctx.lineTo(bx+Math.cos(a)*len, byGround+Math.sin(a)*len*0.4);
        ctx.stroke();
      }
    }

    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();
  }
}

// Helper: draw a jagged bolt path between two screen points
function _drawBoltPath(ctx,x1,y1,x2,y2,segs,jag){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  for(let i=1;i<=segs;i++){
    const t=i/segs;
    const py3=y1+(y2-y1)*t;
    const px3=x1+(x2-x1)*t+(i<segs?(Math.random()-0.5)*jag:0);
    ctx.lineTo(px3,py3);
  }
  ctx.stroke();
}

// ── Draw active effect gauges ──
function drawActiveFX(){
  const fxList=[];
  if(fx.fireBall.active)   fxList.push({icon:'🔥',color:'#ff6d00',timer:fx.fireBall.timer,max:fx.fireBall.max});
  if(fx.iceBall.active)    fxList.push({icon:'🧊',color:'#00cfff',timer:fx.iceBall.timer,max:fx.iceBall.max});

  if(extraBalls.length>0)  {} // +1 ball powerup: permanent, no gauge shown

  const barW=140, barH=16, gap=5;

  if(puNotif.timer > 0){
    puNotif.timer--;
    const t = puNotif.timer / puNotif.maxTimer; // 1→0
    // Apparition rapide, disparition douce

    // Position : juste au-dessus des barres FX
    const notifH = 52;
    const notifW = 200;
    const notifX = startX;
    const notifY = startY - notifH - 8;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Rectangle jaune principal
    ctx.fillStyle = '#e8ff00';
    ctx.shadowColor = puNotif.color;
    ctx.shadowBlur = 18;
    ctx.fillRect(notifX, notifY, notifW, notifH);

    // Bordure colorée en fonction du power-up
    ctx.strokeStyle = puNotif.color;
    ctx.lineWidth = 3;
    ctx.strokeRect(notifX, notifY, notifW, notifH);
    ctx.shadowBlur = 0;

    // Icône (grande, à gauche)
    ctx.fillStyle = '#000';
    if(puNotif.icon === 'GUN'){
      drawPixelShotgun(notifX + 26, notifY + 26, 1.7);
    } else {
      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(puNotif.icon, notifX + 8, notifY + 35);
    }

    // Nom du power-up (grand, gras, noir)
    ctx.font = 'bold 20px Courier New';
    ctx.fillStyle = '#000';
    ctx.textAlign = 'left';
    ctx.fillText(puNotif.label, notifX + 46, notifY + 20);

    // Sous-texte "POWER UP!"
    ctx.font = 'bold 11px Courier New';
    ctx.fillStyle = '#333';
    ctx.fillText('POWER UP !', notifX + 46, notifY + 38);

    ctx.restore();
  }

  if(!fxList.length) return;
  fxList.forEach((f,i)=>{
    const fy=startY+i*(barH+gap);
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(startX,fy,barW+32,barH);
    ctx.font='12px Courier New'; ctx.textAlign='left';
    ctx.fillText(f.icon, startX+2, fy+13);
    if(f.permanent){
      ctx.fillStyle=f.color; ctx.fillRect(startX+20,fy+3,barW,10);
      ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(startX+20,fy+3,barW,5);
    } else {
      ctx.fillStyle='#333'; ctx.fillRect(startX+20,fy+3,barW,10);
      const prog=f.timer/f.max;
      ctx.fillStyle=f.color; ctx.fillRect(startX+20,fy+3,barW*prog,10);
      ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(startX+20,fy+3,barW*prog,5);
    }
    if(f.extra){ ctx.fillStyle='#fff'; ctx.font='bold 8px Courier New'; ctx.textAlign='right';
      ctx.fillText(f.extra, startX+20+barW-2, fy+13); }
  });
}

// ── Draw fireball aura on ball ──
// ── Persistent fire particles on the ball (slow, large pixels) ──
let _ballFirePx=[];
function _initBallFire(){
  _ballFirePx=[];
  for(let i=0;i<10;i++){
    _ballFirePx.push({
      ox:(Math.random()-0.5)*18, oy:Math.random()*10+2,
      vx:(Math.random()-0.5)*0.15, vy:-(0.22+Math.random()*0.28),
      phase:Math.random()*Math.PI*2,
      life:Math.floor(Math.random()*60),
      maxLife:50+Math.floor(Math.random()*40),
      sz:5+Math.floor(Math.random()*5),
      col:Math.random()<0.55?'#ff6d00':Math.random()<0.6?'#ffeb3b':'#ff3d00',
      isSpark:Math.random()<0.2,
    });
  }
}

function drawBallFire(){
  if(!fx.fireBall.active) return;
  // Init on first call each activation
  if(_ballFirePx.length===0) _initBallFire();

  const bArc=ball.active?Math.round(ball.z):0;
  const bx=Math.round(sx(ball.x)), by=Math.round(sy(ball.y))-bArc;

  ctx.save();

  // Update + draw each fire pixel
  for(let i=_ballFirePx.length-1;i>=0;i--){
    const fp=_ballFirePx[i];
    fp.life--;
    if(fp.life<=0){
      // Recycle particle
      fp.ox=(Math.random()-0.5)*18; fp.oy=Math.random()*8+4;
      fp.vx=(Math.random()-0.5)*0.15; fp.vy=-(0.22+Math.random()*0.28);
      fp.phase=Math.random()*Math.PI*2;
      fp.life=50+Math.floor(Math.random()*40); fp.maxLife=fp.life;
      fp.sz=5+Math.floor(Math.random()*5);
      fp.col=Math.random()<0.55?'#ff6d00':Math.random()<0.6?'#ffeb3b':'#ff3d00';
      fp.isSpark=Math.random()<0.2;
      continue;
    }
    fp.phase+=0.045;
    fp.ox += fp.vx + Math.sin(fp.phase)*0.2;
    fp.oy -= fp.isSpark ? 0.6+Math.random()*0.3 : 0.28+Math.abs(Math.sin(fp.phase))*0.12;
    if(fp.isSpark) fp.ox+=(Math.random()-0.5)*0.7;

    const alpha=(fp.life/fp.maxLife)*0.9;
    const px2=Math.round(bx+fp.ox), py2=Math.round(by-fp.oy);

    // Glow layer (soft, large)
    ctx.globalAlpha=alpha*0.35;
    ctx.fillStyle=fp.col;
    ctx.fillRect(px2-fp.sz, py2-fp.sz, fp.sz*2+2, fp.sz*2+2);
    // Core pixel block
    ctx.globalAlpha=alpha;
    ctx.fillStyle=fp.isSpark?'#fff9c4':fp.col;
    const cs=fp.isSpark?2:fp.sz;
    ctx.fillRect(px2-Math.floor(cs/2), py2-Math.floor(cs/2), cs, cs);
  }
  ctx.globalAlpha=1;

  // Outer glow ring around ball
  const pulse=0.6+0.4*Math.sin(frameCount*0.18);
  ctx.shadowColor='#ff6d00'; ctx.shadowBlur=14*pulse;
  ctx.globalAlpha=0.45*pulse;
  ctx.strokeStyle='#ff9800'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(bx,by,ball.r+4,0,Math.PI*2); ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  ctx.restore();
}

// ── Draw extra balls (identical to main ball) ──

      [[0,-5],[4,3],[-4,3]].forEach(([a,b])=>{ctx.fillStyle='rgba(150,220,255,0.9)';ctx.beginPath();ctx.arc(a,b,1.8,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillRect(-1,-eb.r+2,2,3); ctx.fillRect(-eb.r+2,-1,3,2);
    } else {

      ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,0,2.8,0,Math.PI*2);ctx.fill();
      [[0,-5],[4,3],[-4,3]].forEach(([a,b])=>{ctx.fillStyle='#333';ctx.beginPath();ctx.arc(a,b,1.8,0,Math.PI*2);ctx.fill();});

// ── Draw fire trails — varied pixels shrinking over time, chaotic sparks ──
function drawFireTrails(){
  if(!fireTrails.length) return;
  ctx.save();
  for(const ft of fireTrails){
    const cx2=Math.round(sx(ft.x)), cy2=Math.round(sy(ft.y));
    if(cx2<-60||cx2>VW+60||cy2<-60||cy2>VH+60) continue;

    const ratio=ft.life/ft.maxLife; // 1=fresh → 0=dying

    // Base glow under the whole segment (fades with ratio)
    ctx.globalAlpha=ratio*0.22;
    ctx.fillStyle='#ff6d00';
    ctx.fillRect(cx2-14, cy2-20, 28, 22);
    ctx.globalAlpha=1;

    if(!ft.pixels) continue;

    for(const p of ft.pixels){
      // Each pixel born at life=120, dies at 0
      // Shrink: pixel size goes from full → 0 linearly with ratio
      const shrink = ratio; // same as ft.life/ft.maxLife
      const curSz = Math.max(1, Math.round(p.sz * shrink));

      // Screen offset (world-space offset scaled to screen)
      const psx = cx2 + Math.round(p.ox * ZOOM * 0.45);
      const psy = cy2 + Math.round(p.oy * ZOOM * 0.45);

      if(p.type==='block'){
        // Block alpha: full until 40% life, then fades
        const alpha = ratio > 0.4 ? 0.92 : (ratio/0.4)*0.92;
        // Glow layer
        ctx.globalAlpha=alpha*0.3;
        ctx.fillStyle=p.col;
        ctx.fillRect(psx-curSz-2, psy-curSz-2, curSz*2+4, curSz*2+4);
        // Core pixel
        ctx.globalAlpha=alpha;
        ctx.fillStyle=p.col;
        ctx.fillRect(psx-Math.floor(curSz/2), psy-Math.floor(curSz/2), curSz, curSz);

      } else { // spark
        // Sparks: smaller, rise upward, fade faster
        const alpha = ratio > 0.55 ? 0.95 : (ratio/0.55)*0.95;
        const spSz = Math.max(1, Math.round(p.sz * ratio));
        // Tiny glow
        ctx.globalAlpha=alpha*0.35;
        ctx.fillStyle=p.col;
        ctx.fillRect(psx-spSz-1, psy-spSz-1, spSz*2+2, spSz*2+2);
        // Bright spark core
        ctx.globalAlpha=alpha;
        ctx.fillStyle=p.col;
        ctx.fillRect(psx-Math.floor(spSz/2), psy-Math.floor(spSz/2), spSz, spSz);
      }
    }
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ── Draw shotgun: player holds gun straight, continuous fire/reload animation ──
function drawShotgunAim(){
  if(!fx.shotgun.active) return;
  const px=Math.round(sx(player.x)), py=Math.round(sy(player.y));
  const aimX=fx.shotgun.aimX||player.dir, aimY=fx.shotgun.aimY||0;
  const isReloading=fx.shotgun.reloading>0;
  // reloadProg: 0=just fired, 1=reload done
  const reloadProg=isReloading?(1-fx.shotgun.reloading/20):0;

  ctx.save();

  // ── Gun body ──
  // Barrel direction always matches aim
  const stockLen=14, barrelLen=28;

  // Pump position: slides back 8px at start of reload, then springs forward
  const pumpOffset=isReloading ? Math.round((1-reloadProg)*8) : 0;

  // Stock (behind torso, brown wood)
  const stockStartX=px - Math.round(aimX*(stockLen+2));
  const stockStartY=py + Math.round(aimY*2) - 3;
  const stockEndX=px - Math.round(aimX*2);
  const stockEndY=py - 3;
  ctx.strokeStyle='#6d4c41'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(stockStartX,stockStartY); ctx.lineTo(stockEndX,stockEndY); ctx.stroke();

  // Receiver (darker, body of gun)
  ctx.strokeStyle='#455a64'; ctx.lineWidth=7; ctx.lineCap='butt';
  ctx.beginPath();
  ctx.moveTo(stockEndX, stockEndY);
  ctx.lineTo(px+Math.round(aimX*10), py+Math.round(aimY*10)-3);
  ctx.stroke();

  // Barrel (bright grey metal, points forward)
  const barrelStartX=px+Math.round(aimX*4);
  const barrelStartY=py+Math.round(aimY*4)-3;
  const barrelEndX=px+Math.round(aimX*barrelLen);
  const barrelEndY=py+Math.round(aimY*barrelLen)-3;
  ctx.strokeStyle=isReloading?'#90a4ae':'#cfd8dc'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(barrelStartX,barrelStartY); ctx.lineTo(barrelEndX,barrelEndY); ctx.stroke();

  // ── PUMP — very visible, slides back on reload ──
  // Pump slides from mid-barrel backward during reload, springs forward when done
  const pumpBaseX=px+Math.round(aimX*(14-pumpOffset));
  const pumpBaseY=py+Math.round(aimY*(14-pumpOffset))-3;
  // Pump block: big darker rectangle perpendicular to barrel
  ctx.save();
  ctx.translate(pumpBaseX, pumpBaseY);
  ctx.rotate(Math.atan2(aimY,aimX));
  // Pump body
  ctx.fillStyle=isReloading?'#ff9800':'#78909c';
  ctx.fillRect(-6, -5, 12, 5); // thick pump grip
  ctx.fillStyle=isReloading?'#ffcc02':'#90a4ae';
  ctx.fillRect(-5, -4, 10, 2); // highlight stripe
  ctx.restore();

  // ── Muzzle flash on fire ──
  if(fx.shotgun.muzzleFlash>0){
    const mf=fx.shotgun.muzzleFlash/14;
    // Full beam to screen edge
    const beamLen=Math.max(VW,VH)*1.6;
    const grad=ctx.createLinearGradient(
      barrelEndX, barrelEndY,
      barrelEndX+Math.round(aimX*beamLen),
      barrelEndY+Math.round(aimY*beamLen));
    grad.addColorStop(0,'rgba(255,253,180,0.98)');
    grad.addColorStop(0.04,'rgba(255,200,40,0.85)');
    grad.addColorStop(0.18,'rgba(255,130,0,0.4)');
    grad.addColorStop(1,'rgba(255,80,0,0)');
    ctx.globalAlpha=mf;
    ctx.strokeStyle=grad; ctx.lineWidth=Math.round(16*mf); ctx.lineCap='round';
    ctx.shadowColor='#ffeb3b'; ctx.shadowBlur=28*mf;
    ctx.beginPath();
    ctx.moveTo(barrelEndX,barrelEndY);
    ctx.lineTo(barrelEndX+Math.round(aimX*beamLen), barrelEndY+Math.round(aimY*beamLen));
    ctx.stroke();
    // Muzzle starburst
    ctx.globalAlpha=mf*0.95;
    ctx.fillStyle='#fffde7'; ctx.shadowBlur=35*mf;
    ctx.beginPath(); ctx.arc(barrelEndX,barrelEndY,10*mf,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // ── Reload progress bar (orange, above player, very visible) ──
  if(isReloading){
    const bw=40, bh=6, bx2=px-bw/2, by2=py-40;
    // Background
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(bx2-2,by2-2,bw+4,bh+4);
    ctx.fillStyle='#212121'; ctx.fillRect(bx2,by2,bw,bh);
    // Fill
    ctx.fillStyle='#ff9800'; ctx.fillRect(bx2,by2,Math.round(bw*reloadProg),bh);
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(bx2,by2,Math.round(bw*reloadProg),3);
    // "RELOAD" label
    ctx.fillStyle='#ff9800'; ctx.font='bold 8px Courier New'; ctx.textAlign='center';
    ctx.fillText('♻ RELOAD',px,by2-3);
  }

  ctx.restore();
}

// ── Draw on-fire overlay on zombies — large pixels, slow animation, glow ──
function drawZombieFire(z){
  if(!z.onFire||!z.fireParticles) return;
  const zx=Math.round(sx(z.x)), zy=Math.round(sy(z.y));
  // How much of the zombie body height to cover (world units → screen)
  const sh=Math.round(z.h*ZOOM);

  ctx.save();

  for(const fp of z.fireParticles){
    const alpha=(fp.life/fp.maxLife);
    if(alpha<=0) continue;
    // Screen position: center on zombie, offset up from feet
    const px2=Math.round(zx + fp.ox*ZOOM);
    const py2=Math.round(zy - fp.oy*ZOOM);

    // Glow halo (big soft square behind pixel)
    ctx.globalAlpha=alpha*0.3;
    ctx.fillStyle=fp.col;
    const gs=fp.sz*2+4;
    ctx.fillRect(px2-Math.floor(gs/2), py2-Math.floor(gs/2), gs, gs);

    // Core pixel block
    ctx.globalAlpha=alpha*(fp.isSpark?0.95:0.88);
    ctx.fillStyle=fp.isSpark?'#fff59d':fp.col;
    const cs=fp.isSpark?Math.max(2,fp.sz-3):fp.sz;
    ctx.fillRect(px2-Math.floor(cs/2), py2-Math.floor(cs/2), cs, cs);
  }

  // Outer glow corona around zombie silhouette
  const pulse=0.55+0.45*Math.sin(frameCount*0.14+z.x);
  ctx.globalAlpha=0.38*pulse*(z.fireTimer/180);
  ctx.shadowColor='#ff6d00'; ctx.shadowBlur=18*pulse;
  ctx.strokeStyle='#ff9800'; ctx.lineWidth=3;
  // Draw glow as rounded rect around zombie bounding box
  const hw=Math.round(z.w/2*ZOOM)+4;
  ctx.strokeRect(zx-hw, zy-sh-6, hw*2, sh+6);
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  ctx.restore();
}

function drawJoystick(){
  if(!joystickActive)return;
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(joystickBase.x,joystickBase.y,48,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.13)';
  ctx.beginPath();ctx.arc(joystickBase.x+joystickDelta.x,joystickBase.y+joystickDelta.y,22,0,Math.PI*2);ctx.fill();
}

function drawMinimap(){
  // Minimap: 20% bigger than previous (80×144 → 96×173), top-right corner
  const mmW = 96, mmH = 173;
const mmX = VW - mmW - MARGIN;
const mmY = MARGIN;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(mmX,mmY,mmW,mmH);
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(mmX,mmY,mmW,mmH);
  // Pitch outline
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=1;
  const pmx=mmX+(PITCH.x/WORLD.w)*mmW, pmy=mmY+(PITCH.y/WORLD.h)*mmH;
  ctx.strokeRect(pmx,pmy,(PITCH.w/WORLD.w)*mmW,(PITCH.h/WORLD.h)*mmH);
  // Zombies
  zombies.filter(z=>!z.dead).forEach(z=>{
    const zx=mmX+(z.x/WORLD.w)*mmW, zy=mmY+(z.y/WORLD.h)*mmH;
    ctx.fillStyle=z.id==='fast'?'#ffeb3b':z.id==='tank'?'#ce93d8':z.id==='big'?'#ef9a9a':'#ff1744';
    ctx.fillRect(zx-1.5,zy-1.5,3,3);
  });
  // Player
  const ppx=mmX+(player.x/WORLD.w)*mmW, ppy=mmY+(player.y/WORLD.h)*mmH;
  ctx.fillStyle='#e8ff00'; ctx.fillRect(ppx-4,ppy-4,8,8);
  // ── Serpent Boss sur la minimap ──
  if(snake.active && !snake.dead && snake.alpha>0){
    const head=snake.segs[0];
    const smx=mmX+(head.x/WORLD.w)*mmW, smy=mmY+(head.y/WORLD.h)*mmH;
    // Corps : petits points oranges
    for(let i=1;i<snake.segs.length;i+=2){
      const seg=snake.segs[i];
      const sbx=mmX+(seg.x/WORLD.w)*mmW, sby=mmY+(seg.y/WORLD.h)*mmH;
      ctx.fillStyle='rgba(255,120,0,0.7)';
      ctx.fillRect(sbx-1,sby-1,2,2);
    }
    // Tête : carré rouge pulsant
    const pulse=0.7+0.3*Math.sin(frameCount*0.18);
    ctx.fillStyle=`rgba(255,30,0,${pulse})`;
    ctx.fillRect(smx-4,smy-4,8,8);
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=1;
    ctx.strokeRect(smx-4,smy-4,8,8);
  }
  // Camera rect
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
  ctx.strokeRect(mmX+(cam.x/WORLD.w)*mmW,mmY+(cam.y/WORLD.h)*mmH,(VW/WORLD.w)*mmW,(VH/WORLD.h)*mmH);
}

function drawUI(){
  // ── Common font size for all HUD elements ──
  const F = '16px Courier New';   // labels
  const FB = 'bold 20px Courier New'; // numbers/values
  const panelX = MARGIN;
  const panelW = 130; // width used for energy bar and kill panel

  // ── ENERGY BAR — top left, same width as kill panel ──
  const hpH = 13;
const hpY = MARGIN;
  const hpColor=player.hp>50?'#4caf50':player.hp>25?'#ff9800':'#f44336';
  pr(panelX, hpY, panelW, hpH, '#1a1a1a');
  pr(panelX, hpY, panelW*(player.hp/player.maxHp), hpH, hpColor);
  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.fillRect(panelX, hpY, panelW*(player.hp/player.maxHp), hpH/2);
  ctx.fillStyle='#ffffff'; ctx.font=F; ctx.textAlign='left';
  ctx.fillText('❤ '+Math.ceil(player.hp)+'%', panelX+2, hpY+hpH+13);

  // ── ONE UP icons — right of energy bar ──
  if(oneUpCount>0 || oneUpAnim>0){
    const ouX = panelX + panelW + 10;
    const ouY = hpY;
    // Pulsing scale when just earned
    const pulse = oneUpAnim>0 ? 1 + 0.3*Math.sin((oneUpAnim/120)*Math.PI*4)*(oneUpAnim/120) : 1;
    ctx.save();
    ctx.font = `bold ${Math.round(14*pulse)}px Courier New`;
    ctx.textAlign='left';
    // Glow when recently earned
    if(oneUpAnim>0){
      ctx.shadowColor='#e8ff00'; ctx.shadowBlur=12*(oneUpAnim/120);
    }
    // Draw up to 5 1UP hearts in a row
    const display = Math.min(oneUpCount, 5);
    for(let i=0;i<display;i++){
      ctx.fillStyle= oneUpAnim>0 ? '#e8ff00' : '#aaffaa';
      ctx.fillText('1UP', ouX + i*32, ouY+13);
    }
    if(oneUpCount>5){
      ctx.fillStyle='#ffffff'; ctx.font='10px Courier New';
      ctx.fillText('×'+oneUpCount, ouX + 5*32, ouY+13);
    }
    ctx.shadowBlur=0; ctx.restore();
  }

  // ── KILLS HUD — pixel-art zombie icons ──
  // Tous les non-géants comptabilisés comme "normal"
  const normalKills = killsByType.normal + killsByType.big + killsByType.tank + killsByType.fast;
  

  // Helper: draw drop shadow text
  function hudText(txt, x2, y2, font2, col2){
    ctx.save();
    ctx.font = font2;
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillText(txt, x2+1, y2+1);
    ctx.fillStyle = col2;
    ctx.fillText(txt, x2, y2);
    ctx.restore();
  }

  // ── Pixel-art zombie icon drawers — TÊTE SEULEMENT ──

  // Tête zombie normal — peau grise, yeux rouges, boulons Frankenstein
  function drawNormalZombieIcon(cx, cy){

    p(-7,-14,14,12,'#9e9e9e');
    // Cheveux
    p(-7,-16,14,3,'#2a2a2a');
    p(-7,-17,4,2,'#2a2a2a');
    p(3,-17,4,2,'#2a2a2a');
    // Yeux rouges
    p(-5,-10,4,4,'#111');
    p(1,-10,4,4,'#111');
    p(-4,-9,3,3,'#ff1744');
    p(2,-9,3,3,'#ff1744');
    // Bouche
    p(-4,-4,8,2,'#111');
    p(-3,-4,2,2,'#eee');
    p(1,-4,2,2,'#eee');
    // Boulons Frankenstein
    p(-10,-8,3,5,'#777');
    p(7,-8,3,5,'#777');
    p(-9,-7,2,2,'#aaa');
    p(8,-7,2,2,'#aaa');
    // Cicatrice

  // Tête zombie géant — même design mais +50% plus grande
  function drawGiantZombieIcon(cx, cy){
    const p = (x2,y2,w2,h2,c2)=>{ ctx.fillStyle=c2; ctx.fillRect(cx+x2,cy+y2,w2,h2); };

    p(-9,-16,18,14,'#9e9e9e');
    // Cheveux
    p(-9,-19,18,4,'#2a2a2a');
    p(-9,-20,5,2,'#2a2a2a');
    p(4,-20,5,2,'#2a2a2a');
    // Yeux rouges (plus grands)
    p(-7,-13,5,5,'#111');
    p(2,-13,5,5,'#111');
    p(-6,-12,4,4,'#ff1744');
    p(3,-12,4,4,'#ff1744');
    // Pupilles
    p(-5,-11,2,2,'#000');
    p(4,-11,2,2,'#000');
    // Bouche
    p(-5,-4,10,3,'#111');
    p(-4,-4,3,2,'#eee');
    p(1,-4,3,2,'#eee');
    // Boulons Frankenstein (plus gros)
    p(-12,-9,4,7,'#777');
    p(8,-9,4,7,'#777');
    p(-11,-8,2,3,'#aaa');
    p(9,-8,2,3,'#aaa');
    // Cicatrice
    p(-4,-8,8,1,'rgba(0,0,0,0.5)');
    p(-2,-10,1,4,'rgba(0,0,0,0.4)');
    p(1,-10,1,4,'rgba(0,0,0,0.4)');

    p(-9,-21,18,2,'#66bb6a');

  // drawBossIcon(cx, cy): tête de mort pixel-art — centrée sur (cx, cy)
  function drawBossIcon(cx, cy){
    const p = (x2,y2,w2,h2,c2)=>{ ctx.fillStyle=c2; ctx.fillRect(cx+x2,cy+y2,w2,h2); };
    const bone = '#e0e0e0';
    const dark  = '#222';
    p(-6,-16,12,2,bone);
    p(-8,-14,16,2,bone);
    p(-9,-12,18,10,bone);
    p(-8,-2,16,4,bone);
    p(-9,-12,2,14,'rgba(0,0,0,0.25)');
    p(7,-12,2,14,'rgba(0,0,0,0.25)');
    p(-7,-11,5,5,dark);
    p(2,-11,5,5,dark);
    p(-6,-10,2,2,'rgba(255,20,68,0.7)');
    p(3,-10,2,2,'rgba(255,20,68,0.7)');
    p(-1,-7,2,2,dark);
    p(-2,-6,4,1,dark);
    p(-7,-2,3,4,'#f5f5f5');
    p(-3,-2,3,4,'#f5f5f5');
    p(1,-2,3,4,'#f5f5f5');
    p(5,-2,3,4,'#f5f5f5');
    p(-4,-2,1,4,dark);
    p(0,-2,1,4,dark);
    p(4,-2,1,4,dark);
    p(1,-15,1,1,'rgba(0,0,0,0.3)');
    p(0,-14,1,2,'rgba(0,0,0,0.3)');
    p(1,-12,1,2,'rgba(0,0,0,0.3)');
  }

  const rowH = 40;
const panelStartY = topY + 50;
  // Layout constants — tout aligné sur la même grille
  const iconCX   = panelX + 13;  // centre X de toutes les icônes
  const textX    = panelX + 30;  // X du label et du score
  const iconCYoff= 18;           // offset cy dans la row
  const labelYoff= 12;           // offset Y du label
  const scoreYoff= 28;           // offset Y du score
  const FLABEL   = 'bold 13px Courier New';  // taille uniforme label
  const FSCORE   = 'bold 16px Courier New';  // taille uniforme score

  // Row 1: NORMAL
  {
    const ry = panelStartY;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=5;
    drawNormalZombieIcon(iconCX, ry + iconCYoff);
    ctx.restore();
    hudText('NORMAL', textX, ry + labelYoff, FLABEL, '#c0c0c0');
    hudText(normalKills, textX, ry + scoreYoff, FSCORE, '#ffffff');
  }

  // Row 2: GÉANT
  {
    const ry = panelStartY + rowH;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=5;
    drawGiantZombieIcon(iconCX, ry + iconCYoff);
    ctx.restore();
    hudText('GÉANT', textX, ry + labelYoff, FLABEL, '#ff8a65');
    hudText(killsByType.giant||0, textX, ry + scoreYoff, FSCORE, '#ffffff');
  }

  // Row 3: BOSS
  {
    const ry = panelStartY + rowH*2;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=5;
    drawBossIcon(iconCX, ry + iconCYoff);
    ctx.restore();
    hudText('BOSS', textX, ry + labelYoff, FLABEL, '#ffeb3b');
    hudText(bossKills||0, textX, ry + scoreYoff, FSCORE, '#ffffff');
  }

  // ── WAVE + ALIVE — juste sous les kills ──
  const infoY = panelStartY + rowH*3 + 4;

  // WAVE
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=6;
  hudText('WAVE', panelX+4, infoY+14, FLABEL, '#aaaaaa');
  hudText(wave,   panelX+4, infoY+30, FSCORE, '#ff4444');
  ctx.restore();

  // ALIVE
  const alive=zombies.filter(z=>!z.dead&&z.emerging===0).length;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=6;
  hudText('ALIVE', panelX+4, infoY+48, FLABEL, '#aaaaaa');
  hudText(alive,   panelX+4, infoY+64, FSCORE, '#ff6666');
  ctx.restore();

  // ── SCORE — bas gauche ──
  ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=8;
  ctx.fillStyle='#ffffff'; ctx.font=F; ctx.textAlign='left';
 ctx.fillText('SCORE', panelX + 4, baseY - 26);
  ctx.fillStyle='#e8ff00'; ctx.font='bold 28px Courier New';
  ctx.fillText(score, panelX + 4, baseY);
  ctx.shadowBlur=0;

  // ── BALL COUNT — juste au-dessus du score ──
  {
    const totalBalls = 1 + extraBalls.length; // ballon principal + extra balls
    const ballsAtFeet = (ball.active ? 0 : 1) + extraBalls.filter(eb => !eb.active).length;
    const bx = panelX + 4;
    const by = VH - 80;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 8;
    // Icône ⚽ grande
    ctx.font = 'bold 28px Courier New';
    ctx.fillStyle = '#e8ff00';
    ctx.textAlign = 'left';
    ctx.fillText('⚽', bx, by);
    // Chiffre de balles disponibles / total
    ctx.font = 'bold 26px Courier New';
    ctx.fillStyle = ballsAtFeet > 0 ? '#ffffff' : '#666666';
    ctx.fillText(ballsAtFeet + '/' + totalBalls, bx + 34, by);
    ctx.restore();
  }

  // ── MEGA DASH active overlay ──
  if(megaDash.active){
    const prog=megaDash.timer/megaDash.max;
    // Blue electric vignette
    const gd=ctx.createRadialGradient(VW/2,VH/2,VH*0.15,VW/2,VH/2,VH*0.75);
    gd.addColorStop(0,'rgba(0,180,255,0)');
    gd.addColorStop(1,`rgba(0,60,180,${0.22*prog})`);
    ctx.fillStyle=gd; ctx.fillRect(0,0,VW,VH);

  }

  // ── MINIMAP — top right ──
  drawMinimap();

  // ── WAVE BREAK indicator ──
  if(waveBreakTimer>0){
    const prog=waveBreakTimer/120;
    const plsx=Math.round(sx(player.x));
    const plsy=Math.round(sy(player.y));
    const bw=160, bh=7;
    const bx2=plsx-bw/2;
    const by2=Math.max(28, plsy-54); // just above player, never off top
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(bx2-3,by2-3,bw+6,bh+18);
    ctx.fillStyle='#333'; ctx.fillRect(bx2,by2,bw,bh);
    ctx.fillStyle='#00e5ff'; ctx.fillRect(bx2,by2,bw*prog,bh);
    ctx.fillStyle='#00e5ff'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillText('⏳ NEW WAVE INCOMING…', plsx, by2+bh+11);
  }

  // ── WAVE ANNOUNCE — above player ──
  if(waveAnnounce>0){
    const isPurgeWave=wave%5===0;
    const plsx=Math.round(sx(player.x));
    const plsy=Math.round(sy(player.y));
    const annW=250, annH=isPurgeWave?54:44;
    const annTop=Math.max(14, plsy-70-annH);
    const skew=8;

    // ── Animation : slide de droite→centre, puis centre→gauche ──
    const TOTAL=160, ENTER=20, EXIT=40;
    // easeOut cubic
    const easeOut = t => 1-(1-t)*(1-t)*(1-t);
    const easeIn  = t => t*t*t;
    let offsetX=0, alpha=1;
    if(waveAnnounce > TOTAL-ENTER){
      // Entrée : droite → centre
      const p = 1-(waveAnnounce-(TOTAL-ENTER))/ENTER; // 0→1
      offsetX = (VW * 0.7) * (1-easeOut(p));
      alpha = p;
    } else if(waveAnnounce < EXIT){
      // Sortie : centre → gauche
      const p = waveAnnounce/EXIT; // 1→0
      offsetX = -(VW * 0.7) * (1-easeIn(p));
      alpha = p;
    }

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(offsetX, 0);

    const annX=plsx-annW/2;
    const bgColor=isPurgeWave?'rgba(200,40,0,0.92)':'rgba(0,0,0,0.88)';
    ctx.fillStyle=bgColor;
    ctx.beginPath();
    ctx.moveTo(annX+skew, annTop);
    ctx.lineTo(annX+annW, annTop);
    ctx.lineTo(annX+annW-skew, annTop+annH);
    ctx.lineTo(annX, annTop+annH);
    ctx.closePath();
    ctx.fill();

    if(isPurgeWave){
      ctx.strokeStyle='#ff4444';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(annX+skew, annTop);
      ctx.lineTo(annX+annW, annTop);
      ctx.lineTo(annX+annW-skew, annTop+annH);
      ctx.lineTo(annX, annTop+annH);
      ctx.closePath();
      ctx.stroke();
    }

    ctx.fillStyle=isPurgeWave?'#ff4444':'#e8ff00';
    ctx.font='bold 22px Courier New'; ctx.textAlign='center';
    ctx.fillText('WAVE '+wave+(isPurgeWave?' — PURGE!':'!'), plsx, annTop+22);
    if(isPurgeWave){
      ctx.fillStyle='#ffeb3b'; ctx.font='bold 12px Courier New';
      ctx.fillText('⚡ ALL ZOMBIES ANNIHILATED ⚡', plsx, annTop+42);
    } else {
      ctx.fillStyle='#ff8888'; ctx.font='12px Courier New';
      ctx.fillText('HORDE: '+targetCount, plsx, annTop+38);
    }
    ctx.restore();
  }
}

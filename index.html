<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Football Zombie Survival</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;

  position:fixed;
  inset:0;

  width:100%;
  height:100%;
  font-family:'Courier New',monospace;
  touch-action:none;
}
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:rgba(0,0,0,0.93); z-index:10;
}
#overlay h1 {
  color:#e8ff00; font-size:24px; letter-spacing:3px;
  text-transform:uppercase; text-align:center;
  text-shadow:0 0 18px #e8ff00aa; margin-bottom:6px;
}
.sub { color:#ff4444; font-size:11px; letter-spacing:2px; margin-bottom:26px; }
.score-display { color:#fff; font-size:13px; margin-bottom:18px; text-align:center; letter-spacing:1px; }
#overlay button {
  background:#e8ff00; border:none; color:#000;
  font-size:14px; font-family:'Courier New',monospace; font-weight:bold;
  letter-spacing:3px; padding:14px 44px; cursor:pointer; text-transform:uppercase;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.instructions {
  color:#ffffff; font-size:14px; margin-top:18px;
  text-align:center; line-height:2; letter-spacing:1px;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="overlay">
  <h1>&#x26BD; FOOTBALL<br>ZOMBIE SURVIVAL</h1>
  <div class="sub">&#8212; HORDE EDITION &#8212;</div>
  <div class="score-display" id="final-score" style="display:none"></div>
  <button id="startBtn" onclick="startGame()">PLAY</button>
  <div class="instructions">
    HOLD finger &#8594; move your player<br>
    Ball auto-shoots visible zombies<br>
    More kills &#8594; bigger horde !
  </div>
</div>
<script>
// ══════════════════════════════════════
// SETUP
// ══════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');




const VW = 380, VH = 844;
const MARGIN = 10;
const leftX   = MARGIN;
const rightX  = VW - MARGIN;
const topY    = MARGIN;
const bottomY = VH - MARGIN;
const HUD_Y_OFFSET = MARGIN;
const baseY = VH - MARGIN;
canvas.width = VW; canvas.height = VH;
const ZOOM = 2.4; // camera zoom factor

// ── Detect mobile vs desktop ──
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                 ('ontouchstart' in window && navigator.maxTouchPoints > 1);

function resize() {

  const viewportHeight = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  const SAFE_BOTTOM = 50; // 🔥 ajuste si besoin (15–40)

  const scale = (viewportHeight - SAFE_BOTTOM) / VH;

  const w = VW * scale;
  const h = VH * scale;

  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  canvas.style.position = "fixed";

  canvas.style.left =
    (window.innerWidth - w) / 2 + "px";

  canvas.style.top =
    (viewportHeight - h) / 2 + "px";
}

window.addEventListener("resize", resize);

// ── Fullscreen button (desktop only) ──
if(!isMobile){
  const fsBtn = document.createElement('button');
  fsBtn.id = 'fsBtn';
  fsBtn.textContent = '⛶ FULLSCREEN';
  fsBtn.style.cssText = `
    position:fixed; bottom:12px; right:12px; z-index:100;
    background:rgba(0,0,0,0.7); color:#e8ff00; border:1px solid #e8ff00;
    font:bold 11px Courier New; letter-spacing:2px; padding:7px 14px;
    cursor:pointer; text-transform:uppercase; outline:none;
  `;
  fsBtn.onclick = ()=>{
    const el = document.documentElement;
    if(!document.fullscreenElement){
      el.requestFullscreen && el.requestFullscreen();
      fsBtn.textContent = '✕ EXIT FULL';
    } else {
      document.exitFullscreen && document.exitFullscreen();
      fsBtn.textContent = '⛶ FULLSCREEN';
    }
  };
  document.addEventListener('fullscreenchange', ()=>{
    if(!document.fullscreenElement) fsBtn.textContent = '⛶ FULLSCREEN';
  });
  document.body.appendChild(fsBtn);
  // Auto-request fullscreen when game starts
  document.getElementById('startBtn').addEventListener('click', ()=>{
    const el = document.documentElement;
    if(!document.fullscreenElement){
      el.requestFullscreen && el.requestFullscreen().catch(()=>{});
    }
  }, {once:false});
}

// ── WORLD ──
const WORLD = { w:1000, h:1800 };
const PITCH = { x:40, y:60, w:WORLD.w-80, h:WORLD.h-120 };

// ── CAMERA ──
const cam = { x:0, y:0, shake:0 };
function updateCamera(){
  // cam stores the world position of screen center (= player position)
  cam.x += (player.x - cam.x) * 0.12;
  cam.y += (player.y - cam.y) * 0.12;
}
// World-to-screen with zoom (ZOOM=1.35 means 35% closer)
// World-to-screen: player (cam.x/y) always maps to screen center (VW/2, VH/2)
const sx = wx => (wx - cam.x) * ZOOM + VW/2 + (cam.shake>0?(Math.random()-0.5)*cam.shake:0);
const sy = wy => (wy - cam.y) * ZOOM + VH/2 + (cam.shake>0?(Math.random()-0.5)*cam.shake:0);

// ══════════════════════════════════════
// AUDIO  (Web Audio API)
// ══════════════════════════════════════
let AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq,type,dur,vol,fe){
  try{
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
    if(fe!=null) o.frequency.exponentialRampToValueAtTime(fe,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function noise(dur,vol,band){
  try{
    const ac=getAC(), len=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=band; f.Q.value=0.7;
    const g=ac.createGain();
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(); src.stop(ac.currentTime+dur);
  }catch(e){}
}
let lastSfxTime = {};
function throttleSfx(key, minMs, fn){
  const now = Date.now();
  if(!lastSfxTime[key] || now-lastSfxTime[key]>minMs){ lastSfxTime[key]=now; fn(); }
}

const SFX = {
  kick(){  tone(190,'sine',0.13,0.55,55); noise(0.08,0.22,320); },
  hit(){   tone(230,'square',0.08,0.3,180); noise(0.06,0.15,500); },
  growl(){ throttleSfx('gr',120,()=>{ tone(80+Math.random()*55,'sawtooth',0.19,0.2,48); noise(0.15,0.08,180); }); },

  // Short running grunt for fast/sprint zombies — replays every ~1s
  runGrowl(){
    throttleSfx('rg',80,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Quick sharp exhale grunt: rising then cut
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(140+Math.random()*40, t0);
        o.frequency.exponentialRampToValueAtTime(80, t0+0.06);
        g.gain.setValueAtTime(0.28, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.08);
        const flt=ac.createBiquadFilter();
        flt.type='bandpass'; flt.frequency.value=300; flt.Q.value=1.2;
        o.connect(flt); flt.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.09);
        // Breathy noise underlayer
        noise(0.06, 0.12, 250+Math.random()*100);
      }catch(e){}
    });
  },

  // Deep heavy groan when big/tank zombie takes a hit
  bigHit(){
    throttleSfx('bh',180,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Very low guttural moan — descends slowly
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(65+Math.random()*20, t0);
        o.frequency.exponentialRampToValueAtTime(30, t0+0.35);
        g.gain.setValueAtTime(0.45, t0);
        g.gain.linearRampToValueAtTime(0.3, t0+0.15);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.38);
        const flt=ac.createBiquadFilter();
        flt.type='lowpass'; flt.frequency.value=320;
        o.connect(flt); flt.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.4);
        // Rumble noise
        noise(0.25, 0.2, 90+Math.random()*40);
        // Second harmonic layer
        setTimeout(()=>{
          const o2=ac.createOscillator(), g2=ac.createGain();
          o2.type='sine';
          o2.frequency.setValueAtTime(40, ac.currentTime);
          o2.frequency.exponentialRampToValueAtTime(22, ac.currentTime+0.2);
          g2.gain.setValueAtTime(0.3, ac.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.22);
          o2.connect(g2); g2.connect(ac.destination);
          o2.start(); o2.stop(ac.currentTime+0.23);
        }, 40);
      }catch(e){}
    });
  },
  explode(){ noise(0.38,0.6,650); tone(70,'sawtooth',0.28,0.4,35); setTimeout(()=>noise(0.2,0.28,200),80); },
  playerScream(){
    throttleSfx('ph',500,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // ── Impact grave (choc physique) ──
        const oi=ac.createOscillator(), gi=ac.createGain();
        oi.type='sine';
        oi.frequency.setValueAtTime(110,t0);
        oi.frequency.exponentialRampToValueAtTime(30,t0+0.18);
        gi.gain.setValueAtTime(0.7,t0);
        gi.gain.exponentialRampToValueAtTime(0.0001,t0+0.2);
        oi.connect(gi); gi.connect(ac.destination);
        oi.start(); oi.stop(t0+0.22);
        // ── Bruit d'impact court ──
        noise(0.06,0.5,600);
        // ── Cri "AAH" : 3 formants vocaux superposés ──
        // Formant F1 (poitrine ~700Hz)
        const makeFormant=(fStart,fEnd,vol,dur,q,delay)=>{
          setTimeout(()=>{
            try{
              const ac2=getAC(), t1=ac2.currentTime;
              const ov=ac2.createOscillator(), gv=ac2.createGain();
              const fv=ac2.createBiquadFilter();
              ov.type='sawtooth';
              ov.frequency.setValueAtTime(fStart,t1);
              ov.frequency.linearRampToValueAtTime(fEnd,t1+dur*0.4);
              ov.frequency.linearRampToValueAtTime(fStart*0.7,t1+dur);
              fv.type='bandpass'; fv.frequency.value=fStart*3.2; fv.Q.value=q;
              gv.gain.setValueAtTime(0,t1);
              gv.gain.linearRampToValueAtTime(vol,t1+0.03);
              gv.gain.setValueAtTime(vol*0.8,t1+dur*0.3);
              gv.gain.exponentialRampToValueAtTime(0.0001,t1+dur);
              ov.connect(fv); fv.connect(gv); gv.connect(ac2.destination);
              ov.start(); ov.stop(t1+dur+0.05);
            }catch(e){}
          },delay);
        };
        // Départ du cri légèrement après l'impact
        makeFormant(260, 380, 0.38, 0.55, 4,  60);  // voix principale
        makeFormant(260, 380, 0.22, 0.50, 8,  65);  // harmonique
        makeFormant(200, 310, 0.15, 0.45, 2, 120);  // souffle résiduel
        // ── Vibrato de détresse (tremblements) ──
        setTimeout(()=>{
          try{
            const ac3=getAC(), t2=ac3.currentTime;
            const ot=ac3.createOscillator(), vib=ac3.createOscillator();
            const gvib=ac3.createGain(), gout=ac3.createGain();
            ot.type='sawtooth'; ot.frequency.value=270;
            vib.type='sine'; vib.frequency.value=8; // 8Hz tremolo
            vib.connect(gvib); gvib.gain.value=18;  // ±18Hz wobble
            gvib.connect(ot.frequency);
            const fvib=ac3.createBiquadFilter(); fvib.type='bandpass'; fvib.frequency.value=1100; fvib.Q.value=5;
            gout.gain.setValueAtTime(0.2,t2);
            gout.gain.exponentialRampToValueAtTime(0.0001,t2+0.35);
            ot.connect(fvib); fvib.connect(gout); gout.connect(ac3.destination);
            vib.start(); ot.start(); vib.stop(t2+0.37); ot.stop(t2+0.37);
          }catch(e){}
        },100);
      }catch(e){}
      // Vibration écran forte sur hit joueur
      cam.shake=16;
      cam.shakeDecay=0.82;
    });
  },
  fastZombie(){ throttleSfx('fz',300,()=>{ tone(320,'sawtooth',0.1,0.18,600); }); },
  killShake(isSprinter){
    // Vibration légère sur kill — moins forte que hit joueur
    cam.shake = isSprinter ? 6 : 2.5;
    cam.shakeDecay = 0.75;
  },
  waveUp(){ [300,400,520].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.12,0.2),i*80)); },

  // Soft earth-breaking sound when zombie digs out
  zombieEmerge(){
    throttleSfx('ze',300,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Low rumble — earth shifting
        noise(0.35, 0.08, 60+Math.random()*30);
        // Muffled thud — dirt breaking
        setTimeout(()=>noise(0.2, 0.06, 120+Math.random()*40), 80);
        // Faint creak — surface crack
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(35+Math.random()*15, t0);
        o.frequency.exponentialRampToValueAtTime(18, t0+0.3);
        g.gain.setValueAtTime(0.07, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.32);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.33);
      }catch(e){}
    });
  },
  chunkLand(){
    throttleSfx('cl',60,()=>{
      // Organic wet thud: low thump + wet splat noise
      try{
        const ac=getAC();
        // Low thump
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(55+Math.random()*25, ac.currentTime);
        o.frequency.exponentialRampToValueAtTime(20, ac.currentTime+0.12);
        g.gain.setValueAtTime(0.175, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.14);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime+0.15);
        // Wet splat: short noise burst low-mid freq
        noise(0.07, 0.09, 180+Math.random()*120);
        // Second organic layer: body-like mid thud
        setTimeout(()=>noise(0.05,0.05,80+Math.random()*60), 20);
      }catch(e){}
    });
  },
  powerupPickup(){ [500,700,900].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.1,0.22),i*55)); },
  bombExplode(){ noise(0.55,0.9,400); tone(60,'sawtooth',0.45,0.7,25); setTimeout(()=>noise(0.3,0.4,200),100); },
  thunderStrike(){
    try{
      const ac=getAC(), t0=ac.currentTime;
      // Electric crack — sharp high freq burst
      const oc=ac.createOscillator(), gc=ac.createGain(), fc=ac.createBiquadFilter();
      oc.type='sawtooth'; oc.frequency.setValueAtTime(1800,t0); oc.frequency.exponentialRampToValueAtTime(120,t0+0.12);
      fc.type='bandpass'; fc.frequency.value=2200; fc.Q.value=0.8;
      gc.gain.setValueAtTime(0.7,t0); gc.gain.exponentialRampToValueAtTime(0.0001,t0+0.14);
      oc.connect(fc); fc.connect(gc); gc.connect(ac.destination);
      oc.start(); oc.stop(t0+0.15);
      // White noise crackle
      noise(0.08,0.9,3000); noise(0.06,0.5,1500);
      // Deep thunder rumble after 80ms
      setTimeout(()=>{
        try{
          const ac2=getAC(), t1=ac2.currentTime;
          const or=ac2.createOscillator(), gr=ac2.createGain(), fr=ac2.createBiquadFilter();
          or.type='sawtooth'; or.frequency.setValueAtTime(55,t1); or.frequency.exponentialRampToValueAtTime(18,t1+0.6);
          fr.type='lowpass'; fr.frequency.value=200;
          gr.gain.setValueAtTime(0.65,t1); gr.gain.exponentialRampToValueAtTime(0.0001,t1+0.65);
          or.connect(fr); fr.connect(gr); gr.connect(ac2.destination);
          or.start(); or.stop(t1+0.7);
          noise(0.5,0.4,80);
        }catch(e){}
      },80);
    }catch(e){}
  },
  shotgunFire(){
    try{
      const ac=getAC(),t0=ac.currentTime;
      // Deep BOOM
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(180,t0); o.frequency.exponentialRampToValueAtTime(30,t0+0.18);
      g.gain.setValueAtTime(0.9,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
      const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800;
      o.connect(f);f.connect(g);g.connect(ac.destination); o.start();o.stop(t0+0.23);
      noise(0.18,0.95,1400); noise(0.12,0.6,400);
    }catch(e){}
  },
  shotgunReload(){
    try{
      const ac=getAC(),t0=ac.currentTime;
      // Pump slide — two metallic clunks
      tone(320,'square',0.06,0.4,420); // slide out
      setTimeout(()=>{ tone(280,'square',0.07,0.5,180); noise(0.05,0.3,900); },140); // click lock
      setTimeout(()=>{ tone(180,'sine',0.05,0.3,90); },220); // chamber close
    }catch(e){}
  },
  giantLeap(){
    throttleSfx('gl',400,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Heavy grunt launch
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(90+Math.random()*30, t0);
        o.frequency.exponentialRampToValueAtTime(40, t0+0.35);
        g.gain.setValueAtTime(0.6, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.38);
        const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
        o.connect(f); f.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.4);
        noise(0.2, 0.3, 200);
      }catch(e){}
    });
  },
  giantLand(){
    try{
      const ac=getAC(), t0=ac.currentTime;
      // Massive ground impact boom
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(60, t0);
      o.frequency.exponentialRampToValueAtTime(18, t0+0.45);
      g.gain.setValueAtTime(0.9, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+0.5);
      o.connect(g); g.connect(ac.destination);
      o.start(); o.stop(t0+0.52);
      noise(0.35, 0.7, 120);
      setTimeout(()=>noise(0.2, 0.4, 80), 60);
      // Crack high freq
      noise(0.06, 0.5, 1800);
    }catch(e){}
  },
};

// ══════════════════════════════════════
// PALETTE
// ══════════════════════════════════════
const C = {
  grass1:'#1a5c1a', grass2:'#1d6b1d', line:'rgba(255,255,255,0.45)',
  player:'#e8ff00', playerD:'#b8cc00',
  blood:'#c62828',
};

// ══════════════════════════════════════
// BIOME SYSTEM
// ══════════════════════════════════════
// biome: 0=grass, 1=desert(10k), 2=snow(20k), 3=graveyard(30k)
let biome = 0;
let biomeTransition = 0;  // 0→1 over 180 frames (3s)
let biomePrev = 0;        // previous biome for colour lerp
let snowflakes = [];      // active snowflakes
let biomeObstacles = [];  // trees or graves: {x,y,w,h,type}

// Colour palettes per biome
const BIOMES = [
  { g1:'#1a5c1a', g2:'#1d6b1d', line:'rgba(255,255,255,0.45)', stand:'#111111', filter:null },
  { g1:'#c8a96e', g2:'#b89558', line:'rgba(200,180,140,0.55)', stand:'#1a1206', filter:'rgba(200,160,80,0.13)' },
  { g1:'#c8d8e8', g2:'#b8c8da', line:'rgba(200,220,255,0.6)',  stand:'#0a1220', filter:'rgba(180,210,255,0.12)' },
  { g1:'#3a3a3a', g2:'#2e2e2e', line:'rgba(160,160,180,0.5)', stand:'#080808', filter:'rgba(20,10,30,0.18)'   },
];

function lerpColor(c1, c2, t){
  // Parse hex or rgba strings → lerp → return hex
  const p = s => {
    const m = s.match(/[\da-f]{2}/gi);
    if(m && m.length>=3) return m.slice(0,3).map(x=>parseInt(x,16));
    const r2 = s.match(/[\d.]+/g);
    if(r2) return [+r2[0],+r2[1],+r2[2]];
    return [0,0,0];
  };
  const a=p(c1), b=p(c2);
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g2=Math.round(a[1]+(b[1]-a[1])*t);
  const bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g2},${bl})`;
}

function getCurrentBiomeColors(){
  const t = biomeTransition;
  const A = BIOMES[biomePrev], B = BIOMES[biome];
  return {
    g1:   t>=1 ? B.g1   : lerpColor(A.g1,   B.g1,   t),
    g2:   t>=1 ? B.g2   : lerpColor(A.g2,   B.g2,   t),
    line: t>=1 ? B.line : B.line,  // just swap at end
    stand:t>=1 ? B.stand: lerpColor(A.stand, B.stand, t),
    filter: B.filter,
    filterAlpha: t,
  };
}

function spawnBiomeObstacles(){
  biomeObstacles = [];
  if(biome===0) return;
  const count = biome===1 ? 48 : biome===2 ? 0 : 60; // trees/graves — ×3
  const margin = 80;
  let attempts=0;
  while(biomeObstacles.length<count && attempts<1200){
    attempts++;
    const ox = PITCH.x+margin + Math.random()*(PITCH.w-margin*2);
    const oy = PITCH.y+margin + Math.random()*(PITCH.h-margin*2);
    // Not too close to center (keep gameplay area open)
    if(Math.hypot(ox-(PITCH.x+PITCH.w/2), oy-(PITCH.y+PITCH.h/2))<120) continue;
    // Not too close to other obstacles
    if(biomeObstacles.some(o=>Math.hypot(o.x-ox,o.y-oy)<90)) continue;
    // Not too close to player spawn
    if(Math.hypot(ox-player.x, oy-player.y)<100) continue;
    const isGrave = biome===3;
    biomeObstacles.push({
      x:ox, y:oy,
      w: isGrave?18:20, h: isGrave?24:32,
      type: isGrave?'grave':'tree',
      emergeFrame: frameCount + Math.floor(Math.random()*120), // stagger emergence
      emerged: 0, // 0→1
    });
  }
}

function updateBiome(){
  // Check score thresholds
  const newBiome = score>=30000?3 : score>=20000?2 : score>=10000?1 : 0;
  if(newBiome !== biome && biomeTransition>=1){
    biomePrev = biome;
    biome = newBiome;
    biomeTransition = 0;
    // Reset boss so it can spawn again on the new biome
    if(!snake.active && snake.everSpawned){
      snake.everSpawned = false;
      snake.dead = false;
      snake.hp = SNAKE_HP_MAX;
      snake.announced = false;
    }
    // Spawn obstacles for new biome
    spawnBiomeObstacles();
    // Init snowflakes for snow biome
    if(biome===2){
      snowflakes = [];
      for(let i=0;i<40;i++) snowflakes.push({
        x: Math.random()*VW, y: Math.random()*VH,
        spd: 0.4+Math.random()*0.8, sz: 1+Math.random()*2,
        drift: (Math.random()-0.5)*0.3, life:1,
      });
    }
  }
  if(biomeTransition<1) biomeTransition = Math.min(1, biomeTransition+1/180);

  // Emerge obstacles
  for(const o of biomeObstacles){
    if(frameCount>=o.emergeFrame && o.emerged<1) o.emerged=Math.min(1, o.emerged+0.03);
  }

  // Snow update
  if(biome===2 || (biomePrev===2 && biomeTransition<1)){
    for(const s of snowflakes){
      s.y += s.spd; s.x += s.drift;
      if(s.y>VH){ s.y=0; s.x=Math.random()*VW; }
      if(s.x<0) s.x=VW; if(s.x>VW) s.x=0;
    }
  }
}

function checkObstacleCollision(entity, hw, hh){
  // Push entity out of all obstacles. entity must have .x .y
  for(const o of biomeObstacles){
    if(o.emerged<0.5) continue; // not fully emerged yet
    const ow=o.w*0.5, oh=o.h*0.4; // collision half-sizes (tighter than visual)
    const dx=entity.x-o.x, dy=entity.y-o.y;
    const overX=hw+ow-Math.abs(dx), overY=hh+oh-Math.abs(dy);
    if(overX>0 && overY>0){
      // Push out on smallest axis
      if(overX<overY){ entity.x+=dx>0?overX:-overX; }
      else           { entity.y+=dy>0?overY:-overY; }
    }
  }
}

function drawBiomeObstacles(){
  for(const o of biomeObstacles){
    if(o.emerged<=0) continue;
    const ox=Math.round(sx(o.x)), oy=Math.round(sy(o.y));
    const scl=o.emerged;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(scl, scl);
    if(o.type==='tree') drawDeadTree();
    else drawGrave();
    ctx.restore();
  }
}

function drawDeadTree(){
  // Dead tree: dark brown trunk + bare branches
  // Trunk
  ctx.fillStyle='#3b2208';
  ctx.fillRect(-5,-30,10,38);
  // Bark texture lines
  ctx.fillStyle='#2a1804';
  ctx.fillRect(-3,-28,2,32); ctx.fillRect(2,-24,2,28);
  // Main branches
  ctx.strokeStyle='#3b2208'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(-22,-38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(20,-34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-14,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(14,-20); ctx.stroke();
  // Twigs
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-22,-38); ctx.lineTo(-28,-44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-22,-38); ctx.lineTo(-16,-46); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-34);  ctx.lineTo(26,-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-34);  ctx.lineTo(14,-42); ctx.stroke();
  // Root shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0,8,12,4,0,0,Math.PI*2); ctx.fill();
}

function drawGrave(){
  // Stone grave cross
  // Base stone
  ctx.fillStyle='#555566';
  ctx.fillRect(-10,0,20,16);
  // Stone shading
  ctx.fillStyle='#44445a';
  ctx.fillRect(-10,0,3,16); ctx.fillRect(-10,0,20,3);
  ctx.fillStyle='#666677';
  ctx.fillRect(7,2,3,14);
  // Cross vertical
  ctx.fillStyle='#6a6a7a';
  ctx.fillRect(-4,-28,8,32);
  // Cross horizontal
  ctx.fillRect(-14,-20,28,8);
  // Stone texture/moss
  ctx.fillStyle='rgba(80,120,60,0.35)';
  ctx.fillRect(-8,4,5,8); ctx.fillRect(3,8,4,6);
  // Crack
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-2,-10); ctx.lineTo(1,-2); ctx.lineTo(-1,6); ctx.stroke();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0,18,14,5,0,0,Math.PI*2); ctx.fill();
}

function drawBiomeFilter(){
  const bc = getCurrentBiomeColors();
  if(!bc.filter || bc.filterAlpha<=0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, bc.filterAlpha) * 0.85;
  ctx.fillStyle = bc.filter;
  ctx.fillRect(0,0,VW,VH);
  ctx.restore();
}

function drawSnowflakes(){
  if(biome!==2) return;
  const alpha = Math.min(1, biomeTransition);
  ctx.save();
  ctx.globalAlpha = alpha * 0.75;
  ctx.fillStyle = '#ddeeff';
  for(const s of snowflakes){
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function initSnakeBoss(){
  if(snake.active || snake.dead) return;
  snake.active    = true;
  snake.hp        = SNAKE_HP_MAX;
  snake.dead      = false;
  snake.deadTimer = 0;
  snake.everSpawned = true;
  snake.state     = 'hidden';
  snake.stateTimer= 0;
  snake.hiddenTimer= 1; // surface immédiatement
  snake.announced = false;
  snake.fireballs = [];
  snake.fireTimer = 0;
  snake.alpha     = 0;
  snake.shakeTimer= 0;
  // Éliminer tous les zombies à l'écran (explosion dramatique)
  for(const z of zombies){
    if(z.dead) continue;
    if(z.id==='giant'){
      const a=Math.random()*Math.PI*2;
      damageGiant(z, Math.cos(a), Math.sin(a));
    } else {
      z.dead=true; z.deadAnim=38;
      const a=Math.random()*Math.PI*2;
      z.knockX=Math.cos(a)*6; z.knockY=Math.sin(a)*6; z.flyingCorpse=true;
      goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.skin||'#9e9e9e');
    }
  }
  // Première surface position au bord de l'écran visible
  _snakePickSurfacePos();
  // Init segments groupés au point de surface
  snake.segs = [];
  for(let i=0;i<SNAKE_SEGMENTS;i++){
    snake.segs.push({x: snake.surfaceX, y: snake.surfaceY});
  }
  snake.angle = Math.random()*Math.PI*2;
  snake.targetAngle = snake.angle;
  // Annonce
  sfxSnakeBossAppear();

  // ── BOSS : double les power-ups sur le terrain ──
  // Spawn 6 power-ups supplémentaires d'un coup (2× la normale de 3)
  for(let i=0;i<6;i++) spawnPowerup();
  // Réduire l'intervalle de spawn de power-ups de moitié pendant le boss
  powerupExtraInterval = Math.round((2*60) + Math.random()*60); // 2–3s au lieu de 4–6s
  powerupExtraTimer = 0;

  // ── BOSS : activer le spawn lent de zombies (max 10, un par un) ──
  snake.bossZombieSpawnTimer = 0;
  snake.bossZombieSpawnRate = 180; // 1 zombie toutes les 3 secondes (180 frames)
}

function _snakePickSurfacePos(){
  // Choisit un point visible à l'écran, dans le pitch, loin du joueur
  let attempts=0, wx, wy;
  do {
    // Point aléatoire dans la zone visible de la caméra
    const marginWX = (VW/2)/ZOOM * 0.7;
    const marginWY = (VH/2)/ZOOM * 0.7;
    wx = cam.x + (Math.random()-0.5)*2*marginWX;
    wy = cam.y + (Math.random()-0.5)*2*marginWY;
    wx = Math.max(PITCH.x+40, Math.min(PITCH.x+PITCH.w-40, wx));
    wy = Math.max(PITCH.y+40, Math.min(PITCH.y+PITCH.h-40, wy));
    attempts++;
  } while(attempts<30 && Math.hypot(wx-player.x, wy-player.y)<120);
  snake.surfaceX = wx;
  snake.surfaceY = wy;
}

function updateSnakeBoss(){
  if(!snake.active) return;

  // ── Gestion mort ──
  if(snake.dead){
    snake.deadTimer--;
    snake.alpha = Math.max(0, snake.alpha - 0.025);
    // Faire s'effondrer les segments visuellement
    for(let i=0;i<snake.segs.length;i++){
      const s=snake.segs[i];
      s.y += 0.4 + i*0.05; // tombe dans la terre
    }
    if(snake.deadTimer<=0){
      snake.active=false;
      // Marquer le 1er boss comme vaincu (si c'était au désert)
      if(biome===1 && !snake.firstBossDefeated) snake.firstBossDefeated=true;
      // Big score bonus
      score += 500; totalKills++;
      scorePopup(snake.segs[0].x, snake.segs[0].y, 500);
      // ── Restaurer l'intervalle normal des power-ups ──
      powerupExtraInterval = Math.round((4*60) + Math.random()*2*60); // retour 4–6s
      powerupExtraTimer = 0;
    }
    return;
  }

  snake.stateTimer--;
  if(snake.hitFlash>0) snake.hitFlash--;
  if(snake.shakeTimer>0) snake.shakeTimer--;
  // Tick animation terre
  if(snake.earthBurst){ snake.earthBurst.timer--; if(snake.earthBurst.timer<=0) snake.earthBurst=null; }

  // ── Machine d'états ──
  if(snake.state==='hidden'){
    snake.hiddenTimer--;
    if(snake.hiddenTimer<=0){
      // Surface !
      _snakePickSurfacePos();
      for(const s of snake.segs){ s.x=snake.surfaceX; s.y=snake.surfaceY; }
      snake.state='surfacing';
      snake.stateTimer=70; // 70f pour émerger
      snake.alpha=0;
      snake.angle=Math.random()*Math.PI*2;
      snake.targetAngle=snake.angle;
      snake.dirChangeTimer=0;
      // Animation terre — débris d'abord, serpent sort après 35 frames
      snake.earthBurst={ x:snake.surfaceX, y:snake.surfaceY, timer:70, maxTimer:70, type:'emerge' };
      sfxSnakeBossAppear();
      sfxSnakeEarthBurst();
      screenBlast(8);
      // Particules de sable à la surface
      for(let i=0;i<20;i++){
        const a=Math.random()*Math.PI*2, spd=1+Math.random()*3;
        particles.push({x:snake.surfaceX,y:snake.surfaceY,
          vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
          life:60,maxLife:60,color:i%2===0?'#c8a96e':'#b89558',
          sz:3+Math.random()*4,type:'dirt',gravity:0.15,
          bounceCount:0,landed:false,groundY:snake.surfaceY+8,
          rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.2});
      }
      if(!snake.announced){
        snake.announced=true;
        // Announce banner via particule texte
        particles.push({x:cam.x,y:cam.y-40,vx:0,vy:-0.3,
          life:180,maxLife:180,color:'#ff4400',sz:0,text:'⚠ BOSS !'});
      }
    }
    return;
  }

  if(snake.state==='surfacing'){
    // Serpent n'apparaît qu'après la première moitié de l'animation de terre
    const burstProgress = snake.earthBurst ? (snake.earthBurst.maxTimer - snake.earthBurst.timer) / snake.earthBurst.maxTimer : 1;
    if(burstProgress >= 0.45){
      snake.alpha = Math.min(1, snake.alpha + 1.4/70);
    }
    if(snake.stateTimer<=0){
      snake.state='roaming';
      snake.stateTimer = 280 + Math.floor(Math.random()*180); // 4.7–7.7s en surface
      snake.fireTimer = 80;
    }
    // Pendant surfacing déjà un peu de mouvement
    _snakeMove(0.5);
    return;
  }

  if(snake.state==='roaming'){
    snake.alpha = 1;
    _snakeMove(1.0);
    // Son de déplacement du serpent sur le terrain
    sfxSnakeSlither();

    // Tirer une boule de feu périodiquement
    snake.fireTimer--;
    if(snake.fireTimer<=0){
      _snakeShootFireball();
      snake.fireTimer = 90 + Math.floor(Math.random()*60);
    }

    // Attaque joueur au contact (tête)
    const head=snake.segs[0];
    const dPlayer=Math.hypot(head.x-player.x, head.y-player.y);
    if(dPlayer < SNAKE_HEAD_R+player.w/2){
      if(!invincibleMode && !megaDash.active && !samurai.active){
        if(frameCount%30===0){
          player.hp -= 15;
          player.hitFlash=18; player.stunned=40;
          const ka=Math.atan2(player.y-head.y,player.x-head.x);
          player.knockX=Math.cos(ka)*8; player.knockY=Math.sin(ka)*8;
          SFX.playerScream(); screenBlast(12);
        }
      }
    }

    // ── Collision corps du serpent (segments 1+) → joueur projeté + blessé ──
    if(!invincibleMode && !megaDash.active && !samurai.active){
      const BODY_SEG_R = 14; // rayon de collision de chaque segment de corps
      for(let si=1; si<snake.segs.length; si++){
        const seg=snake.segs[si];
        const dSeg=Math.hypot(seg.x-player.x, seg.y-player.y);
        if(dSeg < BODY_SEG_R + player.w/2){
          if(frameCount%40===0){
            player.hp -= 8;
            player.hitFlash=14; player.stunned=40;
            const ka=Math.atan2(player.y-seg.y, player.x-seg.x);
            // Projection plus forte selon la vitesse du serpent
            player.knockX=Math.cos(ka)*10; player.knockY=Math.sin(ka)*10;
            SFX.playerScream(); screenBlast(8);
          }
          break; // un seul hit par frame (évite dommages multiples)
        }
      }
    }

    if(snake.stateTimer<=0){
      snake.state='diving';
      snake.stateTimer=50;
      // Mémoriser la position de plongée pour l'animation de terre
      snake.diveX = snake.segs[0].x;
      snake.diveY = snake.segs[0].y;
      snake.earthBurst={ x:snake.diveX, y:snake.diveY, timer:50, maxTimer:50, type:'dive' };
      sfxSnakeDive();
      sfxSnakeEarthBurst();
    }
    return;
  }

  if(snake.state==='diving'){
    const N2 = snake.segs.length;

    // Initialisation au premier frame de plongée
    if(!snake.diveProgress){
      snake.diveProgress = 0;
      // Position du trou = position actuelle de la tête
      snake.holeX = snake.segs[0].x;
      snake.holeY = snake.segs[0].y;
      snake.segAlphas = new Array(N2).fill(1);
    }

    // Vitesse d'avancement : chaque segment "arrive" au trou à son tour
    // diveProgress va de 0 à N2, un segment par ~5 frames
    snake.diveProgress += 1 / 5;

    // Pour chaque segment : le faire glisser physiquement vers le trou
    // Le segment i commence à bouger quand diveProgress >= i*0.5
    // et disparaît (alpha=0) une fois arrivé au trou
    for(let i = 0; i < N2; i++){
      const startMove = i * 0.6; // décalage : chaque segment suit le précédent
      if(snake.diveProgress < startMove) continue;

      const seg = snake.segs[i];
      const dx = snake.holeX - seg.x;
      const dy = snake.holeY - seg.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if(dist > 3){
        // Vitesse d'attraction vers le trou — accélère à mesure qu'il s'approche
        const spd = Math.min(dist, 4 + (snake.diveProgress - startMove) * 0.8);
        seg.x += (dx / dist) * spd;
        seg.y += (dy / dist) * spd;
        snake.segAlphas[i] = Math.min(1, dist / 30); // fondu quand très proche du trou
      } else {
        // Arrivé au trou — snap et disparaît
        seg.x = snake.holeX;
        seg.y = snake.holeY;
        snake.segAlphas[i] = 0;
      }

      // Particules de sable autour du trou quand le segment plonge
      if(snake.segAlphas[i] > 0 && snake.segAlphas[i] < 0.8 && frameCount%3===0){
        const pa = Math.random()*Math.PI*2, pspd = 0.8+Math.random()*2;
        particles.push({x:snake.holeX, y:snake.holeY,
          vx:Math.cos(pa)*pspd, vy:Math.sin(pa)*pspd - 1.2,
          life:20, maxLife:20,
          color:Math.random()<0.5?'#8b6914':'#a07828',
          sz:2+Math.random()*3, type:'star'});
      }
    }

    // alpha global = max des segments encore visibles
    snake.alpha = Math.max(...snake.segAlphas);

    // Fin : tous les segments sont dans le trou
    const allIn = snake.segAlphas.every(a => a <= 0);
    if(allIn){
      snake.state = 'hidden';
      snake.hiddenTimer = 120;
      snake.alpha = 0;
      snake.diveProgress = 0;
      snake.segAlphas = null;
    }
    return;
  }
}

function _snakeMove(speedMult){
  // Changement de direction aléatoire
  snake.dirChangeTimer--;
  if(snake.dirChangeTimer<=0){
    snake.targetAngle = Math.random()*Math.PI*2;
    snake.dirChangeTimer = 40 + Math.floor(Math.random()*80);
  }

  // Légère attraction vers le joueur (30% du temps)
  if(Math.random()<0.008){
    const head=snake.segs[0];
    snake.targetAngle=Math.atan2(player.y-head.y, player.x-head.x);
  }

  // Steering fluide
  let da = snake.targetAngle - snake.angle;
  while(da>Math.PI) da-=Math.PI*2;
  while(da<-Math.PI) da+=Math.PI*2;
  snake.angle += Math.sign(da)*Math.min(Math.abs(da), snake.turnSpeed);

  // Déplacer la tête
  const head=snake.segs[0];
  const spd=SNAKE_SPEED*speedMult*(fx.slowMo.active?0.2:1);
  head.x += Math.cos(snake.angle)*spd;
  head.y += Math.sin(snake.angle)*spd;

  // Garder dans le pitch (rebondir)
  const margin=30;
  if(head.x<PITCH.x+margin){ head.x=PITCH.x+margin; snake.targetAngle=Math.PI-snake.targetAngle; }
  if(head.x>PITCH.x+PITCH.w-margin){ head.x=PITCH.x+PITCH.w-margin; snake.targetAngle=Math.PI-snake.targetAngle; }
  if(head.y<PITCH.y+margin){ head.y=PITCH.y+margin; snake.targetAngle=-snake.targetAngle; }
  if(head.y>PITCH.y+PITCH.h-margin){ head.y=PITCH.y+PITCH.h-margin; snake.targetAngle=-snake.targetAngle; }

  // Garder visible à l'écran (nudge fort — serpent doit TOUJOURS rester visible)
  const screenMX=(VW/2-80)/ZOOM, screenMY=(VH/2-80)/ZOOM;
  const offX = head.x - cam.x, offY = head.y - cam.y;
  if(Math.abs(offX) > screenMX){
    // Redirection forte vers le centre de l'écran
    snake.targetAngle = Math.atan2(cam.y - head.y, cam.x - head.x);
    // Nudge physique pour éviter de sortir
    if(offX > screenMX)  head.x = Math.min(head.x, cam.x + screenMX);
    if(offX < -screenMX) head.x = Math.max(head.x, cam.x - screenMX);
  }
  if(Math.abs(offY) > screenMY){
    snake.targetAngle = Math.atan2(cam.y - head.y, cam.x - head.x);
    if(offY > screenMY)  head.y = Math.min(head.y, cam.y + screenMY);
    if(offY < -screenMY) head.y = Math.max(head.y, cam.y - screenMY);
  }

  // Chenille : chaque segment suit le précédent à SNAKE_SEG_DIST
  for(let i=1;i<snake.segs.length;i++){
    const prev=snake.segs[i-1], cur=snake.segs[i];
    const dx=cur.x-prev.x, dy=cur.y-prev.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    if(d>SNAKE_SEG_DIST){
      cur.x = prev.x + (dx/d)*SNAKE_SEG_DIST;
      cur.y = prev.y + (dy/d)*SNAKE_SEG_DIST;
    }
  }
}

function _snakeShootFireball(){
  const head=snake.segs[0];
  // Vise le joueur
  const dx=player.x-head.x, dy=player.y-head.y, d=Math.sqrt(dx*dx+dy*dy)||1;
  snake.fireballs.push({
    x:head.x, y:head.y,
    vx:(dx/d)*3.2, vy:(dy/d)*3.2,
    life:180, r:8,
    phase:Math.random()*Math.PI*2,
  });
  sfxSnakeFireball();
  // Particule d'embrasement à la bouche
  for(let i=0;i<8;i++){
    const a=Math.atan2(dy,dx)+(Math.random()-0.5)*0.6;
    particles.push({x:head.x,y:head.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,
      life:16,maxLife:16,color:i%2===0?'#ff6d00':'#ffeb3b',sz:3+Math.random()*4,type:'star'});
  }
}

function updateSnakeFireballs(){
  if(!snake.active) return;
  for(let i=snake.fireballs.length-1;i>=0;i--){
    const fb=snake.fireballs[i];
    fb.x+=fb.vx; fb.y+=fb.vy; fb.life--;
    fb.phase+=0.18;
    // Traîne de feu
    if(frameCount%2===0){
      particles.push({x:fb.x,y:fb.y,vx:(Math.random()-0.5)*0.8,vy:-0.4-Math.random()*0.6,
        life:18,maxLife:18,color:Math.random()<0.5?'#ff6d00':'#ffeb3b',sz:3+Math.random()*3,type:'star'});
    }
    // Hors terrain
    if(fb.life<=0||fb.x<PITCH.x||fb.x>PITCH.x+PITCH.w||fb.y<PITCH.y||fb.y>PITCH.y+PITCH.h){
      // Petite explosion à disparition
      for(let j=0;j<6;j++){
        const a=Math.random()*Math.PI*2;
        particles.push({x:fb.x,y:fb.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,
          life:12,maxLife:12,color:'#ff9800',sz:3,type:'star'});
      }
      snake.fireballs.splice(i,1); continue;
    }
    // Touche le joueur
    if(!invincibleMode && !megaDash.active){
      if(Math.hypot(fb.x-player.x, fb.y-player.y)<fb.r+player.w/2){
        player.hp-=12; player.hitFlash=18; player.stunned=40;
        const ka=Math.atan2(player.y-fb.y,player.x-fb.x);
        player.knockX=Math.cos(ka)*6; player.knockY=Math.sin(ka)*6;
        SFX.playerScream(); screenBlast(8);
        // Explosion au contact
        for(let j=0;j<14;j++){
          const a=Math.random()*Math.PI*2;
          particles.push({x:fb.x,y:fb.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,
            life:18,maxLife:18,color:j%2===0?'#ff6d00':'#ffeb3b',sz:4+Math.random()*4,type:'star'});
        }
        snake.fireballs.splice(i,1); continue;
      }
    }
  }
}

function hitSnakeBoss(ballVx, ballVy){
  if(!snake.active||snake.dead||snake.state==='hidden'||snake.state==='diving') return false;
  snake.hp--;
  snake.hitFlash=18;
  snake.shakeTimer=12;
  sfxSnakeHit();
  screenBlast(7);
  // Particules d'os brisés
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x:snake.segs[0].x,y:snake.segs[0].y,
      vx:Math.cos(a)*(2+Math.random()*3), vy:Math.sin(a)*(2+Math.random()*3)-1,
      life:40,maxLife:40,color:i%3===0?'#eeeecc':i%3===1?'#ddddaa':'#c8a96e',
      sz:2+Math.random()*4,type:'star'});
  }
  scorePopup(snake.segs[0].x, snake.segs[0].y-20, 50);
  score+=50;

  if(snake.hp<=0){
    snake.dead=true;
    snake.deadTimer=90;
    bossKills++;
    sfxSnakeDie();
    screenBlast(20);
    // Grande explosion d'os + sable
    for(let i=0;i<40;i++){
      const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
      particles.push({x:snake.segs[Math.floor(Math.random()*snake.segs.length)].x,
        y:snake.segs[Math.floor(Math.random()*snake.segs.length)].y,
        vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
        life:60,maxLife:60,
        color:i%4===0?'#eeeecc':i%4===1?'#c8a96e':i%4===2?'#ffeb3b':'#ff6d00',
        sz:3+Math.random()*6,type:'chunk',gravity:0.18,
        bounceCount:0,landed:false,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.4,
        groundY:snake.segs[0].y+15+Math.random()*20});
    }
    scorePopup(snake.segs[0].x, snake.segs[0].y-30, 500);
  }
  return true;
}

// ── Vérification collision balle ↔ serpent (TÊTE SEULEMENT) ──
function checkBallSnakeHit(bx, by, bvx, bvy){
  if(!snake.active||snake.dead||snake.state==='hidden'||snake.state==='diving'||snake.alpha<0.3) return false;
  // Collision carrée sur la tête uniquement (index 0)
  const head=snake.segs[0];
  const HIT_R = SNAKE_HEAD_R + 6; // un peu de marge
  if(Math.hypot(bx-head.x, by-head.y) < HIT_R){
    hitSnakeBoss(bvx,bvy);
    return true;
  }
  return false;
}

// ── DRAW SERPENT SQUELETTE ──
function drawSnakeBoss(){
  if(!snake.active) return;

  // ── Trou persistant pendant la plongée ──
  if(snake.state==='diving' && snake.holeX !== undefined){
    const hbx = Math.round(sx(snake.holeX)), hby = Math.round(sy(snake.holeY));
    ctx.save();
    // Trou sombre pulsant
    const holeR = 22 * ZOOM / 2.4;
    const holeGrad = ctx.createRadialGradient(hbx, hby, 0, hbx, hby, holeR);
    holeGrad.addColorStop(0, 'rgba(5,3,0,1)');
    holeGrad.addColorStop(0.45, 'rgba(30,15,5,0.92)');
    holeGrad.addColorStop(0.75, 'rgba(80,45,10,0.55)');
    holeGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = holeGrad;
    ctx.beginPath(); ctx.arc(hbx, hby, holeR, 0, Math.PI*2); ctx.fill();
    // Fissures autour du trou
    ctx.strokeStyle = 'rgba(40,20,5,0.7)'; ctx.lineWidth = 1.5;
    for(let c=0;c<6;c++){
      const ca = (c/6)*Math.PI*2;
      const cl = holeR * (0.5 + 0.5*Math.sin(c*5.1+1.8));
      ctx.beginPath();
      ctx.moveTo(hbx + Math.cos(ca)*4, hby + Math.sin(ca)*4);
      ctx.lineTo(hbx + Math.cos(ca)*cl, hby + Math.sin(ca)*cl);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── Animation de terre (débris) — indépendante de l'alpha du serpent ──
  if(snake.earthBurst){
    const eb=snake.earthBurst;
    const prog=(eb.maxTimer-eb.timer)/eb.maxTimer; // 0→1
    const bx=Math.round(sx(eb.x)), by=Math.round(sy(eb.y));
    ctx.save();
    // Cratère / fissure au sol
    const crackAlpha = eb.type==='emerge'
      ? (prog<0.5 ? prog*2 : 1-(prog-0.5)*2)
      : (prog<0.3 ? prog/0.3 : 1-(prog-0.3)/0.7);
    ctx.globalAlpha=Math.max(0,crackAlpha)*0.9;
    // Trou sombre au sol
    const crR=(18+prog*28)*ZOOM/2.4;
    const crGrad=ctx.createRadialGradient(bx,by,0,bx,by,crR);
    crGrad.addColorStop(0,'rgba(20,10,5,0.95)');
    crGrad.addColorStop(0.35,'rgba(60,30,10,0.75)');
    crGrad.addColorStop(0.65,'rgba(100,60,20,0.4)');
    crGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=crGrad;
    ctx.beginPath(); ctx.arc(bx,by,crR,0,Math.PI*2); ctx.fill();
    // Fissures rayonnantes
    ctx.strokeStyle=`rgba(40,20,5,${crackAlpha*0.85})`;
    ctx.lineWidth=2;
    const nCracks=8;
    for(let c=0;c<nCracks;c++){
      const a=(c/nCracks)*Math.PI*2;
      const len=(crR*0.5+crR*0.5*Math.sin(c*7.3+1.2))*(0.5+prog*0.6);
      ctx.beginPath();
      ctx.moveTo(bx+Math.cos(a)*4, by+Math.sin(a)*4);
      ctx.lineTo(bx+Math.cos(a)*len, by+Math.sin(a)*len);
      ctx.stroke();
    }
    // Débris de terre projetés (particules dessinées directement ici pour timing précis)
    if(prog<0.7){
      const nD=14;
      for(let d=0;d<nD;d++){
        const seed=d*137.508;
        const a=(seed%Math.PI*2);
        const spd=prog*(2.5+((seed*3.7)%2.5));
        const dx=Math.cos(a)*spd*crR*0.9;
        const dy=Math.sin(a)*spd*crR*0.9 - prog*crR*1.4; // parabole vers le haut
        const gravity=prog*prog*crR*1.2;
        const dbx=bx+dx, dby=by+dy+gravity;
        const dbr=Math.max(1,(3+((seed*2.1)%5))*(1-prog*0.6)*ZOOM/2.4);
        ctx.globalAlpha=Math.max(0,(1-prog*1.3)*crackAlpha);
        ctx.fillStyle=d%3===0?'#8b6914':d%3===1?'#a07828':'#6b4f0f';
        ctx.beginPath(); ctx.arc(dbx, dby, dbr, 0, Math.PI*2); ctx.fill();
      }
    }
    // Nuage de poussière
    if(prog<0.8){
      const dustAlpha=Math.max(0,(0.8-prog)*crackAlpha*0.55);
      const dustR=crR*(0.9+prog*0.8);
      const dustGrad=ctx.createRadialGradient(bx,by-dustR*0.3,0,bx,by,dustR);
      dustGrad.addColorStop(0,`rgba(200,160,80,${dustAlpha})`);
      dustGrad.addColorStop(0.5,`rgba(160,120,50,${dustAlpha*0.5})`);
      dustGrad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=1;
      ctx.fillStyle=dustGrad;
      ctx.beginPath(); ctx.arc(bx,by-dustR*0.15,dustR,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  if(snake.alpha<=0) return;

  const N=snake.segs.length;

  // ── Corps : segments "vertèbres" ──
  for(let i=N-1;i>=1;i--){
    const s=snake.segs[i];
    const scx=Math.round(sx(s.x)), scy=Math.round(sy(s.y));
    const ratio=1-(i/N)*0.5;
    const segR=Math.round((9-i*0.35)*ratio*ZOOM*0.92);
    if(segR<2) continue;

    // Alpha individuel pendant la plongée, sinon alpha global
    const segA = (snake.state==='diving' && snake.segAlphas) ? snake.segAlphas[i] : 1;
    if(segA <= 0) continue;

    const shake = snake.shakeTimer>0 ? (Math.random()-0.5)*4 : 0;
    const cx2=scx+shake;
    const flashCol = snake.hitFlash>0&&frameCount%2===0;

    ctx.save();
    ctx.globalAlpha = snake.alpha * segA;

    // Ombre douce
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.arc(cx2+2, scy+3, segR*1.05, 0,Math.PI*2);
    ctx.fill();

    // ── PIQUES autour du segment ──
    const nSpikes = 8;
    const spikeLen = segR * 0.6;  // plus court
    const spikeBase = segR * 0.14; // base très étroite = très pointu
    const spikeColor = flashCol ? '#ff6666' : '#b8a050';
    const spikeTip   = flashCol ? '#ffaaaa' : '#ffe080';
    for(let k=0;k<nSpikes;k++){
      const ang3 = (k / nSpikes) * Math.PI * 2 + (i * 0.4); // décalage par segment = effet spirale
      const bx1 = cx2 + Math.cos(ang3) * (segR * 0.85);
      const by1 = scy + Math.sin(ang3) * (segR * 0.85);
      const tx2 = cx2 + Math.cos(ang3) * (segR + spikeLen);
      const ty2 = scy + Math.sin(ang3) * (segR + spikeLen);
      const lx2 = cx2 + Math.cos(ang3 - 0.12) * (segR * 0.9);
      const ly2 = scy + Math.sin(ang3 - 0.12) * (segR * 0.9);
      const rx2 = cx2 + Math.cos(ang3 + 0.12) * (segR * 0.9);
      const ry2 = scy + Math.sin(ang3 + 0.12) * (segR * 0.9);
      // Pique triangulaire
      ctx.fillStyle=spikeColor;
      ctx.beginPath();
      ctx.moveTo(lx2, ly2);
      ctx.lineTo(tx2, ty2);
      ctx.lineTo(rx2, ry2);
      ctx.closePath();
      ctx.fill();
      // Contour net pour accentuer la pointe
      ctx.strokeStyle = flashCol ? '#ff9999' : '#8a6820';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Os vertèbre — CERCLE PARFAIT
    const boneColor = flashCol ? '#ff4444' : (i%2===0?'#e8e0c0':'#d4cc9a');
    ctx.fillStyle=boneColor;
    ctx.beginPath();
    ctx.arc(cx2, scy, segR, 0,Math.PI*2);
    ctx.fill();
    // Détail vertèbre (ligne centrale)
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx2-segR+2, scy);
    ctx.lineTo(cx2+segR-2, scy);
    ctx.stroke();
    // Particules de sable autour (désert)
    if(biome===1 && frameCount%10===0 && i===Math.floor(N/2) && snake.state==='roaming'){
      const a=Math.random()*Math.PI*2;
      particles.push({x:s.x,y:s.y,vx:Math.cos(a)*0.4,vy:-0.3-Math.random()*0.4,
        life:20,maxLife:20,color:'#c8a96e',sz:2,type:'star'});
    }
    ctx.restore(); // ferme le save par segment
  }

  // ── Tête — CARRÉE, plus grande que les segments ──
  const head=snake.segs[0];
  const hx=Math.round(sx(head.x)), hy=Math.round(sy(head.y));
  const ang=snake.angle;
  const shake0=snake.shakeTimer>0?(Math.random()-0.5)*5:0;
  const flashH=snake.hitFlash>0&&frameCount%2===0;
  const HS=26;

  // Alpha de la tête pendant la plongée
  const headA = (snake.state==='diving' && snake.segAlphas) ? snake.segAlphas[0] : 1;

  ctx.save();
  ctx.globalAlpha = snake.alpha * headA;
  ctx.translate(hx+shake0, hy);
  ctx.rotate(ang);

  // Ombre tête (carré décalé)
  ctx.fillStyle='rgba(0,0,0,0.32)';
  ctx.fillRect(-HS+4, -HS+4, HS*2, HS*2);

  // Crâne carré principal
  ctx.fillStyle = flashH ? '#ff3333' : '#ece8c0';
  ctx.fillRect(-HS, -HS, HS*2, HS*2);

  // Biseau/relief : gradient sombre sur les bords
  const headGrad=ctx.createLinearGradient(-HS,-HS, HS, HS);
  headGrad.addColorStop(0,'rgba(255,255,230,0.18)');
  headGrad.addColorStop(0.4,'rgba(0,0,0,0)');
  headGrad.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=headGrad; ctx.fillRect(-HS,-HS,HS*2,HS*2);

  // Contour carré net
  ctx.strokeStyle = flashH ? '#ff6666' : 'rgba(80,60,20,0.7)';
  ctx.lineWidth=2.5;
  ctx.strokeRect(-HS,-HS,HS*2,HS*2);

  // Sutures crâniennes (lignes de fracture)
  ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(0,-HS); ctx.lineTo(0,HS); ctx.stroke();       // verticale
  ctx.beginPath(); ctx.moveTo(-HS,0); ctx.lineTo(HS,0); ctx.stroke();       // horizontale
  ctx.beginPath(); ctx.moveTo(-HS*0.5,-HS); ctx.lineTo(0,-HS*0.4); ctx.lineTo(HS*0.5,-HS); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-HS,-HS*0.5); ctx.lineTo(-HS*0.4,0); ctx.lineTo(-HS,HS*0.5); ctx.stroke();

  // Museau carré avancé (avant de la tête)
  ctx.fillStyle = flashH ? '#ff4444' : '#d4cc9a';
  ctx.fillRect(HS, -HS*0.38, HS*0.55, HS*0.76);
  ctx.strokeStyle = flashH ? '#ff6666' : 'rgba(80,60,20,0.6)';
  ctx.lineWidth=2;
  ctx.strokeRect(HS, -HS*0.38, HS*0.55, HS*0.76);

  // Mâchoire inférieure — plaque carrée dessous
  ctx.fillStyle = flashH ? '#ff5555' : '#c8c090';
  ctx.fillRect(HS*0.1, HS*0.45, HS*1.2, HS*0.55);
  ctx.strokeStyle='rgba(60,40,10,0.5)'; ctx.lineWidth=1.5;
  ctx.strokeRect(HS*0.1, HS*0.45, HS*1.2, HS*0.55);
  // Dents — petits rectangles sur la mâchoire
  ctx.fillStyle='#fffff0';
  for(let t=0;t<5;t++){
    const tx2 = HS*0.15 + t*(HS*1.1/5);
    ctx.fillRect(tx2, HS*0.42, HS*0.14, HS*0.22);    // dents sup
    ctx.fillRect(tx2, HS*0.9, HS*0.14, HS*0.24);     // dents inf
  }
  // Crochets venimeux — triangles plus marqués
  ctx.fillStyle='#ffffcc';
  ctx.beginPath(); ctx.moveTo(HS*0.7,HS*0.45); ctx.lineTo(HS*0.9,HS*0.0); ctx.lineTo(HS*1.1,HS*0.45); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(HS*1.0,HS*0.45); ctx.lineTo(HS*1.2,-HS*0.05); ctx.lineTo(HS*1.4,HS*0.45); ctx.closePath(); ctx.fill();

  // Orbites oculaires — carrées aussi !
  const eyeS=HS*0.38;
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(-HS*0.55-eyeS/2, -HS*0.55-eyeS/2, eyeS, eyeS); // œil haut
  ctx.fillRect(-HS*0.55-eyeS/2,  HS*0.55-eyeS/2, eyeS, eyeS); // œil bas
  // Yeux rougeoyants — pulsent
  const eyePulse=0.6+0.4*Math.sin(frameCount*0.15);
  const eyeInS=eyeS*0.68;
  ctx.shadowColor='#ff2200'; ctx.shadowBlur=10*eyePulse;
  ctx.fillStyle=`rgba(255,${Math.round(60*eyePulse)},0,${0.85+0.15*eyePulse})`;
  ctx.fillRect(-HS*0.55-eyeInS/2, -HS*0.55-eyeInS/2, eyeInS, eyeInS);
  ctx.fillRect(-HS*0.55-eyeInS/2,  HS*0.55-eyeInS/2, eyeInS, eyeInS);
  ctx.shadowBlur=0;
  // Reflets oculaires
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillRect(-HS*0.62, -HS*0.63, eyeS*0.28, eyeS*0.28);
  ctx.fillRect(-HS*0.62,  HS*0.45, eyeS*0.28, eyeS*0.28);

  // Langue fourchue (animée)
  if(snake.state==='roaming'){
    const lt=0.8+0.2*Math.sin(frameCount*0.28);
    ctx.strokeStyle=`rgba(220,20,20,${lt})`; ctx.lineWidth=2.5; ctx.lineCap='round';
    const lx=HS+HS*0.55;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx+10,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx+10,0); ctx.lineTo(lx+18,-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx+10,0); ctx.lineTo(lx+18,6); ctx.stroke();
  }

  ctx.restore(); // tête

  // ── Boules de feu ──
  for(const fb of snake.fireballs){
    const fbx=Math.round(sx(fb.x)), fby=Math.round(sy(fb.y));
    const pulse=0.7+0.3*Math.sin(fb.phase);
    ctx.save();
    ctx.shadowColor='#ff6d00'; ctx.shadowBlur=16*pulse;
    ctx.globalAlpha=snake.alpha;
    // Sphère de feu — 2x plus grosse
    const fbR = fb.r*ZOOM*0.84;
    const grad=ctx.createRadialGradient(fbx-3,fby-3,1,fbx,fby,fbR);
    grad.addColorStop(0,'#ffffff'); grad.addColorStop(0.2,'#ffffaa'); grad.addColorStop(0.55,'#ff8800'); grad.addColorStop(1,'rgba(180,30,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(fbx,fby,fbR,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // ── HP bar boss ──
  if(snake.state==='roaming'||snake.state==='surfacing'){
    const bw=120, bh=10, bx2=VW/2-bw/2, by2=VH-80;
    ctx.globalAlpha=1;
    // Fond
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(bx2-4,by2-18,bw+8,bh+24);
    ctx.fillStyle='#222'; ctx.fillRect(bx2,by2,bw,bh);
    // Barre HP
    const hpProg=snake.hp/SNAKE_HP_MAX;
    const hpC=hpProg>0.6?'#ff6600':hpProg>0.3?'#ff3300':'#cc0000';
    ctx.fillStyle=hpC; ctx.fillRect(bx2,by2,bw*hpProg,bh);
    // Effet brillant
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx2,by2,bw*hpProg,bh/2);
    // Label
    ctx.fillStyle='#ff6600'; ctx.font='bold 10px Courier New'; ctx.textAlign='center';
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=6;
    ctx.fillText('💀 SERPENT BOSS — '+snake.hp+'/'+SNAKE_HP_MAX, VW/2, by2-4);
    ctx.shadowBlur=0;
    // Points de HP
    for(let h=0;h<SNAKE_HP_MAX;h++){
      const dotX=bx2+h*(bw/SNAKE_HP_MAX)+4;
      ctx.fillStyle=h<snake.hp?'#ff6600':'#333';
      ctx.beginPath(); ctx.arc(dotX,by2+bh+8,3,0,Math.PI*2); ctx.fill();
    }
  }

  // ── Flèche directionnelle si la tête du serpent est hors écran ──
  if(snake.active && !snake.dead && snake.alpha > 0.3 && (snake.state==='roaming'||snake.state==='surfacing')){
    const head=snake.segs[0];
    const hsx=sx(head.x), hsy=sy(head.y);
    const margin=50;
    if(hsx < margin || hsx > VW-margin || hsy < margin || hsy > VH-margin){
      // Calcul angle vers la tête
      const ang2=Math.atan2(hsy - VH/2, hsx - VW/2);
      // Point sur le bord de l'écran
      const edgeX=Math.max(margin, Math.min(VW-margin, VW/2 + Math.cos(ang2)*180));
      const edgeY=Math.max(margin, Math.min(VH-margin, VH/2 + Math.sin(ang2)*180));
      ctx.save();
      const pulse2=0.7+0.3*Math.sin(frameCount*0.2);
      ctx.globalAlpha=0.9*pulse2;
      ctx.translate(edgeX, edgeY);
      ctx.rotate(ang2);
      // Flèche triangle
      ctx.fillStyle='#ff4400';
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-10, 10);
      ctx.closePath();
      ctx.fill();
      // Texte "BOSS"
      ctx.rotate(-ang2);
      ctx.fillStyle='#ff6600';
      ctx.font='bold 9px Courier New';
      ctx.textAlign='center';
      ctx.fillText('BOSS', 0, -14);
      ctx.shadowBlur=0;
      ctx.restore();
    }
  }

  // ── Indicateur "sous terre" quand caché ──
  if((snake.state==='hidden'||snake.state==='diving') && snake.announced && !snake.dead){
    // Petite icone + timer sur la minimap (géré ailleurs)
    // Flash position de surface à venir sur terrain
    if(snake.state==='hidden' && snake.hiddenTimer<60){
      const sx2=Math.round(sx(snake.surfaceX)), sy2=Math.round(sy(snake.surfaceY));
      const alpha=(60-snake.hiddenTimer)/60;
      ctx.save();
      ctx.globalAlpha=alpha*0.7*((frameCount%12<6)?1:0.4);
      ctx.strokeStyle='#ff6600'; ctx.lineWidth=2;
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(sx2,sy2,18+Math.random()*4,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
      // Croix de visée
      ctx.strokeStyle='rgba(255,100,0,0.8)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(sx2-14,sy2); ctx.lineTo(sx2+14,sy2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx2,sy2-14); ctx.lineTo(sx2,sy2+14); ctx.stroke();
      ctx.restore();
    }
  }
}

function countAliveGiants(){ return zombies.filter(z=>!z.dead&&z.id==='giant').length; }

function zombieTypeForWave(){
  const r = Math.random();
  if(snake.firstBossDefeated && r < 0.08 && countAliveGiants() < 2) return 4; // giant — après mort du 1er boss
  if(wave >= 2 && r < 0.18) return 3; // fast
  if(wave >= 4 && r < 0.10) return 2; // tank
  if(wave >= 2 && r < 0.26) return 1; // big
  return 0; // normal
}

// Track how many dig-spawn zombies are currently emerging on screen
function countEmerging(){ return zombies.filter(z=>!z.dead&&z.emerging>0).length; }

function spawnZombie(immediate){
  const margin = 35;
  let wx2, wy2;
  let isDigSpawn = false;

  if(immediate){
    // Edge spawn (off-screen)
    const side = Math.floor(Math.random()*4);
    const offMin = (VW/ZOOM)*0.55, offMax = (VW/ZOOM)*1.5;
    const offX = offMin + Math.random()*(offMax-offMin);
    const offY = (VH/ZOOM)*0.55 + Math.random()*((VH/ZOOM)*0.8);
    if(side===0)      { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y-offY; }
    else if(side===1) { wx2=player.x+offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
    else if(side===2) { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y+offY; }
    else              { wx2=player.x-offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
  } else {
    // Dig spawn: random pitch position, not too close to player
    // Max 4-5 dig zombies on screen at once
    if(countEmerging() >= 4){
      // Fallback to edge spawn if too many already digging
      const side = Math.floor(Math.random()*4);
      const offMin = (VW/ZOOM)*0.6, offMax = (VW/ZOOM)*1.5;
      const offX = offMin + Math.random()*(offMax-offMin);
      const offY = (VH/ZOOM)*0.6 + Math.random()*((VH/ZOOM)*0.8);
      if(side===0)      { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y-offY; }
      else if(side===1) { wx2=player.x+offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
      else if(side===2) { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y+offY; }
      else              { wx2=player.x-offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
    } else {
      // Dig out of ground on pitch — can spawn near player for drama
      const minDist = 80, maxDist = (VW/ZOOM)*0.85;
      let attempts=0;
      do {
        const angle = Math.random()*Math.PI*2;
        const dist = minDist + Math.random()*(maxDist-minDist);
        wx2 = player.x + Math.cos(angle)*dist;
        wy2 = player.y + Math.sin(angle)*dist;
        attempts++;
      } while(attempts<15 && (wx2<PITCH.x+margin||wx2>PITCH.x+PITCH.w-margin||wy2<PITCH.y+margin||wy2>PITCH.y+PITCH.h-margin));
      isDigSpawn = true;
    }
  }

  wx2 = Math.max(PITCH.x+margin, Math.min(PITCH.x+PITCH.w-margin, wx2));
  wy2 = Math.max(PITCH.y+margin, Math.min(PITCH.y+PITCH.h-margin, wy2));

  const ti = zombieTypeForWave();
  const tmpl = ZTYPES[ti];
  const spdActual = tmpl.spd + (Math.random()-0.5)*tmpl.spdVar*2;
  // Pick random skin/clothing variants
  const zSkin   = tmpl.skins[Math.floor(Math.random()*tmpl.skins.length)];
  const zShirt  = tmpl.shirts[Math.floor(Math.random()*tmpl.shirts.length)];
  const zPants  = tmpl.pants[Math.floor(Math.random()*tmpl.pants.length)];
  // Direction: face toward player initially
  const initDir = (player.x > wx2) ? 1 : -1;

  zombies.push({
    ...tmpl,
    x:wx2, y:wy2,
    hp:tmpl.maxHp,
    spd: Math.max(0.1, spdActual),
    // Speed variant: 30% of zombies are "slow" (0.55–0.75×), rest are normal-to-fast (0.85–1.15×)
    speedVariant: Math.random()<0.30 ? 0.55+Math.random()*0.20 : 0.85+Math.random()*0.30,
    vx:0, vy:0,
    knockX:0, knockY:0,
    dead:false, deadAnim:0,
    animFrame:0, hitFlash:0,
    nextGrowl: frameCount + Math.floor(Math.random()*300+80),
    blinkPhase: Math.random()*Math.PI*2,
    skin: zSkin, shirt: zShirt, pants: zPants,
    dir: initDir,
    emerging: isDigSpawn ? 180 : 0, // 180 frames (3s) slow dig-out animation
    emergeY: wy2,                   // ground level
    // Giant jump state
    jumpPhase: 0,       // 0=grounded, 1=charging, 2=airborne, 3=landing
    jumpTimer: 0,
    jumpCooldown: 0,
    jumpStartX: 0, jumpStartY: 0,
    jumpTargetX: 0, jumpTargetY: 0,
    jumpDuration: 0,
    jumpArcH: 0,
  });
  // Spawn dirt particles at dig location
  if(isDigSpawn){ spawnDirt(wx2, wy2); SFX.zombieEmerge(); }
}

let joystickActive=false, joystickBase={x:0,y:0}, joystickDelta={x:0,y:0};

canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); getAC();
  const t=e.touches[0], r=canvas.getBoundingClientRect();
  const scX=VW/r.width, scY=VH/r.height;
  const tx=(t.clientX-r.left)*scX, ty=(t.clientY-r.top)*scY;
  // Pause button zone: bottom-right 48×48
  if(!gameOver && tx>VW-48 && ty>VH-48){ togglePause(); return; }
  // Invincible mode checkbox (only when paused)
  if(isPaused){ updateInvincCbY(); if(tx>=INVINC_CB.x && tx<=INVINC_CB.x+INVINC_CB.w && ty>=INVINC_CB.y && ty<=INVINC_CB.y+INVINC_CB.h){ invincibleMode=!invincibleMode; return; } }
  // Auto kick checkbox (only when paused)
  if(isPaused){ updateAutoKickCbY(); if(tx>=AUTOKICK_CB.x && tx<=AUTOKICK_CB.x+AUTOKICK_CB.w && ty>=AUTOKICK_CB.y && ty<=AUTOKICK_CB.y+AUTOKICK_CB.h){ autoKick=!autoKick; return; } }
  // Play button (only when paused)
  if(isPaused){ updatePlayBtnY(); if(tx>=PLAY_BTN.x && tx<=PLAY_BTN.x+PLAY_BTN.w && ty>=PLAY_BTN.y && ty<=PLAY_BTN.y+PLAY_BTN.h){ togglePause(); return; } }
  // Go to Home button (only when paused)
  if(isPaused){ updateHomeBtnY(); if(tx>=HOME_BTN.x && tx<=HOME_BTN.x+HOME_BTN.w && ty>=HOME_BTN.y && ty<=HOME_BTN.y+HOME_BTN.h){ goToHome(); return; } }
  // Mega Power button zone (low hp emergency)
  if(!gameOver && !megaDash.active && megaDash.lowHpBtn &&
     tx>=MEGA_BTN.x && tx<=MEGA_BTN.x+MEGA_BTN.w &&
     ty>=MEGA_BTN.y && ty<=MEGA_BTN.y+MEGA_BTN.h){
    megaDash.lowHpFreezeTimer = 0; // exit freeze immediately
    startMegaDash(); return;
  }
  joystickBase={x:tx,y:ty}; joystickDelta={x:0,y:0}; joystickActive=true;
  // Mémoriser le début du touch pour détecter un tap court
  joystickBase._tapStartTime = Date.now();
  joystickBase._tapMoved = false;
},{passive:false});

canvas.addEventListener('click', e=>{

  if(isPaused){ updateHomeBtnY(); if(tx>=HOME_BTN.x && tx<=HOME_BTN.x+HOME_BTN.w && ty>=HOME_BTN.y && ty<=HOME_BTN.y+HOME_BTN.h){ goToHome(); return; } }
  // Mega Power button (low hp emergency) — also handles click during freeze

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!joystickActive)return;
  const t=e.touches[0], r=canvas.getBoundingClientRect();
  const scX=VW/r.width, scY=VH/r.height;
  const dx=(t.clientX-r.left)*scX-joystickBase.x;
  const dy=(t.clientY-r.top)*scY-joystickBase.y;
  const d=Math.sqrt(dx*dx+dy*dy), maxR=55;
  if(d>8) joystickBase._tapMoved = true; // mouvement significatif → pas un tap
  joystickDelta.x = d>maxR?(dx/d)*maxR:dx;
  joystickDelta.y = d>maxR?(dy/d)*maxR:dy;
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  // Tap court sans mouvement = tir manuel du ballon / extra balls
  // Toujours actif : le tap déclenche manualKickRequest dans tous les cas
  // (autoKick gère le tir auto du ballon principal indépendamment)
  if(joystickBase && !joystickBase._tapMoved){
    const elapsed = Date.now() - (joystickBase._tapStartTime||0);
    if(elapsed < 220 && !gameOver && !isPaused) manualKickRequest = true;
  }
  joystickActive=false; joystickDelta={x:0,y:0};
},{passive:false});

function nearestVisible(){
  // ── PRIORITÉ : tête du serpent boss si actif et visible ──
  if(snake.active && !snake.dead && (snake.state==='roaming'||snake.state==='surfacing') && snake.alpha>0.3){
    const head=snake.segs[0];
    const scx=sx(head.x), scy=sy(head.y);
    if(scx>=-40 && scx<=VW+40 && scy>=-40 && scy<=VH+40){
      currentTarget = null; // snake head has no zombie object
      return { x:head.x, y:head.y, _isSnakeHead:true };
    }
  }
  // Zombie must be visible on screen (any part visible)
  let best=null, bestD=Infinity;
  for(const z of zombies){
    if(z.dead) continue;
    if(z.emerging>0) continue;
    if(z.onFire) continue; // already burning — treated as dead, don't target
    if(z.frozen && fx.iceBall.active) continue; // already frozen — skip to hit fresh targets
    const scx=sx(z.x), scy=sy(z.y);
    const hw = (z.w||14)*ZOOM*0.5, hh = (z.h||20)*ZOOM*0.5;
    // Accept if any part of zombie sprite is within screen bounds
    if(scx+hw < 0 || scx-hw > VW || scy+hh < 0 || scy-hh > VH) continue;
    const dx=z.x-player.x, dy=z.y-player.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestD){bestD=d;best=z;}
  }
  currentTarget = best;
  return best;
}

function spawnDirt(wx2, wy2){
  // Dirt hole puddle (stays for 3s like blood)
  for(let i=0;i<5;i++){
    particles.push({x:wx2+(Math.random()-0.5)*8, y:wy2+(Math.random()-0.5)*6,
      vx:0, vy:0, life:360, maxLife:360,
      color: i%2===0 ? '#5d4037' : '#4e342e',
      sz:4+Math.random()*5, type:'puddle', gravity:0});
  }
  // Flying dirt clumps
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*3;
    particles.push({x:wx2, y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
      life:360, maxLife:360,
      color: Math.random()<0.6?'#6d4c41':'#795548',

      bounceCount:0, landed:false, groundY:wy2+5+Math.random()*8,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2});
  }
}

// Gore explosion: zombie bursts in the direction of the hit
// dirX/dirY = direction the zombie was knocked (ball impact direction)
function goreExplosion(wx2,wy2,dirX,dirY,zColor){
  // 1. Directional blood splatter — speed halved
  for(let i=0;i<35;i++){
    const spread=(Math.random()-0.5)*2.1;
    const baseAngle=Math.atan2(dirY,dirX);
    const a=baseAngle+spread;
    const spd=(3+Math.random()*9)*0.5; // ×0.5
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:40+Math.random()*30,maxLife:70,
      color:Math.random()<0.7?C.blood:'#8b0000',
      sz:2+Math.random()*4, type:'blood', gravity:0.08});
  }

  // 2. Body chunks — speed halved
  const chunkColors=[zColor||'#9e9e9e','#888',C.blood,'#555','#c62828'];
  for(let i=0;i<18;i++){
    const spread=(Math.random()-0.5)*2.5;
    const baseAngle=Math.atan2(dirY,dirX);
    const a=baseAngle+spread;
    const spd=(4+Math.random()*10)*0.5; // ×0.5
    const col=chunkColors[Math.floor(Math.random()*chunkColors.length)];
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1, // -1 instead of -2
      life:660, maxLife:660,
      color:col, sz:3+Math.random()*5,
      type:'chunk', gravity:0.18,
      bounceCount:0, landed:false,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.4,
      groundY: wy2+10+Math.random()*20});
  }

  // 3. Blood puddles — speed halved
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2;
    const spd=(0.8+Math.random()*2.5)*0.5; // ×0.5
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:660, maxLife:660,
      color:'#7b0000', sz:4+Math.random()*7,
      type:'puddle', gravity:0});
  }
}

// ══════════════════════════════════════
// GIANT DEATH EXPLOSION
// ══════════════════════════════════════
function giantDeathExplosion(z, dirX, dirY){
  const cx=z.x, cy=z.y;
  const skin=z.skin||'#9e9e9e', shirt=z.shirt||'#c62828';

  // 8 gore explosions spread around the giant's body
  for(let i=0;i<8;i++){
    const spread = (i/8)*Math.PI*2;
    const ox = cx + Math.cos(spread)*(12+Math.random()*18);
    const oy = cy + (Math.sin(spread)*0.7)*(12+Math.random()*18);
    const da = spread + (Math.random()-0.5)*0.8;
    goreExplosion(ox, oy, Math.cos(da), Math.sin(da), i%2===0?skin:shirt);
  }
  // Central explosion
  goreExplosion(cx, cy, dirX||Math.cos(Math.random()*Math.PI*2), dirY||Math.sin(Math.random()*Math.PI*2), skin);

  // Extra blood puddles under the giant
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*40;
    particles.push({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r*0.5,
      vx:0, vy:0, life:900, maxLife:900,
      color:Math.random()<0.7?'#7b0000':'#c62828', sz:6+Math.random()*10,
      type:'puddle', gravity:0});
  }

  // ── FALLING HEAD ──
  // Head starts at top of giant (approx 80 units up = h)
  const headX = cx + (z.dir||1)*4;
  const headY = cy - z.h*0.9;
  const headSkin = skin;
  // Initial velocity: small horizontal + upward burst, then gravity
  const hVx = (dirX||0)*2 + (Math.random()-0.5)*4;
  const hVy = -5 - Math.random()*3; // shoots up
  const hRot = (Math.random()-0.5)*0.3; // spin

  // We store the head as a special particle with type 'giantHead'
  particles.push({
    type: 'giantHead',
    x: headX, y: headY,
    vx: hVx, vy: hVy,
    rot: Math.random()*Math.PI*2,
    rotV: hRot,
    life: 200, maxLife: 200,
    bounces: 0, maxBounces: 2,
    groundY: cy + 4, // land on giant's feet level
    skin: headSkin,
    shirt: shirt,
    dir: z.dir||1,
    exploded: false,
    sz: 0, // ignored by normal particle renderer
    color: headSkin,
    gravity: 0, // handled manually
  });

  // Giant SFX
  SFX.giantLand();
  setTimeout(()=>SFX.explode(), 120);
  screenBlast(28);
}

// Damage a giant by 1 HP from any instakill source; kill normally when hp reaches 0
// Returns true if the giant actually died
function damageGiant(z, dirX, dirY){
  if(z.dead) return false;
  z.hp = Math.max(0, z.hp - 1);
  z.hitFlash = 12;
  blood(z.x, z.y, 14);
  SFX.bigHit();
  if(z.hp <= 0){
    z.dead = true; z.deadAnim = 60;
    z.flyingCorpse = false; // giant doesn't fly — it explodes in place
    score += z.pts; totalKills++;
    if(killsByType[z.id]!==undefined) killsByType[z.id]++;
    scorePopup(z.x, z.y, z.pts);
    giantDeathExplosion(z, dirX, dirY);
    return true;
  }
  return false;
}

// Sound: ascending power chime + deep impact boom
function sfxOneUpEarn(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    [0,0.09,0.18,0.27].forEach((dt,i)=>{
      const freqs=[400,530,660,880];
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='square'; o.frequency.value=freqs[i];
      g.gain.setValueAtTime(0.28,t0+dt); g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.18);
      o.connect(g); g.connect(ac.destination); o.start(t0+dt); o.stop(t0+dt+0.2);
    });
  }catch(e){}
}
function sfxOneUpActivate(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    // Deep boom
    const ob=ac.createOscillator(), gb=ac.createGain();
    ob.type='sine'; ob.frequency.setValueAtTime(55,t0); ob.frequency.exponentialRampToValueAtTime(20,t0+0.5);
    gb.gain.setValueAtTime(1.0,t0); gb.gain.exponentialRampToValueAtTime(0.0001,t0+0.55);
    ob.connect(gb); gb.connect(ac.destination); ob.start(); ob.stop(t0+0.6);
    noise(0.35, 0.9, 200);
    // Electric crackle
    setTimeout(()=>{ noise(0.18,0.7,3500); noise(0.12,0.5,1800); },100);
    // Rising power tone
    setTimeout(()=>{
      const or=ac.createOscillator(), gr=ac.createGain();
      or.type='sawtooth'; or.frequency.setValueAtTime(80,ac.currentTime); or.frequency.exponentialRampToValueAtTime(900,ac.currentTime+0.6);
      gr.gain.setValueAtTime(0.0,ac.currentTime); gr.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.1);
      gr.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.65);
      const flt=ac.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=600; flt.Q.value=0.8;
      or.connect(flt); flt.connect(gr); gr.connect(ac.destination); or.start(); or.stop(ac.currentTime+0.7);

// Trigger the 1UP activation sequence when HP hits 0 and oneUpCount > 0
function triggerOneUp(){
  oneUpCount--;
  oneUpFX.phase=1; // start blackout
  oneUpFX.timer=65;
  sfxOneUpActivate();
}

// Called each frame during One Up FX — returns true while active
function updateOneUpFX(){
  if(oneUpFX.phase===0) return false;
  oneUpFX.timer--;

  if(oneUpFX.phase===1){
    // Blackout: ~65 frames
    if(oneUpFX.timer<=0){ oneUpFX.phase=2; oneUpFX.timer=45; }
  } else if(oneUpFX.phase===2){
    // White flash + vibrate: 45 frames
    cam.shake=18;
    if(oneUpFX.timer<=0){
      // Launch shockwave, restore HP
      oneUpFX.phase=3; oneUpFX.timer=70; oneUpFX.shockR=0;
      player.hp=player.maxHp*0.5;
      // Kill all zombies on screen
      for(const z of zombies){
        if(z.dead) continue;
        if(z.id==='giant'){
          const a=Math.random()*Math.PI*2;
          damageGiant(z, Math.cos(a), Math.sin(a));
        } else {
          z.dead=true; z.deadAnim=38;
          score+=z.pts; totalKills++;
          if(killsByType[z.id]!==undefined) killsByType[z.id]++;
          const a=Math.random()*Math.PI*2;
          z.knockX=Math.cos(a)*14; z.knockY=Math.sin(a)*14; z.flyingCorpse=true;
          goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.skin||'#9e9e9e');
          scorePopup(z.x,z.y,z.pts);
        }
      }
      // Reset zombie speed
      zombieSpeedMult=1;
    }
  } else if(oneUpFX.phase===3){
    // Shockwave expanding: 70 frames
    oneUpFX.shockR = (1-(oneUpFX.timer/70)) * 800;
    if(oneUpFX.timer<=0){ oneUpFX.phase=0; oneUpFX.timer=0; }
  }
  return true;
}

function drawOneUpFX(){
  if(oneUpFX.phase===0) return;
  const plsx=Math.round(sx(player.x)), plsy=Math.round(sy(player.y));

  if(oneUpFX.phase===1){
    // Black overlay, player visible
    ctx.fillStyle='rgba(0,0,0,0.94)';
    ctx.fillRect(0,0,VW,VH);
    // Keep player bright — redraw player area as a circle of light
    ctx.save();
    const grad=ctx.createRadialGradient(plsx,plsy,0,plsx,plsy,55);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(1,'rgba(0,0,0,0.94)');
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(plsx,plsy,55,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,1)'; ctx.fill();
    ctx.restore();
    // Redraw player on top (bright)
    drawPlayer();
  } else if(oneUpFX.phase===2){
    // White flash — intensity peaks then fades
    const t=oneUpFX.timer/45;
    const alpha=0.95-t*0.3;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.fillRect(0,0,VW,VH);
    // Player stays visible in centre
    drawPlayer();
  } else if(oneUpFX.phase===3){
    // Yellow shockwave ring from player
    const r=oneUpFX.shockR*ZOOM*0.12; // screen radius
    const alpha=Math.max(0, oneUpFX.timer/70);
    ctx.save();
    ctx.strokeStyle=`rgba(255,230,0,${alpha})`;
    ctx.lineWidth=Math.max(2, 18*(oneUpFX.timer/70));
    ctx.shadowColor='#e8ff00';
    ctx.shadowBlur=28*(oneUpFX.timer/70);
    ctx.beginPath(); ctx.arc(plsx,plsy,r,0,Math.PI*2); ctx.stroke();
    // Inner glow ring
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.6})`;
    ctx.lineWidth=6*(oneUpFX.timer/70);
    ctx.beginPath(); ctx.arc(plsx,plsy,r*0.7,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function spawnPowerup(){
  // Spawn within visible screen area near the player
  const margin = 30;
  const halfW = (VW/2 - margin) / ZOOM;
  const halfH = (VH/2 - margin) / ZOOM;
  const MIN_DIST = 70; // minimum world-unit distance between two powerups

  let wx, wy, attempts=0;
  let tooClose;
  do {
    const rx = (0.3 + Math.random()*0.6) * (Math.random()<0.5?1:-1);
    const ry = (0.3 + Math.random()*0.6) * (Math.random()<0.5?1:-1);
    wx = player.x + rx * halfW;
    wy = player.y + ry * halfH;
    wx = Math.max(PITCH.x+20, Math.min(PITCH.x+PITCH.w-20, wx));
    wy = Math.max(PITCH.y+20, Math.min(PITCH.y+PITCH.h-20, wy));
    // Check distance from existing powerups
    tooClose = powerups.some(p => Math.hypot(p.x-wx, p.y-wy) < MIN_DIST);
    attempts++;
  } while(tooClose && attempts < 40);

  const def = PUDEF[Math.floor(Math.random()*PUDEF.length)];
  powerups.push({ x:wx, y:wy, def, life:480, maxLife:480 });
}

function activatePowerup(def){
  SFX.powerupPickup();
  // Notification HUD
  puNotif.timer = puNotif.maxTimer;
  puNotif.icon  = def.icon;
  puNotif.label = def.label;
  puNotif.color = def.glow || def.color || '#e8ff00';
  switch(def.id){
    case 'fireball':
      fx.fireBall.active=true; fx.fireBall.timer=fx.fireBall.max; break;
    case 'bomb':
      triggerBomb(); break;
    case 'ricochet':
      ricochetCount = Math.min(5, ricochetCount+1);
      ricochetTimer = 1800; // 30s at 60fps (refresh/stack duration)
      break;
    case 'health':
      player.hp=player.maxHp; break;
    case 'thunder':
      fx.thunder.active=true; fx.thunder.timer=fx.thunder.max; fx.thunder.nextStrike=frameCount+30; break;
    case 'slowmo':
      fx.slowMo.active=true; fx.slowMo.timer=fx.slowMo.max; break;
    case 'doubleball':
      if(extraBalls.length < 7){
        const off = EXTRA_BALL_OFFSETS[extraBalls.length];
        extraBalls.push(makeBallObj(off.x, off.y));
      }
      break;
    case 'shotgun':
      fx.shotgun.active=true; fx.shotgun.timer=fx.shotgun.max;
      fx.shotgun.reloading=0; fx.shotgun.muzzleFlash=0;
      fireShotgun();
      break;
    case 'resetspeed':
      // Reset zombie speed to default (phase 1)
      zombieSpeedMult=1;
      // Visual flash
      for(let i=0;i<30;i++){
        const a=Math.random()*Math.PI*2;
        particles.push({x:player.x,y:player.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,
          life:30,maxLife:30,color:'#00e5ff',sz:4+Math.random()*4,type:'star'});
      }
      break;
    case 'megadash':
      startMegaDash();
      break;
    case 'x6balls':
      activateX6Balls();
      break;
    case 'samurai':
      activateSamurai();
      break;
    case 'iceball':
      fx.iceBall.active=true; fx.iceBall.timer=fx.iceBall.max; break;
  }
  cam.shake=4; cam.shakeDecay=0.7;
}

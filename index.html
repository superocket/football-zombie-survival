function updateOrbitBalls(){
  if(orbitBalls.length===0) return;
  const ORBIT_SPD = 0.045; // radians per frame — smooth rotation
  const BALL_SPD  = 4.5;

  for(let bi=0;bi<orbitBalls.length;bi++){
    const ob=orbitBalls[bi];
    ob.spin+=0.22;

    if(!ob.active){
      // ── ORBITING: rotate around player ──
      ob.angle += ORBIT_SPD;
      ob.x = player.x + Math.cos(ob.angle)*ob.r;
      ob.y = player.y + Math.sin(ob.angle)*ob.r;
      ob.shootCooldown--;

      if(ob.shootCooldown<=0 && player.stunned<=0){
        const t=nearestVisible();
        if(t){
          const dx=t.x-ob.x, dy=t.y-ob.y, d=Math.sqrt(dx*dx+dy*dy)||1;
          ob.vx=(dx/d)*BALL_SPD; ob.vy=(dy/d)*BALL_SPD;
          ob.active=true; ob.returning=false;
          ob.z=0; ob.zv=3.5;
          ob.ricochetsLeft=ricochetCount; // ricochet applies!
          ob.hitZombies=[];
          SFX.kick();
        }
      }

    } else {
      // ── FLYING ──
      ob.x+=ob.vx; ob.y+=ob.vy;
      if(ob.z>0||ob.zv>0){ ob.z+=ob.zv; ob.zv-=0.22; if(ob.z<0){ob.z=0;ob.zv=0;} }

      // Fire trail
      if(fx.fireBall.active && !ob.returning && frameCount%2===0) makeOrbitBallFireSeg(ob);

      if(!ob.returning){
        let didBounce=false;
        // ── Collision tête du serpent ──
        if(checkBallSnakeHit(ob.x,ob.y,ob.vx,ob.vy)){
          const ang2=Math.atan2(player.y-ob.y,player.x-ob.x);
          ob.vx=Math.cos(ang2)*BALL_SPD; ob.vy=Math.sin(ang2)*BALL_SPD;
          ob.returning=true; ob.z=0; ob.zv=2;
        }
        for(const z of zombies){
          if(z.dead||z.emerging>0) continue;
          if(ob.hitZombies&&ob.hitZombies.includes(z)) continue;
          const dx=ob.x-z.x, dy=ob.y-z.y, d=Math.sqrt(dx*dx+dy*dy);
          if(d<z.w/2+ob.ballR){
            if(ob.hitZombies) ob.hitZombies.push(z);
            if(fx.iceBall.active){
              if(!z.frozen){ freezeZombie(z); } sfxIceHit();
            } else if(fx.fireBall.active){
              igniteZombie(z); SFX.hit();
            } else {
              z.hp--; z.hitFlash=10; blood(z.x,z.y,12);
              const nd=d||1; z.knockX=(dx/nd)*5; z.knockY=(dy/nd)*5;
              SFX.hit();
              if(z.hp<=0){
                if(z.id==='giant'){
                  const bdx=ob.vx/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                  const bdy=ob.vy/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                  z.hp=0; z.dead=true; z.deadAnim=60; z.flyingCorpse=false;
                  score+=z.pts; totalKills++;
                  if(killsByType[z.id]!==undefined) killsByType[z.id]++;
                  scorePopup(z.x,z.y,z.pts);
                  giantDeathExplosion(z, bdx, bdy);
                } else {
                  z.dead=true; z.deadAnim=38; score+=z.pts; totalKills++;
                  if(killsByType[z.id]!==undefined) killsByType[z.id]++;
                  const bdx=ob.vx/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                  const bdy=ob.vy/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                  z.knockX=bdx*7; z.knockY=bdy*7; z.flyingCorpse=true;
                  goreExplosion(z.x,z.y,bdx,bdy,z.body);
                  scorePopup(z.x,z.y,z.pts); SFX.explode();
                }
              }
            }
            // Ricochet — affects all orbit balls if ricochetCount>0
            if(ob.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.onFire&&z2.emerging===0&&!(ob.hitZombies&&ob.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){
                ob.ricochetsLeft--;
                const nx=next.x-ob.x,ny=next.y-ob.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                ob.vx=(nx/nd2)*BALL_SPD; ob.vy=(ny/nd2)*BALL_SPD; ob.z=0; ob.zv=2;
                didBounce=true; break;
              }
            }
            if(!didBounce){
              ob.returning=true;
              const ang=Math.atan2(player.y-ob.y,player.x-ob.x);
              ob.vx=Math.cos(ang)*BALL_SPD; ob.vy=Math.sin(ang)*BALL_SPD;
              ob.z=0; ob.zv=2;
            }
            break;
          }
        }
        // Out of pitch → return
        if(!didBounce&&!ob.returning&&(ob.x<PITCH.x||ob.x>PITCH.x+PITCH.w||ob.y<PITCH.y||ob.y>PITCH.y+PITCH.h)){
          ob.returning=true;
          const ang=Math.atan2(player.y-ob.y,player.x-ob.x);
          ob.vx=Math.cos(ang)*BALL_SPD; ob.vy=Math.sin(ang)*BALL_SPD;
        }
      } else {
        // ── RETURNING: come back to orbit position ──
        const targetX=player.x+Math.cos(ob.angle)*ob.r;
        const targetY=player.y+Math.sin(ob.angle)*ob.r;
        const dx=targetX-ob.x, dy=targetY-ob.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<18){
          ob.active=false; ob.returning=false;
          ob.x=targetX; ob.y=targetY;
          ob.shootCooldown=55 + bi*8; // stagger cooldowns
        } else {
          ob.vx=(dx/d)*BALL_SPD*1.1; ob.vy=(dy/d)*BALL_SPD*1.1;
        }
      }
    }
  }
}

function drawOrbitBalls(){
  if(orbitBalls.length===0) return;
  // Draw orbit trail ring when balls are home
  const allHome = orbitBalls.every(ob=>!ob.active);
  if(allHome){
    // Subtle glow ring showing orbit path
    ctx.save();
    ctx.globalAlpha=0.12+0.05*Math.sin(frameCount*0.08);
    ctx.strokeStyle='#e8ff00';
    ctx.lineWidth=1.5;
    ctx.shadowColor='#e8ff00'; ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.arc(Math.round(sx(player.x)), Math.round(sy(player.y)), ORBIT_R*ZOOM, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  for(const ob of orbitBalls){
    const bx=Math.round(sx(ob.x));
    const by=Math.round(sy(ob.y-(ob.z||0)));
    const br=Math.round(ob.ballR*ZOOM*0.8);

    ctx.save();
    // Glow
    ctx.shadowColor='#e8ff00'; ctx.shadowBlur=10;
    // Ball body (pentagon pixel look)
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    // White panels
    ctx.fillStyle='#ffffff';
    ctx.save();
    ctx.translate(bx,by);
    ctx.rotate(ob.spin);
    ctx.fillRect(-br*0.45,-br*0.45,br*0.9,br*0.9);
    ctx.fillStyle='#e8ff00';
    ctx.fillRect(-br*0.2,-br*0.2,br*0.4,br*0.4);
    ctx.restore();
    ctx.restore();
  }
}

    const ac=getAC(), t0=ac.currentTime;
    // Impact + splat
    noise(0.08, 0.5, 800); noise(0.05, 0.3, 300);
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(180, t0); o.frequency.exponentialRampToValueAtTime(40, t0+0.1);
    g.gain.setValueAtTime(0.4, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+0.12);
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(t0+0.13);
  }catch(e){}
}

function activateSamurai(){
  samurai.active=true;
  samurai.timer=samurai.max;
  samurai.swingAngle=0;
  samurai.swingDir=1;
  samurai.ghosts=[];
  samurai.hitCooldown=0;
  // Flash + sound
  screenBlast(8);
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2;
    particles.push({x:player.x,y:player.y,
      vx:Math.cos(a)*4,vy:Math.sin(a)*4,
      life:22,maxLife:22,color:i%2===0?'#c0c0c0':'#ffffff',sz:3+Math.random()*4,type:'star'});
  }
  try{
    const ac=getAC(), t0=ac.currentTime;
    [0,0.06,0.12].forEach((dt,i)=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime([900,1200,1600][i],t0+dt);
      o.frequency.exponentialRampToValueAtTime([300,400,550][i],t0+dt+0.09);
      g.gain.setValueAtTime(0.3,t0+dt); g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.1);
      o.connect(g); g.connect(ac.destination); o.start(t0+dt); o.stop(t0+dt+0.11);
    });
  }catch(e){}
}

function updateSamurai(){
  if(!samurai.active) return;
  samurai.timer--;
  if(samurai.timer<=0){ samurai.active=false; samurai.ghosts=[]; return; }

  // ── Constant wild sword swinging — reverses every ~22 frames ──
  samurai.swingAngle += samurai.swingDir * samurai.swingSpeed;
  // Reverse at extremes: swing covers a wide arc (−2.2 to +2.2 rad from base)
  if(samurai.swingAngle > 2.2){ samurai.swingDir=-1; sfxSamuraiSlash(); }
  if(samurai.swingAngle < -2.2){ samurai.swingDir=1; sfxSamuraiSlash(); }

  // ── Sword hit radius — tip of blade ──
  const BLADE_LEN = 32; // world units
  const BASE_ANG = player.dir > 0 ? 0 : Math.PI; // faces player direction
  const swordAng = BASE_ANG + samurai.swingAngle;
  const tipX = player.x + Math.cos(swordAng) * BLADE_LEN;
  const tipY = player.y + Math.sin(swordAng) * BLADE_LEN;

  if(samurai.hitCooldown>0) samurai.hitCooldown--;

  // Kill zombies touched by sword tip/arc — sweep the full blade
  // ── Samurai touche la tête du serpent ──
  if(snake.active&&!snake.dead&&(snake.state==='roaming'||snake.state==='surfacing')&&snake.alpha>0.3&&samurai.hitCooldown===0){
    for(let t=0.4;t<=1.0;t+=0.2){
      const bxs=player.x+Math.cos(swordAng)*BLADE_LEN*t;
      const bys=player.y+Math.sin(swordAng)*BLADE_LEN*t;
      if(Math.hypot(bxs-snake.segs[0].x, bys-snake.segs[0].y) < SNAKE_HEAD_R+14){
        hitSnakeBoss(Math.cos(swordAng),Math.sin(swordAng));
        samurai.hitCooldown=6;
        break;
      }
    }
  }
  for(const z of zombies){
    if(z.dead) continue;
    // Check along blade (3 test points)
    let hit=false;
    for(let t=0.4;t<=1.0;t+=0.3){
      const bx=player.x+Math.cos(swordAng)*BLADE_LEN*t;
      const by=player.y+Math.sin(swordAng)*BLADE_LEN*t;
      const orbHitR = z.id==='giant' ? z.w/2+10 : z.w/2+10;
      if(Math.hypot(bx-z.x, by-z.y) < orbHitR){ hit=true; break; }
    }
    if(hit && samurai.hitCooldown===0){
      if(z.id==='giant'){
        const ka=Math.atan2(z.y-player.y, z.x-player.x);
        damageGiant(z, Math.cos(ka), Math.sin(ka));
        sfxSamuraiKill(); screenBlast(4);
      } else {
        z.hp=0; z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        const ka=Math.atan2(z.y-player.y, z.x-player.x);
        z.knockX=Math.cos(ka)*9; z.knockY=Math.sin(ka)*9; z.flyingCorpse=true;
        goreExplosion(z.x,z.y,Math.cos(ka),Math.sin(ka),z.skin||'#9e9e9e');
        scorePopup(z.x,z.y,z.pts);
        sfxSamuraiKill(); screenBlast(4);
      }
      samurai.hitCooldown=6; // brief cooldown to avoid multi-hit same frame
      // Slash particles along blade
      for(let i=0;i<8;i++){
        const sp=0.3+i/8*0.7;
        const a2=swordAng+(-Math.PI/2+Math.random()*Math.PI)*0.4;
        particles.push({
          x:player.x+Math.cos(swordAng)*BLADE_LEN*sp,
          y:player.y+Math.sin(swordAng)*BLADE_LEN*sp,
          vx:Math.cos(a2)*3, vy:Math.sin(a2)*3,
          life:14,maxLife:14,
          color:Math.random()<0.5?'#c62828':Math.random()<0.5?'#ffffff':'#c0c0c0',
          sz:2+Math.random()*3, type:'star'});
      }
    }
  }

  // ── Player moves 40% faster with samurai ──
  // (handled in the player move block via samurai.active flag)

  // ── Ninja ghost trail — leave dark ghost every 5 frames when moving ──
  samurai.ghostTimer++;
  const isMoving = Math.abs(player.knockX)>0.5 || Math.abs(player.knockY)>0.5 ||
    joystickActive || keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||
    keys['a']||keys['d']||keys['w']||keys['s'];
  if(isMoving && samurai.ghostTimer>=2){  // every 2 frames = denser trail
    samurai.ghostTimer=0;
    samurai.ghosts.push({
      x:player.x, y:player.y,
      dir:player.dir,
      alpha:0.72,
      life:36, maxLife:36,  // 2× longer trail
    });
  }
  samurai.ghosts=samurai.ghosts.filter(g=>{ g.life--; g.alpha=0.72*(g.life/g.maxLife); return g.life>0; });
}

function drawSamuraiGhosts(){
  if(!samurai.active && samurai.ghosts.length===0) return;
  for(const g of samurai.ghosts){
    const gx=Math.round(sx(g.x)), gy=Math.round(sy(g.y));
    const d2=g.dir||1;
    ctx.save();
    ctx.globalAlpha=g.alpha;
    // Full ninja silhouette in deep dark purple/blue
    const sc='#0a0a1a';
    // Legs
    ctx.fillStyle=sc; ctx.fillRect(gx-3,gy+7,4,9); ctx.fillRect(gx,gy+7,4,9);
    // Body / gi
    ctx.fillRect(gx-6,gy-5,12,13);
    // Arms
    ctx.fillRect(gx-9,gy-4,3,8); ctx.fillRect(gx+6,gy-4,3,8);
    // Head + mask (covering face fully — only eyes gap)
    ctx.fillRect(gx-7,gy-22,14,15);
    // Faint eye slit in lighter purple
    ctx.fillStyle='rgba(100,80,180,0.6)';
    ctx.fillRect(gx-4,gy-16,8,2);
    ctx.restore();
  }
}

  ctx.fillStyle='#ff3333';

      ctx.beginPath();
      ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
      ctx.lineTo(x+Math.cos(a)*(r+8), y+Math.sin(a)*(r+8));
      ctx.stroke();
    }
  }
}

function drawSamuraiSword(){
  if(!samurai.active) return;
  const px=Math.round(sx(player.x)), py=Math.round(sy(player.y));
  const BASE_ANG = player.dir>0 ? 0 : Math.PI;
  const swordAng = BASE_ANG + samurai.swingAngle;

  const BLADE_PX = Math.round(32*ZOOM*0.42); // blade length in screen pixels
  const HANDLE_PX = Math.round(10*ZOOM*0.42);
  const GUARD_PX  = Math.round(6*ZOOM*0.42);

  // Pivot: player hand area
  const pivX = px + (player.dir>0?6:-6);
  const pivY = py - 2;

  ctx.save();
  ctx.translate(pivX, pivY);
  ctx.rotate(swordAng);

  // ── Handle (tsuka) — dark brown wrapped ──
  ctx.fillStyle='#4a2c0a';
  ctx.fillRect(-HANDLE_PX, -2, HANDLE_PX, 4);
  // wrap detail
  ctx.fillStyle='#2a1a05';
  for(let i=0;i<3;i++) ctx.fillRect(-HANDLE_PX+i*4+1, -2, 2, 4);

  // ── Guard (tsuba) — silver circle ──
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.arc(0,0,GUARD_PX*0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.arc(0,0,GUARD_PX*0.3,0,Math.PI*2); ctx.fill();

  // ── Blade — bright silver with glow ──
  ctx.shadowColor='rgba(220,240,255,0.9)'; ctx.shadowBlur=8;
  // Main blade — tapers to tip
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.lineTo(BLADE_PX, -1);
  ctx.lineTo(BLADE_PX+3, 0); // tip
  ctx.lineTo(BLADE_PX, 1);
  ctx.lineTo(0, 2);
  ctx.closePath();
  ctx.fillStyle='#ddeeff';
  ctx.fill();
  // Bright edge (ha) — top edge
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-1); ctx.lineTo(BLADE_PX+2,0); ctx.stroke();
  // Spine (mune) — darker bottom
  ctx.strokeStyle='#99bbcc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo(BLADE_PX,1); ctx.stroke();

  // ── Swing arc trail — flash at reversal ──
  const swingProgress=Math.abs(samurai.swingAngle)/2.2;
  ctx.globalAlpha=0.18+0.1*swingProgress;
  ctx.strokeStyle='#aaddff'; ctx.lineWidth=3; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.moveTo(BLADE_PX*0.4, 0); ctx.lineTo(BLADE_PX+2, 0); ctx.stroke();

  ctx.restore();
}

function sfxMegaDashStart(){

    const ac=getAC(), t0=ac.currentTime;
    // Electric charge-up whoosh
    const o=ac.createOscillator(), g=ac.createGain(), f=ac.createBiquadFilter();
    o.type='sawtooth';
    o.frequency.setValueAtTime(120, t0); o.frequency.exponentialRampToValueAtTime(2200, t0+0.22);
    f.type='bandpass'; f.frequency.value=1400; f.Q.value=0.6;
    g.gain.setValueAtTime(0.0, t0); g.gain.linearRampToValueAtTime(0.7, t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.26);
    o.connect(f); f.connect(g); g.connect(ac.destination); o.start(); o.stop(t0+0.28);

    // Deep bass kick
    const ob=ac.createOscillator(), gb=ac.createGain();
    ob.type='sine'; ob.frequency.setValueAtTime(90,t0); ob.frequency.exponentialRampToValueAtTime(25,t0+0.18);
    gb.gain.setValueAtTime(0.85,t0); gb.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
    ob.connect(gb); gb.connect(ac.destination); ob.start(); ob.stop(t0+0.23);
  }catch(e){}
}

}

}

function _randomDir(){
  const a = Math.random()*Math.PI*2;
  return { dx: Math.cos(a), dy: Math.sin(a) };
}

function startMegaDash(){
  if(megaDash.active) return;
  megaDash.active=true;
  megaDash.timer=megaDash.max;
  megaDash.lasers=[];
  megaDash.lowHpBtn=false;
  megaDash.lowHpUsed=true;
  // Use joystick/keyboard if active, otherwise random direction
  let dx, dy;
  const jx=joystickDelta.x, jy=joystickDelta.y;
  const jlen=Math.sqrt(jx*jx+jy*jy);
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a']) kx=-1;
  if(keys['ArrowRight']||keys['d']) kx=1;
  if(keys['ArrowUp']||keys['w'])  ky=-1;
  if(keys['ArrowDown']||keys['s']) ky=1;
  if(kx!==0||ky!==0){ const kl=Math.sqrt(kx*kx+ky*ky); dx=kx/kl; dy=ky/kl; }
  else if(jlen>=5){ dx=jx/jlen; dy=jy/jlen; }
  else { const r=_randomDir(); dx=r.dx; dy=r.dy; } // random if no input
  megaDash.vx=dx; megaDash.vy=dy;
  megaDash.pendingVx=dx; megaDash.pendingVy=dy;
  // Start immediately in hop phase
  megaDash.phase='hop';
  megaDash.phaseTimer=megaDash.HOP_DUR;
  megaDash.hopStartX=player.x; megaDash.hopStartY=player.y;
  sfxMegaDashStart();
  screenBlast(14);
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2;
    particles.push({x:player.x,y:player.y,
      vx:Math.cos(a)*(5+Math.random()*5), vy:Math.sin(a)*(5+Math.random()*5),
      life:30,maxLife:30,color:i%3===0?'#00eeff':i%3===1?'#ffffff':'#0066ff',
      sz:3+Math.random()*5,type:'star'});
  }
}

function _readInputDir(){
  // Read joystick / keyboard for direction (normalized), return {dx,dy} or null if no input
  let dx=joystickDelta.x, dy=joystickDelta.y;
  let kx=0, ky=0;
  if(keys['ArrowLeft']||keys['a']) kx=-1;
  if(keys['ArrowRight']||keys['d']) kx=1;
  if(keys['ArrowUp']||keys['w'])  ky=-1;
  if(keys['ArrowDown']||keys['s']) ky=1;
  if(kx!==0||ky!==0){ dx=kx; dy=ky; }
  const l=Math.sqrt(dx*dx+dy*dy);
  if(l<5) return null;
  return {dx:dx/l, dy:dy/l};
}

function updateMegaDash(){
  if(!megaDash.active) return;

  // Age laser trails
  megaDash.lasers=megaDash.lasers.filter(l=>{ l.life--; return l.life>0; });

  megaDash.timer--;
  if(megaDash.timer<=0){
    megaDash.active=false;
    sfxMegaDashEnd();
    screenBlast(6);
    return;
  }

  megaDash.phaseTimer--;

  if(megaDash.phase==='pause'){
    // ── PAUSE PHASE: read input for next hop direction ──
    const inp=_readInputDir();
    if(inp){ megaDash.pendingVx=inp.dx; megaDash.pendingVy=inp.dy; }
    // No input → keep current pending (set to random on transition)

    // Electric idle sparks during pause
    if(frameCount%4===0){
      for(let i=0;i<2;i++){
        const a=Math.random()*Math.PI*2;
        particles.push({x:player.x+(Math.random()-0.5)*10, y:player.y+(Math.random()-0.5)*10,
          vx:Math.cos(a)*1.5, vy:Math.sin(a)*1.5,
          life:12,maxLife:12,color:Math.random()<0.5?'#00eeff':'#ffffff',
          sz:2+Math.random()*3,type:'star'});
      }
    }

    if(megaDash.phaseTimer<=0){
      // Transition to hop: lock direction from pending
      megaDash.vx=megaDash.pendingVx; megaDash.vy=megaDash.pendingVy;
      if(megaDash.vx>0.1) player.dir=1; else if(megaDash.vx<-0.1) player.dir=-1;
      megaDash.phase='hop';
      megaDash.phaseTimer=megaDash.HOP_DUR;
      megaDash.hopStartX=player.x; megaDash.hopStartY=player.y;
      sfxMegaDashLoop();
      screenBlast(5);
    }

  } else {
    // ── HOP PHASE: blast forward at ultra speed, direction LOCKED ──
    const DASH_SPD=18; // ×2 of previous 9 — éclair speed
    player.x+=megaDash.vx*DASH_SPD;
    player.y+=megaDash.vy*DASH_SPD;
    player.x=Math.max(PITCH.x+player.w/2, Math.min(PITCH.x+PITCH.w-player.w/2, player.x));
    player.y=Math.max(PITCH.y+player.h/2, Math.min(PITCH.y+PITCH.h-player.h/2, player.y));

    // Kill zombies on contact during hop
    for(const z of zombies){
      if(z.dead) continue;
      const zdx=z.x-player.x, zdy=z.y-player.y;
      const megaHitR = z.id==='giant' ? z.w/2+player.w+10 : z.w/2+player.w+10;
      if(Math.sqrt(zdx*zdx+zdy*zdy)<megaHitR){
        if(z.id==='giant'){
          const ka=Math.atan2(zdy,zdx);
          // Mega dash = instant kill for giant
          z.hp=0; z.dead=true; z.deadAnim=60; z.flyingCorpse=false;
          score+=z.pts; totalKills++;
          if(killsByType[z.id]!==undefined) killsByType[z.id]++;
          scorePopup(z.x,z.y,z.pts);
          giantDeathExplosion(z, Math.cos(ka), Math.sin(ka));
        } else {
          z.hp=0; z.dead=true; z.deadAnim=38;
          score+=z.pts; totalKills++;
          if(killsByType[z.id]!==undefined) killsByType[z.id]++;
          const ka=Math.atan2(zdy,zdx);
          z.knockX=Math.cos(ka)*12; z.knockY=Math.sin(ka)*12; z.flyingCorpse=true;
          goreExplosion(z.x,z.y,Math.cos(ka),Math.sin(ka),z.skin||'#9e9e9e');
          scorePopup(z.x,z.y,z.pts);
        }
      }
    }

    // Electric arc sparks during hop
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2;
      particles.push({x:player.x+(Math.random()-0.5)*10, y:player.y+(Math.random()-0.5)*10,
        vx:Math.cos(a)*(2+Math.random()*4), vy:Math.sin(a)*(2+Math.random()*4),
        life:8+Math.floor(Math.random()*8), maxLife:16,
        color:Math.random()<0.4?'#00eeff':Math.random()<0.5?'#ffffff':'#ffff88',
        sz:1+Math.random()*3, type:'star'});
    }
    // Electric arc bolt between two random points around player
    if(frameCount%2===0){
      const a1=Math.random()*Math.PI*2, a2=a1+Math.PI*(0.3+Math.random()*0.5);
      const r1=6+Math.random()*8;
      particles.push({
        x:player.x+Math.cos(a1)*r1, y:player.y+Math.sin(a1)*r1,
        vx:(Math.cos(a2)-Math.cos(a1))*0.3, vy:(Math.sin(a2)-Math.sin(a1))*0.3,
        life:5, maxLife:5,
        color:'#00eeff', sz:1.5, type:'star'});
    }

    if(megaDash.phaseTimer<=0){
      // End of hop: record laser segment from start → current pos
      megaDash.lasers.push({
        x1:megaDash.hopStartX, y1:megaDash.hopStartY,
        x2:player.x, y2:player.y,
        life:90, maxLife:90,  // ~1.5s fade
      });
      // Mini shockwave at landing spot
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2;
        particles.push({x:player.x,y:player.y,
          vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5,
          life:18,maxLife:18,color:i%2===0?'#00eeff':'#ffffff',sz:3+Math.random()*3,type:'star'});
      }
      // Transition to pause — pre-set pending to a NEW random direction
      // Player can override it during the pause window; if they don't, random fires
      megaDash.phase='pause';
      megaDash.phaseTimer=megaDash.PAUSE_DUR;
      const rnd=_randomDir();
      megaDash.pendingVx=rnd.dx; megaDash.pendingVy=rnd.dy;
    }
  }
}

// Re-check input once per frame during pause and override random if player steers
// (already handled inside pause block via _readInputDir — nothing extra needed)

function drawMegaDashTrail(){
  // Draw laser segments (hop trails)
  for(const l of megaDash.lasers){
    const alpha=l.life/l.maxLife;
    const lx1=sx(l.x1), ly1=sy(l.y1), lx2=sx(l.x2), ly2=sy(l.y2);
    const thick=(12+8*alpha)*ZOOM*0.4; // thick laser, fades

    ctx.save();
    ctx.globalAlpha=alpha;
    // Outer glow (wide, soft)
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=Math.round(32*alpha);
    ctx.strokeStyle=`rgba(0,200,255,${alpha*0.5})`;
    ctx.lineWidth=thick*2.5;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // Mid glow
    ctx.shadowBlur=Math.round(16*alpha);
    ctx.strokeStyle=`rgba(100,230,255,${alpha*0.8})`;
    ctx.lineWidth=thick;
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // Bright white core
    ctx.shadowBlur=6;
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
    ctx.lineWidth=Math.max(1, thick*0.35);
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // ── Electric branch sparks along the laser ──
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=10;
    ctx.strokeStyle=`rgba(0,238,255,${alpha*0.7})`;
    ctx.lineWidth=1;
    const segLen=Math.hypot(lx2-lx1,ly2-ly1);
    const nBranches=Math.floor(segLen/18);
    for(let bi=0;bi<nBranches;bi++){
      const t2=(bi+0.5)/nBranches;
      const bx=lx1+(lx2-lx1)*t2, by=ly1+(ly2-ly1)*t2;
      const perpA=Math.atan2(ly2-ly1,lx2-lx1)+Math.PI/2;
      const blen=(4+Math.random()*8)*alpha;
      const side=Math.random()<0.5?1:-1;
      const ex=bx+Math.cos(perpA)*blen*side+(Math.random()-0.5)*4;
      const ey=by+Math.sin(perpA)*blen*side+(Math.random()-0.5)*4;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex,ey); ctx.stroke();
    }
    ctx.restore();
  }

  // Energy ball + electricity around player while megaDash is active
  if(megaDash.active){
    const px=sx(player.x), py=sy(player.y);
    const pulse=0.8+0.2*Math.sin(frameCount*0.25);
    const r=Math.round((player.w*ZOOM*0.85)*pulse);
    ctx.save();
    // Outer soft glow
    ctx.globalAlpha=0.35+0.15*Math.sin(frameCount*0.18);
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=30;
    ctx.strokeStyle='#00cfff';
    ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(px,py,r*1.5,0,Math.PI*2); ctx.stroke();
    // Mid ring
    ctx.globalAlpha=0.6+0.2*Math.sin(frameCount*0.3);
    ctx.shadowBlur=18;
    ctx.strokeStyle='#00eeff';
    ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke();
    // Inner bright ring
    ctx.globalAlpha=0.9;
    ctx.shadowBlur=8;
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(px,py,r*0.6,0,Math.PI*2); ctx.stroke();
    // Rotating arc
    const rot=(frameCount*0.18)%(Math.PI*2);
    ctx.globalAlpha=0.7;
    ctx.strokeStyle='#00eeff';
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(px,py,r,rot,rot+Math.PI*1.1); ctx.stroke();
    ctx.beginPath(); ctx.arc(px,py,r,rot+Math.PI,rot+Math.PI*2.1); ctx.stroke();

    // ── Electric arc bolts jumping around the player ──
    ctx.globalAlpha=0.8;
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=14;
    ctx.strokeStyle='#00eeff'; ctx.lineWidth=1.2;
    for(let i=0;i<4;i++){
      const a1=(frameCount*0.15+i*Math.PI*0.5)%(Math.PI*2);
      const a2=a1+0.6+Math.random()*0.8;
      const r1=r*(0.7+Math.random()*0.5);
      const r2=r*(0.7+Math.random()*0.5);
      // Jagged bolt: 3 segments
      const x1=px+Math.cos(a1)*r1, y1=py+Math.sin(a1)*r1;
      const x2=px+Math.cos(a2)*r2, y2=py+Math.sin(a2)*r2;
      const mx2=(x1+x2)/2+(Math.random()-0.5)*12, my2=(y1+y2)/2+(Math.random()-0.5)*12;
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx2,my2); ctx.lineTo(x2,y2);
      ctx.stroke();
    }
    // Yellow lightning flashes
    ctx.globalAlpha=0.4;
    ctx.strokeStyle='#ffff88'; ctx.lineWidth=1; ctx.shadowColor='#ffff00'; ctx.shadowBlur=8;
    for(let i=0;i<2;i++){
      const a=Math.random()*Math.PI*2;
      const x1=px+Math.cos(a)*r*0.3, y1=py+Math.sin(a)*r*0.3;
      const x2=px+Math.cos(a+0.4+Math.random())*r*1.3, y2=py+Math.sin(a+0.4+Math.random())*r*1.3;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
  }
}

  ctx.beginPath();
  ctx.moveTo(x+skew, y);
  ctx.lineTo(x+w, y);
  ctx.lineTo(x+w-skew, y+h);
  ctx.lineTo(x, y+h);
  ctx.closePath();
  ctx.stroke();

  // ── Main label ──
  ctx.globalAlpha=1;
  ctx.shadowColor='#00eeff'; ctx.shadowBlur=20;

  ctx.font='bold 22px Courier New';

  // ── Sub label ──
  ctx.fillStyle='#ffffff';
  ctx.font='bold 11px Courier New';
  ctx.shadowBlur=8;
  ctx.fillText('TAP TO ACTIVATE', x+w/2, y+h/2+17);

  // ── Animated bouncing arrow above button ──
  const arrowBounce = 6*Math.abs(Math.sin(t*0.18));
  const arrowY = y - 16 - arrowBounce;
  const arrowCX = x+w/2;

  ctx.shadowColor='#00eeff'; ctx.shadowBlur=22;
  ctx.globalAlpha=0.9+0.1*Math.sin(t*0.2);

  ctx.moveTo(arrowCX-12, arrowY+10);
  ctx.lineTo(arrowCX+12, arrowY+10);
  ctx.lineTo(arrowCX, arrowY+24);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.globalAlpha=0.6;
  ctx.fillRect(arrowCX-1, arrowY-2, 2, 12);

  ctx.restore();

// ── ICE BALL SFX ──
function sfxIceHit(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    // Glassy high-pitched crack
    const o=ac.createOscillator(), g=ac.createGain(), f=ac.createBiquadFilter();
    o.type='sine'; o.frequency.setValueAtTime(1800,t0); o.frequency.exponentialRampToValueAtTime(400,t0+0.12);
    f.type='highpass'; f.frequency.value=800;
    g.gain.setValueAtTime(0.35,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.15);
    o.connect(f); f.connect(g); g.connect(ac.destination); o.start(); o.stop(t0+0.16);
    noise(0.06,0.15,2200);
  }catch(e){}
}
function sfxIceFreeze(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    // Cold crystallizing sound — descending shimmer
    [0,0.06,0.12,0.18].forEach((dt,i)=>{
      const freqs=[900,700,500,350];

}
function sfxIceExplode(){

// ── ICE BALL: freeze a zombie ──
// ice trails on ground left by ice ball (like fireTrails but icy)
let iceTrails = [];

function freezeZombie(z){
  if(z.dead||z.frozen||z.onFire) return;
  z.frozen=true;
  z.frozenTimer=120; // 2 seconds at 60fps
  z.frozenVx=0; z.frozenVy=0;
  z.vx=0; z.vy=0; z.knockX=0; z.knockY=0;
  // Ice crystal particles around zombie
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2;
    particles.push({x:z.x+Math.cos(a)*(z.w*0.6),y:z.y+Math.sin(a)*(z.h*0.5),
      vx:Math.cos(a)*0.5, vy:Math.sin(a)*0.5,
      life:80,maxLife:80,color:i%2===0?'#aaeeff':'#ffffff',
      sz:3+Math.random()*3,type:'star'});
  }
  sfxIceFreeze();
}

// Called when frozen timer runs out — big icy explosion
function iceExplode(z){
  z.frozen=false; z.frozenTimer=0;
  if(z.id==='giant'){
    const a=Math.random()*Math.PI*2;
    damageGiant(z, Math.cos(a), Math.sin(a));
    sfxIceExplode(); screenBlast(8);
    return;
  }
  z.hp=0; z.dead=true; z.deadAnim=38;
  score+=z.pts; totalKills++;
  if(killsByType[z.id]!==undefined) killsByType[z.id]++;
  const burstA=Math.random()*Math.PI*2;
  z.knockX=Math.cos(burstA)*8; z.knockY=Math.sin(burstA)*8; z.flyingCorpse=true;
  sfxIceExplode(); screenBlast(8);
  scorePopup(z.x,z.y,z.pts*2); // double points for ice kill
  score+=z.pts; // bonus score

  // Large shatter radius — kill/freeze nearby zombies too
  const BLAST_R = 80;
  for(const z2 of zombies){
    if(z2===z||z2.dead) continue;
    const dist2=Math.hypot(z2.x-z.x,z2.y-z.y);
    if(dist2<BLAST_R){
      // Chain freeze (if not already frozen) or instant kill if very close
      if(dist2<30){ iceKillZombie(z2,z.x,z.y); }
      else if(!z2.frozen){ freezeZombie(z2); }
    }
  }

  // Ice gore explosion: frozen chunks (blue-white) + lots of blood
  iceGoreExplosion(z.x,z.y,Math.cos(burstA),Math.sin(burstA),z.skin||'#9e9e9e',BLAST_R);
}

function iceKillZombie(z,ox,oy){
  if(z.dead) return;
  if(z.id==='giant'){
    const ka=Math.atan2(z.y-oy,z.x-ox);
    damageGiant(z, Math.cos(ka), Math.sin(ka));
    return;
  }
  z.hp=0; z.dead=true; z.deadAnim=38;
  score+=z.pts; totalKills++;
  if(killsByType[z.id]!==undefined) killsByType[z.id]++;
  const ka=Math.atan2(z.y-oy,z.x-ox);
  z.knockX=Math.cos(ka)*10; z.knockY=Math.sin(ka)*10; z.flyingCorpse=true;
  scorePopup(z.x,z.y,z.pts);
  iceGoreExplosion(z.x,z.y,Math.cos(ka),Math.sin(ka),z.skin||'#9e9e9e',0);
}

function iceGoreExplosion(wx2,wy2,dirX,dirY,zColor,blastR){
  // Frozen chunks: icy blue-white + skin colored
  const iceColors=['#aaeeff','#ddf6ff','#88ccee','#ffffff',zColor||'#9e9e9e',C.blood,'#8b0000'];
  // More chunks than normal + larger radius
  const numChunks = blastR>0 ? 28 : 14;
  for(let i=0;i<numChunks;i++){
    const spread=(Math.random()-0.5)*(blastR>0?Math.PI*2:2.5);
    const baseAngle=blastR>0?Math.random()*Math.PI*2:Math.atan2(dirY,dirX);
    const a=baseAngle+spread;
    const spd=(3+Math.random()*10)*(blastR>0?0.8:0.5);
    const col=iceColors[Math.floor(Math.random()*iceColors.length)];
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1,
      life:720, maxLife:720,
      color:col, sz:3+Math.random()*6,
      type:'iceChunk', gravity:0.16,
      bounceCount:0, landed:false,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.5,
      groundY:wy2+10+Math.random()*20,
      isIce: Math.random()<0.6}); // flag to draw as crystal
  }

  // Lots of blood splatter (more than normal)
  const numBlood = blastR>0 ? 50 : 25;
  for(let i=0;i<numBlood;i++){
    const a=Math.random()*Math.PI*2+(blastR>0?0:Math.atan2(dirY,dirX)-(Math.random()-0.5)*2);
    const spd=(2+Math.random()*8)*(blastR>0?0.9:0.5);
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:40+Math.random()*30, maxLife:70,
      color:Math.random()<0.7?C.blood:'#8b0000',
      sz:2+Math.random()*4, type:'blood', gravity:0.08});
  }

  // Blood puddles — lots, spread wide
  const numPuddles = blastR>0 ? 20 : 10;
  for(let i=0;i<numPuddles;i++){
    const a=Math.random()*Math.PI*2;
    const spd=(0.5+Math.random()*3)*(blastR>0?1.2:0.5);
    const spread2=blastR>0?(Math.random()-0.5)*blastR*0.8:0;
    particles.push({x:wx2+(blastR>0?Math.cos(a)*spread2:0),y:wy2+(blastR>0?Math.sin(a)*spread2:0),
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:720, maxLife:720,
      color:Math.random()<0.5?'#7b0000':'#9b0000',
      sz:5+Math.random()*9, type:'puddle', gravity:0});
  }

  // Ice shard ring flash (small cyan sparkles)
  const numSparks = blastR>0 ? 30 : 12;
  for(let i=0;i<numSparks;i++){
    const a=(i/numSparks)*Math.PI*2+Math.random()*0.5;
    const spd=3+Math.random()*5;
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:22+Math.random()*18,maxLife:40,
      color:i%3===0?'#ffffff':'#aaeeff',
      sz:2+Math.random()*3, type:'star'});
  }

  // Shockwave ring
  if(blastR>0){
    for(let i=0;i<20;i++){
      const a=(i/20)*Math.PI*2;
      particles.push({x:wx2+Math.cos(a)*5,y:wy2+Math.sin(a)*5,
        vx:Math.cos(a)*(4+Math.random()*3), vy:Math.sin(a)*(4+Math.random()*3),
        life:20,maxLife:20,color:'#aaeeff',sz:4+Math.random()*4,type:'star'});
    }
  }
}

// ── ICE BALL: make an ice trail segment (like fire trail but icy) ──
function makeIceBallTrail(b){
  const seg={x:b.x,y:b.y,life:80,maxLife:80,dead:false,pixels:[]};
  const nPx=3+Math.floor(Math.random()*3);
  for(let i=0;i<nPx;i++){
    seg.pixels.push({
      type:'block',
      ox:(Math.random()-0.5)*8,
      oy:-(Math.random()*10),
      sz:4+Math.floor(Math.random()*5),
      col:Math.random()<0.5?'#aaeeff':Math.random()<0.6?'#ddf6ff':'#88ccee',
      birthLife:80,
    });
  }
  const nSp=2+Math.floor(Math.random()*2);
  for(let i=0;i<nSp;i++){
    seg.pixels.push({
      type:'spark',
      ox:(Math.random()-0.5)*12,
      oy:-(6+Math.random()*12),
      vox:(Math.random()-0.5)*0.18,
      voy:-(0.15+Math.random()*0.25),
      sz:2+Math.floor(Math.random()*2),
      col:Math.random()<0.6?'#ffffff':'#aaeeff',
      birthLife:80,
    });
  }
  iceTrails.push(seg);
}

// ── DRAW ICE BALL TRAIL ──
function drawIceBallTrail(){
  for(const ft of iceTrails){
    const ratio=ft.life/ft.maxLife;
    const scx=Math.round(sx(ft.x)), scy=Math.round(sy(ft.y));
    if(scx<-60||scx>VW+60||scy<-60||scy>VH+60) continue;
    ctx.save();
    for(const p of ft.pixels){
      const age=1-(ft.life/p.birthLife);
      const alpha=ratio*(p.type==='spark'?0.8:0.65);
      if(alpha<=0) continue;
      const shrink=p.type==='block'?(0.3+ratio*0.7):1;
      const sz=Math.round(p.sz*shrink*ZOOM*0.42);
      if(sz<1) continue;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=p.col;
      ctx.shadowColor='#aaeeff'; ctx.shadowBlur=6;
      const px2=Math.round(scx+p.ox*ZOOM*0.42);
      const py2=Math.round(scy+p.oy*ZOOM*0.42);
      ctx.fillRect(px2-Math.ceil(sz/2), py2-Math.ceil(sz/2), sz, sz);
    }
    ctx.restore();
  }
}

// ── DRAW FROZEN ZOMBIE ICE EFFECT ──
function drawFrozenZombie(z){
  const x=Math.round(sx(z.x)), y=Math.round(sy(z.y));
  if(x<-60||x>VW+60||y<-80||y>VH+80) return;
  const hw=Math.round((z.w/2)*ZOOM*0.42+2), hh=Math.round((z.h/2)*ZOOM*0.42+2);
  const w2=hw*2+4, h2=hh*2+6;
  const prog=z.frozenTimer/120; // 1→0 as time passes

  // Ice block overlay — semi-transparent blue crystal
  ctx.save();
  ctx.globalAlpha=0.55+prog*0.3;
  // Outer ice shell
  const iceGrad=ctx.createLinearGradient(x-hw-2,y-hh-3,x+hw+2,y+hh+3);
  iceGrad.addColorStop(0,'rgba(170,238,255,0.85)');
  iceGrad.addColorStop(0.4,'rgba(200,248,255,0.5)');
  iceGrad.addColorStop(1,'rgba(100,200,240,0.75)');
  ctx.fillStyle=iceGrad;
  ctx.fillRect(x-hw-2, y-hh-3, w2, h2);
  // Crystal glint lines
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-hw+2,y-hh); ctx.lineTo(x-hw/2,y+hh-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+hw-4,y-hh+2); ctx.lineTo(x+hw/2-2,y+hh-6); ctx.stroke();
  // Frost border
  ctx.strokeStyle=`rgba(150,230,255,${0.6+prog*0.3})`; ctx.lineWidth=2;
  ctx.strokeRect(x-hw-2,y-hh-3,w2,h2);
  // Timer shimmer at bottom
  ctx.fillStyle=`rgba(100,200,255,${prog*0.5})`;
  ctx.fillRect(x-hw-2, y+hh-2, Math.round(w2*prog), 5);
  ctx.restore();

  // Floating ice crystals
  if(frameCount%4===0 && z.frozenTimer>10){
    const a=Math.random()*Math.PI*2;
    particles.push({x:z.x+(Math.random()-0.5)*z.w,y:z.y-(Math.random()*z.h*0.5),
      vx:Math.cos(a)*0.3, vy:-0.4-Math.random()*0.5,
      life:25,maxLife:25,color:Math.random()<0.5?'#aaeeff':'#ffffff',
      sz:2+Math.random()*2,type:'star'});
  }
}

// ── DRAW ICE CHUNK PARTICLE ──
function drawIceChunkParticle(p,scx,scy){
  const ratio=p.life/p.maxLife;
  ctx.save();
  ctx.globalAlpha=ratio;
  ctx.translate(scx,scy);
  ctx.rotate(p.rot||0);
  const sz2=Math.max(1,Math.round(p.sz*ZOOM*0.42*(0.5+ratio*0.5)));
  if(p.isIce){
    // Crystal shape: small diamond
    ctx.fillStyle=p.color;
    ctx.shadowColor='#aaeeff'; ctx.shadowBlur=5;
    ctx.beginPath();
    ctx.moveTo(0,-sz2); ctx.lineTo(sz2*0.7,0); ctx.lineTo(0,sz2); ctx.lineTo(-sz2*0.7,0);
    ctx.closePath(); ctx.fill();
    // Glint
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillRect(-1,-Math.ceil(sz2*0.5),2,Math.ceil(sz2*0.5));
  } else {
    // Regular chunk (blood-stained)
    ctx.fillStyle=p.color;
    ctx.fillRect(-Math.ceil(sz2/2),-Math.ceil(sz2/2),sz2,sz2);
  }
  ctx.restore();
}

// ── DRAW ICE BALL ──
function drawIceBall(){
  if(!fx.iceBall.active) return;
}

// ── ICE BALL AURA on main ball + screen vignette ──
function drawIceBallAura(){
  if(!fx.iceBall.active) return;

  // Icy screen vignette
  const prog = fx.iceBall.timer / fx.iceBall.max;
  const vgGrad = ctx.createRadialGradient(VW/2,VH/2,VH*0.18,VW/2,VH/2,VH*0.75);
  vgGrad.addColorStop(0,'rgba(0,200,255,0)');
  vgGrad.addColorStop(1,`rgba(0,80,140,${0.18*prog})`);
  ctx.fillStyle=vgGrad; ctx.fillRect(0,0,VW,VH);

  // Pulsing ice aura ring around ball
  const bArc=ball.active?Math.round(ball.z):0;
  const bx=Math.round(sx(ball.x)), by=Math.round(sy(ball.y))-bArc;
  const pulse=0.55+0.45*Math.sin(frameCount*0.22);
  ctx.save();
  ctx.globalAlpha=0.55*pulse;
  ctx.shadowColor='#aaeeff'; ctx.shadowBlur=18;
  ctx.strokeStyle='#aaeeff'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(bx,by,ball.r*ZOOM*0.46+5,0,Math.PI*2); ctx.stroke();
  // Inner glow
  ctx.globalAlpha=0.25*pulse;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(bx,by,ball.r*ZOOM*0.46+2,0,Math.PI*2); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.restore();

  // Floating ice crystals around ball
  if(frameCount%5===0){
    const a=Math.random()*Math.PI*2, r=ball.r*ZOOM*0.5+Math.random()*8;
    particles.push({
      x:ball.x+Math.cos(a)*(ball.r+4)/ZOOM, y:ball.y+Math.sin(a)*(ball.r+4)/ZOOM,
      vx:Math.cos(a)*0.25, vy:Math.sin(a)*0.25-0.3,
      life:18, maxLife:18,
      color:Math.random()<0.5?'#aaeeff':'#ffffff',
      sz:2+Math.random()*2, type:'star'
    });
  }
}


function makeFireParticle(z){
  // Each fire particle: a big pixel block that floats up slowly with wobble
  const col=Math.random()<0.55?'#ff6d00':Math.random()<0.6?'#ffeb3b':'#ff3d00';
  return {
    ox: (Math.random()-0.5)*(z.w*0.9),   // offset from zombie center X
    oy: (Math.random())*(z.h*0.5)+(z.h*0.1), // offset Y (body height)
    vx: (Math.random()-0.5)*0.22,          // slow horizontal drift
    vy: -(0.28+Math.random()*0.32),        // slow upward rise
    life: 30+Math.floor(Math.random()*50), // long life for slow anim
    maxLife: 80,
    sz: 5+Math.floor(Math.random()*5),     // large pixel block 5–9px
    col,
    phase: Math.random()*Math.PI*2,        // wobble phase
    isSpark: Math.random()<0.18,           // 18% are sparks (smaller, faster, chaotic)
  };
}

function igniteZombie(z){
  if(z.dead||z.onFire) return;
  z.onFire=true;
  z.fireTimer=180;      // 3s on fire before ash
  if(z.id==='giant'){
    z.fireFrozen=false; // giant keeps moving while burning
    z.fireHpDrain=3;    // total HP to drain over the burn (3 hits over 180 frames)
    z.fireHpDrained=0;  // HP already drained so far
    z.fireHpTickTimer=0;// frames since last HP tick
  } else {
    z.fireFrozen=true;  // normal zombies freeze while burning
    z.vx=0; z.vy=0;
    z.knockX=0; z.knockY=0;
  }
  z.fireParticles=[];
  for(let i=0;i<12;i++) z.fireParticles.push(makeFireParticle(z));
}

// ── SHOTGUN FIRE in a direction ──
function fireShotgun(){
  // Always aim toward nearest visible zombie, fallback to player direction
  const t=nearestVisible();
  let dirX=player.dir, dirY=0;
  if(t){ const dx=t.x-player.x,dy=t.y-player.y,d=Math.sqrt(dx*dx+dy*dy)||1; dirX=dx/d; dirY=dy/d; }
  const baseAng=Math.atan2(dirY,dirX);

  // Store aim for drawing
  fx.shotgun.aimX=dirX; fx.shotgun.aimY=dirY;
  fx.shotgun.muzzleFlash=14;

  SFX.shotgunFire(); screenBlast(8);

  // ── Shotgun touche la tête du serpent ──
  if(snake.active&&!snake.dead&&(snake.state==='roaming'||snake.state==='surfacing')&&snake.alpha>0.3){
    const head=snake.segs[0];
    const dx2=head.x-player.x, dy2=head.y-player.y;
    const ang2=Math.atan2(dy2,dx2);
    let diff2=ang2-baseAng;
    while(diff2>Math.PI) diff2-=Math.PI*2;
    while(diff2<-Math.PI) diff2+=Math.PI*2;
    if(Math.abs(diff2)<Math.PI*0.12){
      hitSnakeBoss(dirX,dirY);
    }
  }

  // Kill all zombies in narrow beam to screen edge (±15°)
  for(const z of zombies){
    if(z.dead||z.emerging>0) continue;
    const dx=z.x-player.x, dy=z.y-player.y;
    const ang=Math.atan2(dy,dx);
    let diff=ang-baseAng;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<Math.PI*0.08){
      if(z.id==='giant'){
        damageGiant(z, dirX, dirY);
      } else {
        z.hp=0; z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        z.knockX=dirX*9; z.knockY=dirY*9;
        z.flyingCorpse=true;
        goreExplosion(z.x,z.y,dirX,dirY,z.body);
        scorePopup(z.x,z.y,z.pts);
      }
    }
  }
  // Beam flash particles
  for(let i=0;i<18;i++){
    const dist=30+i*24, spread=(Math.random()-0.5)*0.12;
    const a=baseAng+spread;
    particles.push({x:player.x+Math.cos(baseAng)*dist,y:player.y+Math.sin(baseAng)*dist,
      vx:Math.cos(a)*2,vy:Math.sin(a)*2,
      life:12,maxLife:12,color:i%2===0?'#ffeb3b':'#fffde7',sz:4+Math.random()*5,type:'star'});
  }

  // Start reload immediately after shot (20f = ~0.33s)
  fx.shotgun.reloading=20;
}

// ── THUNDER STRIKE ──
function spawnThunder(){
  SFX.thunderStrike(); screenBlast(12);
  const visible=zombies.filter(z=>!z.dead&&z.emerging===0&&sx(z.x)>60&&sx(z.x)<VW-60&&sy(z.y)>60&&sy(z.y)<VH-60);
  let landX, landY;
  // Si le serpent est visible, 40% de chance de viser sa tête
  if(snake.active&&!snake.dead&&(snake.state==='roaming'||snake.state==='surfacing')&&snake.alpha>0.3&&Math.random()<0.40){
    landX=snake.segs[0].x+(Math.random()-0.5)*20;
    landY=snake.segs[0].y+(Math.random()-0.5)*20;
  } else if(visible.length>0 && Math.random()<0.75){
    const target=visible[Math.floor(Math.random()*visible.length)];
    landX=target.x+(Math.random()-0.5)*60; landY=target.y+(Math.random()-0.5)*40;
  } else {
    landX=cam.x+(Math.random()-0.5)*(VW/ZOOM*0.7);
    landY=cam.y+(Math.random()-0.5)*(VH/ZOOM*0.7);
  }
  landX=Math.max(PITCH.x+20,Math.min(PITCH.x+PITCH.w-20,landX));
  landY=Math.max(PITCH.y+20,Math.min(PITCH.y+PITCH.h-20,landY));
  const worldTop=cam.y-(VH/2)/ZOOM-80;
  // Bolt travels for 20 frames then hits ground — damage deferred to impact
  thunderbolts.push({ x:landX, yStart:worldTop, yEnd:landY, life:60, maxLife:60,
    landX, landY, impactDone:false });
}

// Called when bolt reaches ground — explode zombies in radius
function thunderImpact(landX, landY){
  screenBlast(14);
  // ── Thunder touche la tête du serpent ──
  if(snake.active&&!snake.dead&&(snake.state==='roaming'||snake.state==='surfacing')&&snake.alpha>0.3){
    if(Math.hypot(snake.segs[0].x-landX, snake.segs[0].y-landY)<110){
      hitSnakeBoss(0,0);
    }
  }
  let killed=0;
  for(const z of zombies){
    if(z.dead||killed>=6) continue;
    if(Math.hypot(z.x-landX,z.y-landY)<(z.id==='giant'?160:90)){
      if(z.id==='giant'){
        const a=Math.atan2(z.y-landY,z.x-landX);
        damageGiant(z, Math.cos(a), Math.sin(a));
      } else {
        z.hp=0; z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        const a=Math.atan2(z.y-landY,z.x-landX);
        z.knockX=Math.cos(a)*5; z.knockY=Math.sin(a)*5; z.flyingCorpse=true;
        goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.body);
        scorePopup(z.x,z.y,z.pts);
        particles.push({x:z.x+(Math.random()-0.5)*20,y:z.y+(Math.random()-0.5)*20,
          vx:0,vy:0,life:720,maxLife:720,color:Math.random()<0.5?'#1a237e':'#212121',
          sz:18+Math.random()*14,type:'puddle',gravity:0});
      }
      killed++;
    }
  }
  // Burn marks
  for(let i=0;i<6;i++) particles.push({x:landX+(Math.random()-0.5)*30,y:landY+(Math.random()-0.5)*20,
    vx:0,vy:0,life:600,maxLife:600,color:i%2===0?'#0d47a1':'#212121',
    sz:14+Math.random()*10,type:'puddle',gravity:0});
}

// ══════════════════════════════════════
// UPDATE
// ══════════════════════════════════════
function update(){
  frameCount++;
  if(cam.shake>0) cam.shake *= 0.8;

  // ── Low HP Freeze: pause game 2s at ≤20% HP to allow Mega Dash ──
  if(!megaDash.lowHpFreezeTriggered && !megaDash.lowHpUsed && !megaDash.active &&
     player.hp > 0 && player.hp <= 20){
    megaDash.lowHpFreezeTriggered = true;
    megaDash.lowHpFreezeTimer = 120; // 2 seconds at 60fps
  }
  if(megaDash.lowHpFreezeTimer > 0){
    megaDash.lowHpFreezeTimer--;
    megaDash.lowHpBtn = true;
    // Skip rest of update to freeze game logic
    updateCamera();
    return;
  }

  // ── Powerup unlock at wave 2 ──
  if(!powerupsUnlocked && wave >= 2){
    powerupsUnlocked = true;
    // Spawn 3 powerups simultaneously right away
    spawnPowerup(); spawnPowerup(); spawnPowerup();
    // Prime the extra-spawn timer
    powerupExtraInterval = Math.round((4*60) + Math.random()*2*60); // 4–6s in frames
    powerupExtraTimer = 0;
  }

  // ── Ongoing random powerup every ~5s (±1s) from wave 2 onward ──
  if(powerupsUnlocked){
    powerupExtraTimer++;
    if(powerupExtraTimer >= powerupExtraInterval){
      powerupExtraTimer = 0;
      powerupExtraInterval = Math.round((4*60) + Math.random()*2*60); // re-randomise
      spawnPowerup();
    }
  }

  // ── Powerup lifetime + pickup check ──
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];
    pu.life--;
    if(pu.life<=0){ powerups.splice(i,1); continue; }
    // Pickup: player touches square (world coords, 22px half-size)
    const dx=player.x-pu.x, dy=player.y-pu.y;
    if(Math.abs(dx)<22 && Math.abs(dy)<22){ activatePowerup(pu.def); powerups.splice(i,1); }
  }

  // ── Active effect timers ──
  for(const k in fx){
    if(fx[k].active){ fx[k].timer--; if(fx[k].timer<=0){ fx[k].active=false;
      if(k==='fireBall'){ _ballFirePx=[]; fireTrails=[]; }
      if(k==='shotgun'){ fx.shotgun.reloading=0; fx.shotgun.shots=3; fx.shotgun.muzzleFlash=0; }
    }}
  }
  // ── Ricochet timer (30s) ──
  if(ricochetCount>0 && ricochetTimer>0){
    ricochetTimer--;
    if(ricochetTimer<=0){ ricochetCount=0; ricochetTimer=0; }
  }
  // ── Orbit balls timer (20s) ──
  if(orbitBalls.length>0 && orbitBallsTimer>0){
    orbitBallsTimer--;
    if(orbitBallsTimer<=0){ orbitBalls=[]; orbitBallsTimer=0; }
  }

  // ── Thunder periodic strikes ──
  if(fx.thunder.active && frameCount>=fx.thunder.nextStrike){ spawnThunder(); fx.thunder.nextStrike=frameCount+70; }

  // ── Thunderbolt lifetime + impact trigger ──
  for(let i=thunderbolts.length-1;i>=0;i--){
    const tb=thunderbolts[i];
    tb.life--;
    // Impact fires exactly when bolt tip reaches yEnd (at travelFrames=20 age)
    const age=tb.maxLife-tb.life;
    if(!tb.impactDone && age>=20){ tb.impactDone=true; thunderImpact(tb.landX,tb.landY); }
    if(tb.life<=0) thunderbolts.splice(i,1);
  }

  // ── Wave break: block spawning for 2s on new wave ──
  if(waveBreakTimer>0){ waveBreakTimer--; }

  // ── Shotgun auto-fire ──
  if(fx.shotgun.active){
    if(fx.shotgun.muzzleFlash>0) fx.shotgun.muzzleFlash--;
    if(fx.shotgun.reloading>0){
      fx.shotgun.reloading--;
      // Halfway through reload: play clack sound once
      if(fx.shotgun.reloading===10) SFX.shotgunReload();
      if(fx.shotgun.reloading<=0){ fx.shotgun.reloading=0; fireShotgun(); } // fire immediately after reload
    }
  }

  // ── Ice trail tick ──
  for(let i=iceTrails.length-1;i>=0;i--){
    const it=iceTrails[i];
    it.life--;
    if(it.pixels){
      for(const p of it.pixels){
        if(p.type==='spark'){ p.ox+=p.vox+(Math.random()-0.5)*0.12; p.oy+=p.voy; p.vox*=0.95; }
      }
    }
    if(it.life<=0){ iceTrails.splice(i,1); }
  }

  // ── Frozen zombie tick ──
  for(const z of zombies){
    if(!z.frozen||z.dead) continue;
    z.vx=0; z.vy=0; z.knockX=0; z.knockY=0;
    z.frozenTimer--;
    if(z.frozenTimer<=0) iceExplode(z);
  }

  // ── Zombie fire tick ──
  for(const z of zombies){
    if(!z.onFire||z.dead) continue;
    z.fireTimer--;

    // Giant: drain HP progressively (3 HP total over 180 frames = 1 HP every 60f)
    if(z.id==='giant' && z.fireHpDrained < z.fireHpDrain){
      z.fireHpTickTimer = (z.fireHpTickTimer||0) + 1;
      if(z.fireHpTickTimer >= 60){
        z.fireHpTickTimer = 0;
        z.fireHpDrained = (z.fireHpDrained||0) + 1;
        z.hp = Math.max(0, z.hp - 1);
        z.hitFlash = 10;
        blood(z.x, z.y, 8);
        SFX.bigHit();
        if(z.hp <= 0){
          z.onFire=false; z.fireFrozen=false; z.fireParticles=[];
          z.dead=true; z.deadAnim=60; z.flyingCorpse=false;
          score+=z.pts; totalKills++;
          if(killsByType[z.id]!==undefined) killsByType[z.id]++;
          scorePopup(z.x,z.y,z.pts);
          giantDeathExplosion(z, 0, 0);
          continue;
        }
      }
    }

    // Frozen while on fire — override velocity to zero (giants are NOT frozen)
    if(z.fireFrozen){ z.vx=0; z.vy=0; z.knockX=0; z.knockY=0; }

    // Update fire particles (slow simulation, runs every frame but moves slowly)
    if(!z.fireParticles) z.fireParticles=[];
    for(let i=z.fireParticles.length-1;i>=0;i--){
      const fp=z.fireParticles[i];
      fp.life--;
      if(fp.life<=0){ z.fireParticles.splice(i,1); continue; }
      // Slow wobble + rise
      fp.phase+=0.055;
      fp.ox += fp.vx + Math.sin(fp.phase)*0.18;
      fp.oy -= fp.isSpark ? 0.55+Math.random()*0.4 : (fp.vy*-1); // sparks rise faster
      if(fp.isSpark) fp.ox += (Math.random()-0.5)*0.9; // chaotic spark horizontal
    }
    // Replenish particles to maintain ~12 active
    const needed = Math.max(0, 12 - z.fireParticles.length);
    for(let i=0;i<needed;i++) z.fireParticles.push(makeFireParticle(z));

    // Spread fire to nearby zombies (freeze them too)
    if(frameCount%25===0){
      for(const z2 of zombies){
        if(z2===z||z2.dead||z2.onFire) continue;
        const dx=z2.x-z.x,dy=z2.y-z.y;
        if(Math.sqrt(dx*dx+dy*dy)<z.w+z2.w+10) igniteZombie(z2);
      }
    }

    if(z.fireTimer<=0){
      z.onFire=false; z.fireFrozen=false; z.fireParticles=[];
      if(z.id==='giant'){
        // Giant survived the fire (HP already drained progressively); just extinguish
        z.fireHpDrained=0; z.fireHpTickTimer=0;
        // Small smoke puff
        for(let i=0;i<6;i++){
          const a=Math.random()*Math.PI*2;
          particles.push({x:z.x+(Math.random()-0.5)*z.w, y:z.y-(Math.random()*z.h*0.5),
            vx:Math.cos(a)*0.5, vy:Math.sin(a)*0.5-0.8,
            life:40, maxLife:40, color:'#616161', sz:5+Math.random()*6, type:'star', gravity:0});
        }
      } else {
        // Zombie bursts apart — gore explosion + ash overlay
        z.hp=0; z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        scorePopup(z.x,z.y,z.pts);
        SFX.explode(); screenBlast(5);
        // Flying corpse burst outward
        const burstA=Math.random()*Math.PI*2;
        z.knockX=Math.cos(burstA)*5; z.knockY=Math.sin(burstA)*5;
        z.flyingCorpse=true;
        // Gore (smaller, charred — dark colors)
        for(let i=0;i<20;i++){
          const a=Math.random()*Math.PI*2, spd=(1+Math.random()*3)*0.5;
          particles.push({x:z.x+(Math.random()-0.5)*z.w, y:z.y+(Math.random()-0.5)*z.h,
            vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-0.5,
            life:300, maxLife:300,
            color:i%3===0?'#424242':i%3===1?'#212121':'#616161',
            sz:3+Math.random()*5, type:'chunk', gravity:0.18,
            bounceCount:0, landed:false,
            rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.3,
            groundY:z.y+8+Math.random()*12});
        }
        // Ash cloud puddles on ground
        for(let i=0;i<12;i++){
          const a=Math.random()*Math.PI*2, spd=0.3+Math.random()*1.2;
          particles.push({x:z.x+(Math.random()-0.5)*z.w, y:z.y+(Math.random()-0.5)*z.h,
            vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-0.3,
            life:300, maxLife:300,
            color:i%2===0?'#616161':'#9e9e9e',
            sz:4+Math.random()*6, type:'puddle', gravity:0});
        }
      }
    }
  }

  // ── Player ──
  const SPD_BASE=1.57;
  const SPD = samurai.active ? SPD_BASE*2.0 : SPD_BASE; // ×2 speed with samurai
  let mx=0, my=0;
  if(!megaDash.active){
    if(joystickActive){ mx=(joystickDelta.x/55)*SPD; my=(joystickDelta.y/55)*SPD; }
    if(keys['ArrowLeft']||keys['a']) mx-=SPD;
    if(keys['ArrowRight']||keys['d']) mx+=SPD;
    if(keys['ArrowUp']||keys['w'])   my-=SPD;
    if(keys['ArrowDown']||keys['s']) my+=SPD;
    // Slower knock decay when stunned so player slides far back
    const knockDecay = player.stunned>50 ? 0.88 : 0.76;
    player.knockX*=knockDecay; player.knockY*=knockDecay;
    player.x+=mx+player.knockX; player.y+=my+player.knockY;
    // Direction: only horizontal axis sets direction. Pure up/down = keep current dir (default right)
    if(mx>0.1) player.dir=1;
    else if(mx<-0.1) player.dir=-1;
  } else {
    // During mega dash: movement fully handled by updateMegaDash, reset physics
    player.knockX=0; player.knockY=0; player.stunned=0; player.hitFlash=0;
  }
  if(player.hitFlash>0) player.hitFlash--;
  if(player.stunned>0) player.stunned--;
  if(player.kickAnim>0) player.kickAnim--;
  player.x=Math.max(PITCH.x+player.w/2, Math.min(PITCH.x+PITCH.w-player.w/2, player.x));
  // Allow player to enter goal area (30px beyond top/bottom line, within goal width)
  const goalW2 = PITCH.w*0.28, goalX1p = PITCH.x+PITCH.w/2-goalW2/2, goalX2p = PITCH.x+PITCH.w/2+goalW2/2;
  const inGoalX = player.x>=goalX1p && player.x<=goalX2p;
  const minY = inGoalX ? PITCH.y-30 : PITCH.y+player.h/2;
  const maxY = inGoalX ? PITCH.y+PITCH.h+30 : PITCH.y+PITCH.h-player.h/2;
  player.y=Math.max(minY, Math.min(maxY, player.y));
  const moving=Math.abs(mx)>0.05||Math.abs(my)>0.05||(megaDash.active&&megaDash.phase==='hop');
  player.animFrame = moving ? Math.floor(frameCount/3)%4 : 0; // faster anim during hop

  // ── MegaDash update (after player position set) ──
  updateMegaDash();

  // ── Samurai update ──
  updateSamurai();

  // Reset lowHpUsed when player heals back above 30%
  if(megaDash.lowHpUsed && player.hp>30) megaDash.lowHpUsed=false;
  // Reset freeze trigger when player heals back above 30%
  if(megaDash.lowHpFreezeTriggered && player.hp>30) megaDash.lowHpFreezeTriggered=false;

  // ── Continuous spawner ──
  const bossActive = snake.active && !snake.dead;
  const bossJustDied = !snake.active && snake.announced; // boss a existé mais plus actif
  const alive = zombies.filter(z=>!z.dead).length;
  spawnTimer++;

  if(bossActive){
    if(biome===3){
      // Cimetière (stage final) : AUCUNE limite de zombies pendant le boss — spawn illimité
      targetCount = 8 + Math.floor(totalKills * 0.35) + wave * 3;
      const spawnRateBoss = (alive < targetCount && waveBreakTimer<=0) ? Math.max(1, 8 - Math.floor(totalKills/20)) : 0;
      if(spawnRateBoss>0 && spawnTimer % spawnRateBoss === 0) spawnZombie(false);
    } else {
      // Autres biomes pendant le boss : max 10 zombies — spawn lent toutes les 3s
      const bossZombieMax = 10;
      targetCount = bossZombieMax;
      snake.bossZombieSpawnTimer = (snake.bossZombieSpawnTimer || 0) + 1;
      if(alive < bossZombieMax && snake.bossZombieSpawnTimer >= snake.bossZombieSpawnRate){
        snake.bossZombieSpawnTimer = 0;
        spawnZombie(false);
      }
    }
    // Powerup interval réduit de moitié pendant le boss (géré dans initSnakeBoss)
  } else if(bossJustDied){
    // Après la mort du boss : spawn illimité (comme sans boss)
    targetCount = 8 + Math.floor(totalKills * 0.35) + wave * 3;
    const spawnRate2 = (alive < targetCount && waveBreakTimer<=0) ? Math.max(1, 8 - Math.floor(totalKills/20)) : 0;
    if(spawnRate2>0 && spawnTimer % spawnRate2 === 0) spawnZombie(false);
  } else {
    targetCount = 8 + Math.floor(totalKills * 0.35) + wave * 3;
    const spawnRate3 = (alive < targetCount && waveBreakTimer<=0) ? Math.max(1, 8 - Math.floor(totalKills/20)) : 0;
    if(spawnRate3>0 && spawnTimer % spawnRate3 === 0) spawnZombie(false);
  }

  // ── Ball (main) ──
  ball.footSpin += 0.12; // always spinning at feet

  // Cooldown decreases with kills
  const maxCD2=60, minCD2=10, killB2=Math.min(100,Math.floor(totalKills/5)*5);
  const currentMaxCD2 = Math.max(minCD2, maxCD2-killB2);

  if(!ball.active){
    ball.bounce += 0.18;
    const ballBounceY = Math.abs(Math.sin(ball.bounce))*6;
    ball.x = player.x + player.dir*8;
    ball.y = player.y + player.h/2 - ball.r - ballBounceY;
    ball.spin = ball.footSpin;
    if(player.stunned<=0) shootCooldown--;
    const canShoot = shootCooldown<=0 && player.stunned<=0;
    const wantsShoot = autoKick || manualKickRequest;
    if(canShoot && wantsShoot){
      const t=nearestVisible();
      if(t){
        manualKickRequest = false; // consumed by main ball
        const dx=t.x-ball.x, dy=t.y-ball.y, d=Math.sqrt(dx*dx+dy*dy);
        ball.vx=(dx/d)*4.5; ball.vy=(dy/d)*4.5;
        ball.active=true; ball.returning=false;
        ball.z=0; ball.zv=3.5;
        ball.ricochetsLeft=ricochetCount;
        ball.hitZombies=[];
        player.kickAnim=18;
        SFX.kick();
      } else {
        manualKickRequest = false; // no target, consume anyway
      }
    } else {
      if(!wantsShoot) manualKickRequest = false;
    }
  } else {
    ball.x+=ball.vx; ball.y+=ball.vy;
    ball.spin+=0.32;
    if(ball.z>0||ball.zv>0){ ball.z+=ball.zv; ball.zv-=0.22; if(ball.z<0){ball.z=0;ball.zv=0;} }
    // Fire trail — spawn one segment every 2 frames, each with its own pixel state
    if(fx.fireBall.active && !ball.returning && frameCount%2===0){
      // Each segment gets an array of pixel blocks + sparks, all born at this moment
      const seg = { x:ball.x, y:ball.y, life:120, maxLife:120, dead:false, pixels:[] };
      // 4-7 main pixel blocks, varied sizes
      const nPx = 4+Math.floor(Math.random()*4);
      for(let i=0;i<nPx;i++){
        seg.pixels.push({
          type:'block',
          ox:(Math.random()-0.5)*10,  // x offset from seg center (world units)
          oy:-(Math.random()*14),     // y offset upward
          sz:5+Math.floor(Math.random()*7), // 5–11px base size
          col:Math.random()<0.5?'#ff6d00':Math.random()<0.6?'#ff9800':'#ffeb3b',
          birthLife:120,              // remember birth life for shrink ratio
        });
      }
      // 3-4 sparks, chaotic upward
      const nSp = 3+Math.floor(Math.random()*2);
      for(let i=0;i<nSp;i++){
        seg.pixels.push({
          type:'spark',
          ox:(Math.random()-0.5)*14,
          oy:-(8+Math.random()*16),
          vox:(Math.random()-0.5)*0.25,  // slow horizontal drift per frame
          voy:-(0.3+Math.random()*0.4),  // upward drift per frame
          sz:2+Math.floor(Math.random()*3), // 2–4px
          col:Math.random()<0.6?'#ffeb3b':'#fff9c4',
          birthLife:120,
        });
      }
      fireTrails.push(seg);
    }
    // Ice ball trail
    if(fx.iceBall.active && !ball.returning && frameCount%3===0) makeIceBallTrail(ball);

    if(!ball.returning){
      let didBounce=false;
      // ── Collision balle → Boss Serpent ──
      if(checkBallSnakeHit(ball.x,ball.y,ball.vx,ball.vy)){
        ball.returning=true;
        const ang=Math.atan2(player.y-ball.y,player.x-ball.x);
        ball.vx=Math.cos(ang)*4; ball.vy=Math.sin(ang)*4; ball.z=0; ball.zv=2;
      }
      for(const z of zombies){
        if(z.dead||z.emerging>0) continue;
        if(ball.hitZombies&&ball.hitZombies.includes(z)) continue;
        const dx=ball.x-z.x, dy=ball.y-z.y, d=Math.sqrt(dx*dx+dy*dy);
        // Pour le géant : rayon de collision étendu pour couvrir tête+corps+jambes
        const zRadius = z.id==='giant' ? z.w/2 : z.w/2;
        if(d<zRadius+ball.r){
          if(ball.hitZombies) ball.hitZombies.push(z);
          if(fx.iceBall.active){
            if(!z.frozen){ freezeZombie(z); } sfxIceHit();
            if(ball.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.frozen&&z2.emerging===0&&!(ball.hitZombies&&ball.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){ ball.ricochetsLeft--; const nx=next.x-ball.x,ny=next.y-ball.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                ball.vx=(nx/nd2)*4.5; ball.vy=(ny/nd2)*4.5; ball.z=0; ball.zv=2; didBounce=true; break; }
            }
            ball.returning=true;
            const ang=Math.atan2(player.y-ball.y,player.x-ball.x);
            ball.vx=Math.cos(ang)*4; ball.vy=Math.sin(ang)*4; ball.z=0; ball.zv=2; break;
          }
          if(fx.fireBall.active){
            igniteZombie(z); SFX.hit();
            if(ball.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.onFire&&z2.emerging===0&&!(ball.hitZombies&&ball.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){ ball.ricochetsLeft--; const nx=next.x-ball.x,ny=next.y-ball.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                ball.vx=(nx/nd2)*4.5; ball.vy=(ny/nd2)*4.5; ball.z=0; ball.zv=2; didBounce=true; break; }
            }
            ball.returning=true;
            const ang=Math.atan2(player.y-ball.y,player.x-ball.x);
            ball.vx=Math.cos(ang)*4; ball.vy=Math.sin(ang)*4; ball.z=0; ball.zv=2; break;
          }
          z.hp--; z.hitFlash=10; blood(z.x,z.y,14);
          const nd=d||1; z.knockX=(dx/nd)*5; z.knockY=(dy/nd)*5;
          SFX.hit();
          if(z.hp<=0){
            if(z.id==='giant'){
              const bdx=ball.vx/(Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)||1);
              const bdy=ball.vy/(Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)||1);
              // hp already decremented; check if really dead
              z.hp=0; z.dead=true; z.deadAnim=60; z.flyingCorpse=false;
              score+=z.pts; totalKills++;
              if(killsByType[z.id]!==undefined) killsByType[z.id]++;
              scorePopup(z.x,z.y,z.pts);
              giantDeathExplosion(z, bdx, bdy);
            } else {
              z.dead=true; z.deadAnim=38; score+=z.pts; totalKills++;
              if(killsByType[z.id]!==undefined) killsByType[z.id]++;
              const bdx=ball.vx/(Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)||1);
              const bdy=ball.vy/(Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)||1);
              const bf=7+Math.random()*3;
              z.knockX=bdx*bf; z.knockY=bdy*bf; z.flyingCorpse=true;
              goreExplosion(z.x,z.y,bdx,bdy,z.body); scorePopup(z.x,z.y,z.pts); SFX.explode(); screenBlast(6);
            }
            if(ball.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.onFire&&z2.emerging===0&&!(ball.hitZombies&&ball.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){ ball.ricochetsLeft--; const nx=next.x-ball.x,ny=next.y-ball.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                ball.vx=(nx/nd2)*4.5; ball.vy=(ny/nd2)*4.5; ball.z=0; ball.zv=2; didBounce=true; break; }
            }
          } else {
            if(z.id==='big'||z.id==='tank'||z.id==='giant') SFX.bigHit(); else SFX.growl();
          }
          if(!didBounce){
            ball.returning=true;
            const ang=Math.atan2(player.y-ball.y,player.x-ball.x);
            ball.vx=Math.cos(ang)*4; ball.vy=Math.sin(ang)*4; ball.z=0; ball.zv=2;
          }
          break;
        }
      }
      // Retour si le ballon sort de l'écran (limites écran en coordonnées monde)
      const bsx=sx(ball.x), bsy=sy(ball.y);
      if(!didBounce&&!ball.returning&&(bsx<0||bsx>VW||bsy<0||bsy>VH)){
        ball.returning=true;
        const ang=Math.atan2(player.y-ball.y,player.x-ball.x);
        ball.vx=Math.cos(ang)*4; ball.vy=Math.sin(ang)*4;
      }
    } else {
      const retX=player.x+player.dir*8, retY=player.y+player.h/2-ball.r;
      const dx=retX-ball.x, dy=retY-ball.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<14){ ball.active=false; ball.returning=false; ball.footSpin=ball.spin; shootCooldown=0; }
      else{ ball.vx=(dx/d)*4.25; ball.vy=(dy/d)*4.25; }
    }
  }

  // ── Extra balls update ──
  // Position des extra balls : cercle dynamique autour du joueur
  // Pour 1-4 extra balls : positions fixes (gauche, haut, bas, droite-haut)
  // Pour 5-7 extra balls : cercle complet divisé équitablement
  const N = extraBalls.length;
  function getExtraBallOffset(bi){
    if(N >= 5){
      // Cercle complet : N positions réparties à 360/N degrés
      const angle = (bi / N) * Math.PI * 2 - Math.PI / 2; // commence en haut
      const r = 16;
      return { ox: Math.cos(angle)*r, oy: Math.sin(angle)*r };
    } else {
      // Positions fixes pour 1-4 extra balls
      const FIXED = [
        { ox:-10, oy:0   },
        { ox:0,   oy:-14 },
        { ox:0,   oy:14  },
        { ox:12,  oy:0   },
      ];
      return FIXED[bi] || { ox:0, oy:0 };
    }
  }

  // Extra balls always require manual kick (space/tap), never auto.
  // manualKickRequest may still be true if main ball was in flight (didn't consume it).
  // One tap fires one available extra ball.
  let extraKickConsumed = false;

  for(let bi=0;bi<extraBalls.length;bi++){
    const eb=extraBalls[bi];
    const epos=getExtraBallOffset(bi);
    eb.bounce+=0.18;
    const ebBY=Math.abs(Math.sin(eb.bounce))*5;
    if(!eb.active){
      eb.x=player.x+epos.ox;
      eb.y=player.y+epos.oy+player.h/2-eb.r-ebBY;
      eb.spin=eb.footSpin;
      // Fire on manual request — first available ball gets the shot
      if(!extraKickConsumed && manualKickRequest && player.stunned<=0){
        const t2=nearestVisible();
        if(t2){
          const dx=t2.x-eb.x,dy=t2.y-eb.y,d=Math.sqrt(dx*dx+dy*dy)||1;
          eb.vx=(dx/d)*4.5; eb.vy=(dy/d)*4.5;
          eb.active=true; eb.returning=false; eb.z=0; eb.zv=3;
          eb.ricochetsLeft=ricochetCount; eb.hitZombies=[];
          extraKickConsumed = true;
          manualKickRequest = false; // consumed
          SFX.kick();
        }
      }
    } else {
      eb.x+=eb.vx; eb.y+=eb.vy; eb.spin+=0.32;
      if(eb.z>0||eb.zv>0){ eb.z+=eb.zv; eb.zv-=0.22; if(eb.z<0){eb.z=0;eb.zv=0;} }
      if(fx.fireBall.active && !eb.returning && frameCount%2===0){
        const seg={x:eb.x,y:eb.y,life:120,maxLife:120,dead:false,pixels:[]};
        const nPx=4+Math.floor(Math.random()*4);
        for(let i=0;i<nPx;i++) seg.pixels.push({type:'block',ox:(Math.random()-0.5)*10,oy:-(Math.random()*14),sz:5+Math.floor(Math.random()*7),col:Math.random()<0.5?'#ff6d00':Math.random()<0.6?'#ff9800':'#ffeb3b',birthLife:120});
        const nSp=3+Math.floor(Math.random()*2);
        for(let i=0;i<nSp;i++) seg.pixels.push({type:'spark',ox:(Math.random()-0.5)*14,oy:-(8+Math.random()*16),vox:(Math.random()-0.5)*0.25,voy:-(0.3+Math.random()*0.4),sz:2+Math.floor(Math.random()*3),col:Math.random()<0.6?'#ffeb3b':'#fff9c4',birthLife:120});
        fireTrails.push(seg);
      }
      if(fx.iceBall.active && !eb.returning && frameCount%3===0) makeIceBallTrail(eb);
      if(!eb.returning){
        // ── Collision extra ball → Boss Serpent ──
        if(checkBallSnakeHit(eb.x,eb.y,eb.vx,eb.vy)){
          eb.returning=true;
          const ang=Math.atan2(player.y-eb.y,player.x-eb.x);
          eb.vx=Math.cos(ang)*4; eb.vy=Math.sin(ang)*4; eb.z=0; eb.zv=2;
        }
        for(const z of zombies){
          if(z.dead||z.emerging>0) continue;
          if(eb.hitZombies&&eb.hitZombies.includes(z)) continue;
          const dx=eb.x-z.x,dy=eb.y-z.y,d=Math.sqrt(dx*dx+dy*dy);
          const zRadius2 = z.id==='giant' ? z.w/2 : z.w/2;
          if(d<zRadius2+eb.r){
            if(eb.hitZombies) eb.hitZombies.push(z);
            if(fx.iceBall.active){
              if(!z.frozen){ freezeZombie(z); } sfxIceHit();
              if(eb.ricochetsLeft>0){
                const next=zombies.filter(z2=>!z2.dead&&!z2.frozen&&z2.emerging===0&&!(eb.hitZombies&&eb.hitZombies.includes(z2)))
                  .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
                if(next){ eb.ricochetsLeft--; const nx=next.x-eb.x,ny=next.y-eb.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                  eb.vx=(nx/nd2)*4.5; eb.vy=(ny/nd2)*4.5; eb.z=0; eb.zv=2; break; }
              }
              eb.returning=true; const angI=Math.atan2(player.y-eb.y,player.x-eb.x);
              eb.vx=Math.cos(angI)*4; eb.vy=Math.sin(angI)*4; eb.z=0; eb.zv=2; break;
            }
            if(fx.fireBall.active){ igniteZombie(z); SFX.hit(); }
            else {
              z.hp--; z.hitFlash=10; blood(z.x,z.y,10);
              if(z.hp<=0){
                z.dead=true; z.deadAnim=38; score+=z.pts; totalKills++;
                if(killsByType[z.id]!==undefined) killsByType[z.id]++;
                const bdx=eb.vx/(Math.sqrt(eb.vx*eb.vx+eb.vy*eb.vy)||1);
                const bdy=eb.vy/(Math.sqrt(eb.vx*eb.vx+eb.vy*eb.vy)||1);
                z.knockX=bdx*7; z.knockY=bdy*7; z.flyingCorpse=true;
                goreExplosion(z.x,z.y,bdx,bdy,z.body); scorePopup(z.x,z.y,z.pts); SFX.explode();
              } else SFX.hit();
            }
            // ricochet for extra ball
            if(eb.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.onFire&&z2.emerging===0&&!(eb.hitZombies&&eb.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){ eb.ricochetsLeft--; const nx=next.x-eb.x,ny=next.y-eb.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                eb.vx=(nx/nd2)*4.5; eb.vy=(ny/nd2)*4.5; eb.z=0; eb.zv=2; break; }
            }
            eb.returning=true;
            const ang=Math.atan2(player.y-eb.y,player.x-eb.x);
            eb.vx=Math.cos(ang)*4; eb.vy=Math.sin(ang)*4; eb.z=0; eb.zv=2; break;
          }
        }
        const ebsx=sx(eb.x), ebsy=sy(eb.y);
        if(!eb.returning&&(ebsx<0||ebsx>VW||ebsy<0||ebsy>VH)){
          eb.returning=true;
          const ang=Math.atan2(player.y-eb.y,player.x-eb.x);
          eb.vx=Math.cos(ang)*4; eb.vy=Math.sin(ang)*4;
        }
      } else {
        const rx=player.x+epos.ox, ry=player.y+epos.oy+player.h/2-eb.r;
        const dx=rx-eb.x,dy=ry-eb.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<14){ eb.active=false; eb.returning=false; eb.footSpin=eb.spin; eb.shootCooldown=0; }
        else{ eb.vx=(dx/d)*4.25; eb.vy=(dy/d)*4.25; }
      }
    }
  }

  // ── Orbit balls (x6balls powerup) ──
  updateOrbitBalls();

  // ── Fire trail tick: age segments, move sparks, ignite zombies, char on death ──
  for(let i=fireTrails.length-1;i>=0;i--){
    const ft=fireTrails[i];
    ft.life--;
    // Update spark positions each frame
    if(ft.pixels){
      for(const p of ft.pixels){
        if(p.type==='spark'){
          p.ox += p.vox + (Math.random()-0.5)*0.18; // chaotic wobble
          p.oy += p.voy;                             // drift upward
          p.vox *= 0.95;
        }
      }
    }
    if(ft.life<=0){
      // Leave a small black char mark for 1s (60f)
      if(!ft.dead){
        ft.dead=true;
        particles.push({x:ft.x,y:ft.y,vx:0,vy:0,life:60,maxLife:60,
          color:'#212121',sz:6+Math.random()*5,type:'puddle',gravity:0});
      }
      fireTrails.splice(i,1); continue;
    }
    // Ignite zombies every 4 frames
    if(frameCount%4===0){
      for(const z of zombies){
        if(z.dead||z.onFire||z.emerging>0) continue;
        const fireHitR = z.id==='giant' ? z.w/2+14 : z.w/2+14;
        if(Math.hypot(z.x-ft.x,z.y-ft.y)<fireHitR) igniteZombie(z);
      }
    }
  }

  // ── Zombies — move + collisions ──
  const aliveZ = zombies.filter(z=>!z.dead);

  // STEP 1: Move all zombies
  for(const z of zombies){
    if(z.dead){
      z.deadAnim--;
      if(z.flyingCorpse){
        // Apply gravity and friction to flying corpse
        z.knockX*=0.88; z.knockY*=0.88;
        z.knockY+=0.15; // gravity drag
        z.x+=z.knockX; z.y+=z.knockY;
        // Clamp to pitch
        z.x=Math.max(PITCH.x, Math.min(PITCH.x+PITCH.w, z.x));
        z.y=Math.max(PITCH.y, Math.min(PITCH.y+PITCH.h, z.y));
        // Spawn blood trail along flight path
        if(z.deadAnim%2===0 && Math.sqrt(z.knockX*z.knockX+z.knockY*z.knockY)>0.8){
          particles.push({x:z.x+(Math.random()-0.5)*z.w, y:z.y+(Math.random()-0.5)*z.h,
            vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8,
            life:660, maxLife:660,
            color:Math.random()<0.6?C.blood:'#5d0000',
            sz:3+Math.random()*4, type:'puddle', gravity:0});
        }
      }
      continue;
    }
    const dx=player.x-z.x, dy=player.y-z.y, d=Math.sqrt(dx*dx+dy*dy)||1;

    // Sprinters weave slightly
    let weavX=0, weavY=0;
    // no weave for fast zombies

    // Emerging: zombie is digging out, can't move yet
    if(z.emerging>0){ z.emerging--; z.vx=0; z.vy=0; continue; } // still digging
    // Frozen by fire — stays immobile
    if(z.fireFrozen){ z.vx=0; z.vy=0; z.knockX=0; z.knockY=0; continue; }
    // Frozen by ice ball — stays immobile
    if(z.frozen){ z.vx=0; z.vy=0; z.knockX=0; z.knockY=0; continue; }
    // ── Speed phases: 5 phases based on totalKills, hard cap at phase 5 ──
    // Phase thresholds (kills needed to reach each phase)
    // Phase 1: 0–19  → ×1.0  (base)
    // Phase 2: 20–49 → ×1.2
    // Phase 3: 50–99 → ×1.45
    // Phase 4: 100–179 → ×1.70
    // Phase 5: 180+  → ×2.0  (hard cap, never faster)
    const killPhaseBoost = totalKills>=180 ? 2.0
                         : totalKills>=100 ? 1.70
                         : totalKills>=50  ? 1.45
                         : totalKills>=20  ? 1.20
                         : 1.0;
    // Only normal zombies scale — others keep their base speed (but benefit from wave purge mult)
    const killBoost = (z.id==='normal') ? killPhaseBoost : 1;
    const globalMult = zombieSpeedMult * (z.speedVariant||1);
    const speedScale = killBoost * globalMult;
    const slowScale = fx.slowMo.active ? 0.15 : 1;

    // ── GIANT JUMP MECHANIC ──
    if(z.id==='giant'){
      if(z.jumpCooldown>0) z.jumpCooldown--;

      // Phase 0 → 1: start charge if cooldown expired and far enough
      if(z.jumpPhase===0 && z.jumpCooldown<=0 && d > 80){
        z.jumpPhase=1;
        z.jumpTimer=50; // charge frames
        z.jumpTargetX = player.x + ((player.vx||0)*8);
        z.jumpTargetY = player.y + ((player.vy||0)*8);
        z.jumpTargetX = Math.max(PITCH.x+40, Math.min(PITCH.x+PITCH.w-40, z.jumpTargetX));
        z.jumpTargetY = Math.max(PITCH.y+40, Math.min(PITCH.y+PITCH.h-40, z.jumpTargetY));
        z.jumpStartX = z.x; z.jumpStartY = z.y;
        z.jumpDuration = 45;
        z.jumpArcH = 120 + Math.random()*60;
        SFX.giantLeap();
      }

      // Phase 1: charging — stomp in place, freeze movement
      if(z.jumpPhase===1){
        z.jumpTimer--;
        z.vx=0; z.vy=0; z.knockX=0; z.knockY=0;
        if(z.hitFlash>0) z.hitFlash--;
        z.animFrame=Math.floor(frameCount/6)%2;
        if(z.jumpTimer<=0){ z.jumpPhase=2; z.jumpTimer=z.jumpDuration; z.jumpArc=0; }
        z.x=Math.max(PITCH.x+z.w/2, Math.min(PITCH.x+PITCH.w-z.w/2, z.x));
        z.y=Math.max(PITCH.y+z.h/2, Math.min(PITCH.y+PITCH.h-z.h/2, z.y));
        continue;
      }

      // Phase 2: airborne — parabolic arc toward target
      if(z.jumpPhase===2){
        z.jumpTimer--;
        const t2 = 1 - (z.jumpTimer / z.jumpDuration);
        z.x = z.jumpStartX + (z.jumpTargetX - z.jumpStartX)*t2;
        z.y = z.jumpStartY + (z.jumpTargetY - z.jumpStartY)*t2;
        z.jumpArc = (z.jumpArcH||120) * Math.sin(t2*Math.PI);
        z.dir = (z.jumpTargetX >= z.jumpStartX) ? 1 : -1;
        z.vx=0; z.vy=0; z.knockX=0; z.knockY=0;
        z.animFrame=Math.floor(frameCount/4)%2;
        if(z.hitFlash>0) z.hitFlash--;
        if(z.jumpTimer<=0){
          // LANDING
          z.jumpPhase=3; z.jumpTimer=22; z.jumpArc=0;
          const crushR=100;
          for(const oz of zombies){
            if(oz===z||oz.dead||oz.id==='giant') continue;
            const cdist=Math.hypot(oz.x-z.x, oz.y-z.y);
            if(cdist<crushR){
              oz.dead=true; oz.deadAnim=30; oz.flyingCorpse=true;
              const ca=Math.atan2(oz.y-z.y, oz.x-z.x);
              oz.knockX=Math.cos(ca)*9; oz.knockY=Math.sin(ca)*9;
              goreExplosion(oz.x,oz.y,Math.cos(ca),Math.sin(ca),oz.skin||'#9e9e9e');
              score+=Math.round((oz.pts||10)*0.5);
              totalKills++;
            } else if(cdist<crushR*2){
              const ca=Math.atan2(oz.y-z.y,oz.x-z.x);
              oz.knockX+=Math.cos(ca)*5*(1-(cdist/(crushR*2)));
              oz.knockY+=Math.sin(ca)*5*(1-(cdist/(crushR*2)));
            }
          }
          // Knock player if nearby
          const pd=Math.hypot(player.x-z.x, player.y-z.y);
          if(pd<crushR+player.w && !invincibleMode && !megaDash.active && !samurai.active){
            player.hp-=1.5; player.hitFlash=25; player.stunned=30;
            const pa=Math.atan2(player.y-z.y,player.x-z.x);
            player.knockX=Math.cos(pa)*14; player.knockY=Math.sin(pa)*14;
            SFX.playerScream();
          }
          SFX.giantLand();
          screenBlast(24);
          spawnDirt(z.x, z.y);
          for(let pi=0;pi<18;pi++){
            const pa2=Math.random()*Math.PI*2, ps=2+Math.random()*5;
            particles.push({x:z.x+(Math.random()-0.5)*40,y:z.y+(Math.random()-0.5)*15,
              vx:Math.cos(pa2)*ps,vy:Math.sin(pa2)*ps-1.5,
              life:45+Math.random()*25,maxLife:70,
              color:'rgba(160,130,80,0.75)',sz:7+Math.random()*9,type:'puddle',gravity:0});
          }
        }
        continue;
      }

      // Phase 3: landing stun
      if(z.jumpPhase===3){
        z.jumpTimer--;
        z.vx=0; z.vy=0;
        if(z.hitFlash>0) z.hitFlash--;
        z.x=Math.max(PITCH.x+z.w/2, Math.min(PITCH.x+PITCH.w-z.w/2, z.x));
        z.y=Math.max(PITCH.y+z.h/2, Math.min(PITCH.y+PITCH.h-z.h/2, z.y));
        z.animFrame=Math.floor(frameCount/10)%2;
        if(z.jumpTimer<=0){ z.jumpPhase=0; z.jumpArc=0; z.jumpCooldown=300+Math.random()*180; }
        continue;
      }
    }
    // ── END GIANT JUMP ──

    z.vx=(dx/d)*z.spd*speedScale*slowScale+weavX; z.vy=(dy/d)*z.spd*speedScale*slowScale+weavY;
    z.dir = (player.x > z.x) ? 1 : -1; // face player
    z.knockX*=0.82; z.knockY*=0.82;

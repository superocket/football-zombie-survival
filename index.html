function drawPauseScreen(anim){
  // anim: 0=hidden → 1=fully visible (used for both open & close)
  if(anim === undefined) anim = 1;

  // Easing helpers
  const easeOut = t => 1 - Math.pow(1-t, 3);
  const easeIn  = t => t * t * t;
  const easeOutBack = t => { const c = 1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); };

  // Per-element stagger: element i starts at delay*i, spans (1-delay*i) of anim range
  // delays: title=0, home=0.08, playBtn=0.16, cb1=0.24, cb2=0.32
  function elemT(delay, span){
    const raw = (anim - delay) / span;
    return Math.max(0, Math.min(1, raw));
  }

  // ── Background overlay — fades in first ──
  const bgA = easeOut(elemT(0, 0.6)) * 0.72;
  ctx.fillStyle = `rgba(0,0,0,${bgA})`;
  ctx.fillRect(0, 0, VW, VH);

  if(bgA < 0.01) return; // nothing visible yet

  // ── Helper: draw element with clip + alpha ──
  function withAnim(delay, span, ease, fn){
    const t = ease(elemT(delay, span));
    if(t <= 0) return;
    ctx.save();
    ctx.globalAlpha = t;
    fn(t);
    ctx.restore();
  }

  // ── PAUSE title — slides down from top ──
  withAnim(0, 0.55, easeOutBack, t => {
    const offY = (1-t) * -60;
    ctx.fillStyle = '#e8ff00';
    ctx.font = 'bold 32px Courier New';
    ctx.textAlign = 'center';
    // Glow
    ctx.shadowColor = '#e8ff00';
    ctx.shadowBlur = 18 * t;
    ctx.fillText('PAUSE', VW/2, 52 + offY);
    ctx.shadowBlur = 0;
  });

  // ── GO TO HOME — slides in from left ──
  withAnim(0.08, 0.55, easeOut, t => {
    const offX = (1-t) * -VW * 0.5;
    ctx.fillStyle = '#e8ff00';
    ctx.textAlign = 'center';
    ctx.font = 'bold 32px Courier New';
    ctx.fillText('←', VW/2 - 90 + offX, VH/2 - 148);
    ctx.font = 'bold 22px Courier New';
    ctx.fillText('GO TO HOME', VW/2 + 18 + offX, VH/2 - 148);
  });

  // ── PLAY button — scales up from center + slides up ──
  withAnim(0.16, 0.55, easeOutBack, t => {
    const skew = 7, btnW = 240, btnH = 50;
    const btnX = VW/2 - btnW/2, btnY = VH/2 - 80;
    const offY = (1-t) * 40;
    ctx.save();
    ctx.translate(VW/2, btnY + btnH/2 + offY);
    ctx.scale(t, t);
    ctx.translate(-VW/2, -(btnY + btnH/2));
    ctx.shadowColor = '#e8ff00';
    ctx.shadowBlur = 16 * t;
    ctx.fillStyle = '#e8ff00';
    ctx.beginPath();
    ctx.moveTo(btnX + skew, btnY); ctx.lineTo(btnX + btnW, btnY);
    ctx.lineTo(btnX + btnW - skew, btnY + btnH); ctx.lineTo(btnX, btnY + btnH);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('▶  PLAY', VW/2, btnY + btnH/2 + 7);
    ctx.restore();
  });

  // ── Checkboxes ──
  const cbSize = 28;
  const cbX = VW/2 - 110;
  const cbY1 = VH/2 + 50;
  const cbY2 = VH/2 + 110;

  function drawCheckbox(cx, cy, checked, color, label, sublabel){
    ctx.strokeStyle = checked ? color : '#666';
    ctx.lineWidth = 2.5;
    ctx.fillStyle = checked ? `rgba(${color==='#00eeff'?'0,200,255':'232,255,0'},0.15)` : 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(cx, cy, cbSize, cbSize, 5); ctx.fill(); ctx.stroke();
    if(checked){
      ctx.strokeStyle = color; ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cx+5, cy+14); ctx.lineTo(cx+11, cy+21); ctx.lineTo(cx+23, cy+6);
      ctx.stroke(); ctx.lineCap = 'butt';
    }
    ctx.fillStyle = checked ? color : '#888';
    ctx.font = checked ? 'bold 18px Courier New' : '18px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(label, cx + cbSize + 12, cy + 20);
    if(sublabel){
      ctx.fillStyle = '#666'; ctx.font = '11px Courier New';
      ctx.fillText(sublabel, cx + cbSize + 12, cy + 34);
    }
  }

  // Checkbox 1 — slides in from right
  withAnim(0.24, 0.55, easeOut, t => {
    const offX = (1-t) * VW * 0.5;
    ctx.save(); ctx.translate(offX, 0);
    drawCheckbox(cbX, cbY1, invincibleMode, '#00eeff', 'INVINCIBLE MODE', null);
    ctx.restore();
  });

  // Checkbox 2 — slides in from right with more delay
  withAnim(0.32, 0.55, easeOut, t => {
    const offX = (1-t) * VW * 0.5;
    ctx.save(); ctx.translate(offX, 0);
    drawCheckbox(cbX, cbY2, autoKick, '#e8ff00', 'AUTO KICK', autoKick ? null : 'SPACE / TAP to kick');
    ctx.restore();
  });
}

// Store checkbox hit area for tap detection
const INVINC_CB = { x: VW/2 - 110, y: 0, w: 280, h: 38 };
function updateInvincCbY(){ INVINC_CB.y = VH/2 + 50; }

// Auto kick checkbox hit area
const AUTOKICK_CB = { x: VW/2 - 110, y: 0, w: 280, h: 38 };
function updateAutoKickCbY(){ AUTOKICK_CB.y = VH/2 + 110; }

// Store home button hit area (texte centré sous PAUSE)
const HOME_BTN = { x: VW/2 - 140, y: VH/2 - 168, w: 280, h: 36 };
function updateHomeBtnY(){ HOME_BTN.y = VH/2 - 168; }

// Play button hit area
const PLAY_BTN = { x: VW/2 - 120, y: 0, w: 240, h: 50 };
function updatePlayBtnY(){ PLAY_BTN.y = VH/2 - 80; }

function togglePause(){
  if(!isPaused){
    // Opening: set paused immediately, start open animation
    isPaused = true;
    pauseAnimDir = 1;
    pauseAnim = 0;
  } else {
    // Closing: start close animation; isPaused cleared when anim ends
    pauseAnimDir = -1;
  }
}

function goToHome(){
  // Arrêt de la boucle de jeu
  if(loopId){ cancelAnimationFrame(loopId); loopId=null; }
  isPaused = false;
  gameOver = false;
  // Afficher l'écran d'accueil
  const overlay = document.getElementById('overlay');
  const finalScore = document.getElementById('final-score');
  finalScore.style.display = 'none';
  document.getElementById('startBtn').textContent = 'PLAY';
  overlay.style.display = 'flex';
}
function drawTargetArrow(){
  if(!currentTarget || currentTarget.dead) return;
  const z = currentTarget;
  const scx = sx(z.x);
  const scy = sy(z.y) - (z.h||20)*ZOOM*0.5 - 10; // above zombie head

  const t = frameCount;
  // Rainbow hue cycling
  const hue = (t * 4) % 360;
  const hue2 = (t * 4 + 120) % 360;
  const hue3 = (t * 4 + 240) % 360;

  // Bouncing animation: oscillates up and down
  const bounce = Math.abs(Math.sin(t * 0.12)) * 10;
  const arrowY = scy - bounce;

  // Arrow size
  const W = 10, H = Math.round(W * 0.866);

  ctx.save();
  ctx.shadowBlur = 18;

  // Draw 3 layered glows for rainbow shimmer effect
  const colors = [
    `hsl(${hue},100%,60%)`,
    `hsl(${hue2},100%,60%)`,
    `hsl(${hue3},100%,60%)`,
  ];

  for(let i = 0; i < colors.length; i++){
    ctx.globalAlpha = 0.35 + 0.1*Math.sin(t*0.15 + i*2);
    ctx.shadowColor = colors[i];
    ctx.fillStyle = colors[i];
    // Draw downward-pointing triangle slightly offset for glow blending
    ctx.beginPath();
    ctx.moveTo(scx - W/2 - i, arrowY - H - i);
    ctx.lineTo(scx + W/2 + i, arrowY - H - i);
    ctx.lineTo(scx,            arrowY + i);
    ctx.closePath();
    ctx.fill();
  }

  // Main solid arrow on top
  ctx.globalAlpha = 1;
  // Gradient fill
  const grad = ctx.createLinearGradient(scx - W/2, arrowY - H, scx + W/2, arrowY);
  grad.addColorStop(0,   `hsl(${hue},100%,75%)`);
  grad.addColorStop(0.5, `hsl(${hue2},100%,70%)`);
  grad.addColorStop(1,   `hsl(${hue3},100%,75%)`);
  ctx.shadowColor = `hsl(${hue},100%,60%)`;
  ctx.shadowBlur = 14;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(scx - W/2, arrowY - H);
  ctx.lineTo(scx + W/2, arrowY - H);
  ctx.lineTo(scx,       arrowY);
  ctx.closePath();
  ctx.fill();

  // White highlight edge
  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#ffffff';
  ctx.stroke();

  ctx.restore();
}

function drawLowHpFreezeOverlay(){
  if(megaDash.lowHpFreezeTimer <= 0) return;

  const t = megaDash.lowHpFreezeTimer; // 120 → 0
  const progress = t / 120; // 1.0 → 0.0

  // Dark vignette pulse
  ctx.save();
  const pulse = 0.38 + 0.12 * Math.sin(frameCount * 0.25);
  ctx.fillStyle = `rgba(0,0,0,${0.45 * pulse})`;
  ctx.fillRect(0, 0, VW, VH);

  // "DANGER" warning text at top
  ctx.globalAlpha = 0.92;
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff2222';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#ff4444';
  ctx.fillText('⚠ CRITICAL HP ⚠', VW/2, 80);

  // Countdown seconds (2 → 0)
  const secsLeft = Math.ceil(t / 60);
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px Courier New';
  ctx.fillText(secsLeft, VW/2, 120);

  // Progress bar (time remaining) above the mega button
  const barW = 200, barH = 8;
  const barX = VW/2 - barW/2;
  const barY = MEGA_BTN.y - 30;
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#111';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = progress > 0.5 ? '#e8ff00' : '#ff4444';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 10;
  ctx.fillRect(barX, barY, barW * progress, barH);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function loop(timestamp){
  // ── Fixed timestep: always run logic at 60fps regardless of display hz ──
  if(!lastTimestamp) lastTimestamp = timestamp;
  let dt = timestamp - lastTimestamp;
  lastTimestamp = timestamp;
  // Cap dt to 100ms to avoid spiral of death after tab switch / sleep
  if(dt > 100) dt = 100;
  accumulator += dt;

  drawStands();
  drawPitch();
  if(!gameOver){
    // Run as many 60fps logic ticks as needed to catch up
    while(accumulator >= FIXED_DT){
      if(!isPaused){
        if(oneUpFX.phase===0) update();
        else { updateOneUpFX(); updateCamera(); }
      }
      accumulator -= FIXED_DT;
    }
    drawParticles();
    drawPowerups();
    drawThunderbolts();
    drawFireTrails();
    drawIceBallTrail();
    drawBiomeObstacles();
    drawSnakeBoss();
    drawMegaDashTrail();
    drawBall();
    drawBallFire();
    drawIceBallAura();
    drawBall2();
    drawOrbitBalls();
    zombies.slice().sort((a,b)=>a.y-b.y).forEach(z=>{ drawZombie(z); drawZombieFire(z); if(z.frozen&&!z.dead) drawFrozenZombie(z); });
    drawTargetArrow();
    drawSamuraiGhosts();
    drawPlayer();
    drawNinjaCostume();
    drawSamuraiSword();
    drawShotgunAim();
    drawSlowMoOverlay();
    drawBiomeFilter();
    drawSnowflakes();
    drawJoystick();
    drawUI();
    drawMegaDashButton();
    drawLowHpFreezeOverlay();
    drawOneUpFX();
    drawActiveFX();
    drawPauseButton();
    // Tick pause animation
    if(pauseAnimDir !== 0){
      pauseAnim = Math.min(1, Math.max(0, pauseAnim + pauseAnimDir * PAUSE_ANIM_SPD));
      if(pauseAnimDir === 1 && pauseAnim >= 1){ pauseAnimDir = 0; }
      if(pauseAnimDir === -1 && pauseAnim <= 0){ pauseAnimDir = 0; isPaused = false; }
    }
    if(isPaused || pauseAnim > 0) drawPauseScreen(pauseAnim);
    loopId=requestAnimationFrame(loop);
  } else {
    drawParticles();
    zombies.forEach(drawZombie);
    drawPlayer();
    drawUI();
    drawGameOver();
    setTimeout(()=>{
      const fs=document.getElementById('final-score');
      fs.style.display='block';
      fs.textContent='Score: '+score+' — Wave '+wave+' — '+totalKills+' zombies killed';
      document.getElementById('startBtn').textContent='PLAY AGAIN';
      document.getElementById('overlay').style.display='flex';
    },1800);
  }
}

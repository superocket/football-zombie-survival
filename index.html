<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Football Zombie Survival</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; justify-content:center; align-items:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
  touch-action:none;
}
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:rgba(0,0,0,0.93); z-index:10;
}
#overlay h1 {
  color:#e8ff00; font-size:24px; letter-spacing:3px;
  text-transform:uppercase; text-align:center;
  text-shadow:0 0 18px #e8ff00aa; margin-bottom:6px;
}
.sub { color:#ff4444; font-size:11px; letter-spacing:2px; margin-bottom:26px; }
.score-display { color:#fff; font-size:13px; margin-bottom:18px; text-align:center; letter-spacing:1px; }
#overlay button {
  background:#e8ff00; border:none; color:#000;
  font-size:14px; font-family:'Courier New',monospace; font-weight:bold;
  letter-spacing:3px; padding:14px 44px; cursor:pointer; text-transform:uppercase;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.instructions {
  color:#ffffff; font-size:14px; margin-top:18px;
  text-align:center; line-height:2; letter-spacing:1px;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="overlay">
  <h1>&#x26BD; FOOTBALL<br>ZOMBIE SURVIVAL</h1>
  <div class="sub">&#8212; HORDE EDITION &#8212;</div>
  <div class="score-display" id="final-score" style="display:none"></div>
  <button id="startBtn" onclick="startGame()">PLAY</button>
  <div class="instructions">
    HOLD finger &#8594; move your player<br>
    Ball auto-shoots visible zombies<br>
    More kills &#8594; bigger horde !
  </div>
</div>
<script>
// ══════════════════════════════════════
// SETUP
// ══════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VW = 390, VH = 844;
canvas.width = VW; canvas.height = VH;
const ZOOM = 2.4; // camera zoom factor

// ── Detect mobile vs desktop ──
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                 ('ontouchstart' in window && navigator.maxTouchPoints > 1);

function resize(){
  if(isMobile){
    // Mobile: scale to fit screen preserving ratio
    const s = Math.min(innerWidth/VW, innerHeight/VH);
    canvas.style.width  = VW*s+'px';
    canvas.style.height = VH*s+'px';
    canvas.style.position = '';
    canvas.style.left = '';
    canvas.style.top  = '';
  } else {
    // Desktop: fill the entire viewport height, center horizontally
    const s = Math.min(innerWidth/VW, innerHeight/VH);
    canvas.style.width  = VW*s+'px';
    canvas.style.height = VH*s+'px';
  }
}
resize(); addEventListener('resize', resize);

// ── Fullscreen button (desktop only) ──
if(!isMobile){
  const fsBtn = document.createElement('button');
  fsBtn.id = 'fsBtn';
  fsBtn.textContent = '⛶ FULLSCREEN';
  fsBtn.style.cssText = `
    position:fixed; bottom:12px; right:12px; z-index:100;
    background:rgba(0,0,0,0.7); color:#e8ff00; border:1px solid #e8ff00;
    font:bold 11px Courier New; letter-spacing:2px; padding:7px 14px;
    cursor:pointer; text-transform:uppercase; outline:none;
  `;
  fsBtn.onclick = ()=>{
    const el = document.documentElement;
    if(!document.fullscreenElement){
      el.requestFullscreen && el.requestFullscreen();
      fsBtn.textContent = '✕ EXIT FULL';
    } else {
      document.exitFullscreen && document.exitFullscreen();
      fsBtn.textContent = '⛶ FULLSCREEN';
    }
  };
  document.addEventListener('fullscreenchange', ()=>{
    if(!document.fullscreenElement) fsBtn.textContent = '⛶ FULLSCREEN';
  });
  document.body.appendChild(fsBtn);
  // Auto-request fullscreen when game starts
  document.getElementById('startBtn').addEventListener('click', ()=>{
    const el = document.documentElement;
    if(!document.fullscreenElement){
      el.requestFullscreen && el.requestFullscreen().catch(()=>{});
    }
  }, {once:false});
}

// ── WORLD ──
const WORLD = { w:1000, h:1800 };
const PITCH = { x:40, y:60, w:WORLD.w-80, h:WORLD.h-120 };

// ── CAMERA ──
const cam = { x:0, y:0, shake:0 };
function updateCamera(){
  // cam stores the world position of screen center (= player position)
  cam.x += (player.x - cam.x) * 0.12;
  cam.y += (player.y - cam.y) * 0.12;
}
// World-to-screen with zoom (ZOOM=1.35 means 35% closer)
// World-to-screen: player (cam.x/y) always maps to screen center (VW/2, VH/2)
const sx = wx => (wx - cam.x) * ZOOM + VW/2 + (cam.shake>0?(Math.random()-0.5)*cam.shake:0);
const sy = wy => (wy - cam.y) * ZOOM + VH/2 + (cam.shake>0?(Math.random()-0.5)*cam.shake:0);

// ══════════════════════════════════════
// AUDIO  (Web Audio API)
// ══════════════════════════════════════
let AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq,type,dur,vol,fe){
  try{
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
    if(fe!=null) o.frequency.exponentialRampToValueAtTime(fe,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function noise(dur,vol,band){
  try{
    const ac=getAC(), len=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=band; f.Q.value=0.7;
    const g=ac.createGain();
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(); src.stop(ac.currentTime+dur);
  }catch(e){}
}
let lastSfxTime = {};
function throttleSfx(key, minMs, fn){
  const now = Date.now();
  if(!lastSfxTime[key] || now-lastSfxTime[key]>minMs){ lastSfxTime[key]=now; fn(); }
}

const SFX = {
  kick(){  tone(190,'sine',0.13,0.55,55); noise(0.08,0.22,320); },
  hit(){   tone(230,'square',0.08,0.3,180); noise(0.06,0.15,500); },
  growl(){ throttleSfx('gr',120,()=>{ tone(80+Math.random()*55,'sawtooth',0.19,0.2,48); noise(0.15,0.08,180); }); },

  // Short running grunt for fast/sprint zombies — replays every ~1s
  runGrowl(){
    throttleSfx('rg',80,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Quick sharp exhale grunt: rising then cut
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(140+Math.random()*40, t0);
        o.frequency.exponentialRampToValueAtTime(80, t0+0.06);
        g.gain.setValueAtTime(0.28, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.08);
        const flt=ac.createBiquadFilter();
        flt.type='bandpass'; flt.frequency.value=300; flt.Q.value=1.2;
        o.connect(flt); flt.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.09);
        // Breathy noise underlayer
        noise(0.06, 0.12, 250+Math.random()*100);
      }catch(e){}
    });
  },

  // Deep heavy groan when big/tank zombie takes a hit
  bigHit(){
    throttleSfx('bh',180,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Very low guttural moan — descends slowly
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(65+Math.random()*20, t0);
        o.frequency.exponentialRampToValueAtTime(30, t0+0.35);
        g.gain.setValueAtTime(0.45, t0);
        g.gain.linearRampToValueAtTime(0.3, t0+0.15);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.38);
        const flt=ac.createBiquadFilter();
        flt.type='lowpass'; flt.frequency.value=320;
        o.connect(flt); flt.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.4);
        // Rumble noise
        noise(0.25, 0.2, 90+Math.random()*40);
        // Second harmonic layer
        setTimeout(()=>{
          const o2=ac.createOscillator(), g2=ac.createGain();
          o2.type='sine';
          o2.frequency.setValueAtTime(40, ac.currentTime);
          o2.frequency.exponentialRampToValueAtTime(22, ac.currentTime+0.2);
          g2.gain.setValueAtTime(0.3, ac.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.22);
          o2.connect(g2); g2.connect(ac.destination);
          o2.start(); o2.stop(ac.currentTime+0.23);
        }, 40);
      }catch(e){}
    });
  },
  explode(){ noise(0.38,0.6,650); tone(70,'sawtooth',0.28,0.4,35); setTimeout(()=>noise(0.2,0.28,200),80); },
  playerScream(){
    throttleSfx('ph',500,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // ── Impact grave (choc physique) ──
        const oi=ac.createOscillator(), gi=ac.createGain();
        oi.type='sine';
        oi.frequency.setValueAtTime(110,t0);
        oi.frequency.exponentialRampToValueAtTime(30,t0+0.18);
        gi.gain.setValueAtTime(0.7,t0);
        gi.gain.exponentialRampToValueAtTime(0.0001,t0+0.2);
        oi.connect(gi); gi.connect(ac.destination);
        oi.start(); oi.stop(t0+0.22);
        // ── Bruit d'impact court ──
        noise(0.06,0.5,600);
        // ── Cri "AAH" : 3 formants vocaux superposés ──
        // Formant F1 (poitrine ~700Hz)
        const makeFormant=(fStart,fEnd,vol,dur,q,delay)=>{
          setTimeout(()=>{
            try{
              const ac2=getAC(), t1=ac2.currentTime;
              const ov=ac2.createOscillator(), gv=ac2.createGain();
              const fv=ac2.createBiquadFilter();
              ov.type='sawtooth';
              ov.frequency.setValueAtTime(fStart,t1);
              ov.frequency.linearRampToValueAtTime(fEnd,t1+dur*0.4);
              ov.frequency.linearRampToValueAtTime(fStart*0.7,t1+dur);
              fv.type='bandpass'; fv.frequency.value=fStart*3.2; fv.Q.value=q;
              gv.gain.setValueAtTime(0,t1);
              gv.gain.linearRampToValueAtTime(vol,t1+0.03);
              gv.gain.setValueAtTime(vol*0.8,t1+dur*0.3);
              gv.gain.exponentialRampToValueAtTime(0.0001,t1+dur);
              ov.connect(fv); fv.connect(gv); gv.connect(ac2.destination);
              ov.start(); ov.stop(t1+dur+0.05);
            }catch(e){}
          },delay);
        };
        // Départ du cri légèrement après l'impact
        makeFormant(260, 380, 0.38, 0.55, 4,  60);  // voix principale
        makeFormant(260, 380, 0.22, 0.50, 8,  65);  // harmonique
        makeFormant(200, 310, 0.15, 0.45, 2, 120);  // souffle résiduel
        // ── Vibrato de détresse (tremblements) ──
        setTimeout(()=>{
          try{
            const ac3=getAC(), t2=ac3.currentTime;
            const ot=ac3.createOscillator(), vib=ac3.createOscillator();
            const gvib=ac3.createGain(), gout=ac3.createGain();
            ot.type='sawtooth'; ot.frequency.value=270;
            vib.type='sine'; vib.frequency.value=8; // 8Hz tremolo
            vib.connect(gvib); gvib.gain.value=18;  // ±18Hz wobble
            gvib.connect(ot.frequency);
            const fvib=ac3.createBiquadFilter(); fvib.type='bandpass'; fvib.frequency.value=1100; fvib.Q.value=5;
            gout.gain.setValueAtTime(0.2,t2);
            gout.gain.exponentialRampToValueAtTime(0.0001,t2+0.35);
            ot.connect(fvib); fvib.connect(gout); gout.connect(ac3.destination);
            vib.start(); ot.start(); vib.stop(t2+0.37); ot.stop(t2+0.37);
          }catch(e){}
        },100);
      }catch(e){}
      // Vibration écran forte sur hit joueur
      cam.shake=16;
      cam.shakeDecay=0.82;
    });
  },
  fastZombie(){ throttleSfx('fz',300,()=>{ tone(320,'sawtooth',0.1,0.18,600); }); },
  killShake(isSprinter){
    // Vibration légère sur kill — moins forte que hit joueur
    cam.shake = isSprinter ? 6 : 2.5;
    cam.shakeDecay = 0.75;
  },
  waveUp(){ [300,400,520].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.12,0.2),i*80)); },

  // Soft earth-breaking sound when zombie digs out
  zombieEmerge(){
    throttleSfx('ze',300,()=>{
      try{
        const ac=getAC(), t0=ac.currentTime;
        // Low rumble — earth shifting
        noise(0.35, 0.08, 60+Math.random()*30);
        // Muffled thud — dirt breaking
        setTimeout(()=>noise(0.2, 0.06, 120+Math.random()*40), 80);
        // Faint creak — surface crack
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.frequency.setValueAtTime(35+Math.random()*15, t0);
        o.frequency.exponentialRampToValueAtTime(18, t0+0.3);
        g.gain.setValueAtTime(0.07, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0+0.32);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(t0+0.33);
      }catch(e){}
    });
  },
  chunkLand(){
    throttleSfx('cl',60,()=>{
      // Organic wet thud: low thump + wet splat noise
      try{
        const ac=getAC();
        // Low thump
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(55+Math.random()*25, ac.currentTime);
        o.frequency.exponentialRampToValueAtTime(20, ac.currentTime+0.12);
        g.gain.setValueAtTime(0.175, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.14);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime+0.15);
        // Wet splat: short noise burst low-mid freq
        noise(0.07, 0.09, 180+Math.random()*120);
        // Second organic layer: body-like mid thud
        setTimeout(()=>noise(0.05,0.05,80+Math.random()*60), 20);
      }catch(e){}
    });
  },
  powerupPickup(){ [500,700,900].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.1,0.22),i*55)); },
  bombExplode(){ noise(0.55,0.9,400); tone(60,'sawtooth',0.45,0.7,25); setTimeout(()=>noise(0.3,0.4,200),100); },
  thunderStrike(){
    try{
      const ac=getAC(), t0=ac.currentTime;
      // Electric crack — sharp high freq burst
      const oc=ac.createOscillator(), gc=ac.createGain(), fc=ac.createBiquadFilter();
      oc.type='sawtooth'; oc.frequency.setValueAtTime(1800,t0); oc.frequency.exponentialRampToValueAtTime(120,t0+0.12);
      fc.type='bandpass'; fc.frequency.value=2200; fc.Q.value=0.8;
      gc.gain.setValueAtTime(0.7,t0); gc.gain.exponentialRampToValueAtTime(0.0001,t0+0.14);
      oc.connect(fc); fc.connect(gc); gc.connect(ac.destination);
      oc.start(); oc.stop(t0+0.15);
      // White noise crackle
      noise(0.08,0.9,3000); noise(0.06,0.5,1500);
      // Deep thunder rumble after 80ms
      setTimeout(()=>{
        try{
          const ac2=getAC(), t1=ac2.currentTime;
          const or=ac2.createOscillator(), gr=ac2.createGain(), fr=ac2.createBiquadFilter();
          or.type='sawtooth'; or.frequency.setValueAtTime(55,t1); or.frequency.exponentialRampToValueAtTime(18,t1+0.6);
          fr.type='lowpass'; fr.frequency.value=200;
          gr.gain.setValueAtTime(0.65,t1); gr.gain.exponentialRampToValueAtTime(0.0001,t1+0.65);
          or.connect(fr); fr.connect(gr); gr.connect(ac2.destination);
          or.start(); or.stop(t1+0.7);
          noise(0.5,0.4,80);
        }catch(e){}
      },80);
    }catch(e){}
  },
  shotgunFire(){
    try{
      const ac=getAC(),t0=ac.currentTime;
      // Deep BOOM
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(180,t0); o.frequency.exponentialRampToValueAtTime(30,t0+0.18);
      g.gain.setValueAtTime(0.9,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
      const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800;
      o.connect(f);f.connect(g);g.connect(ac.destination); o.start();o.stop(t0+0.23);
      noise(0.18,0.95,1400); noise(0.12,0.6,400);
    }catch(e){}
  },
  shotgunReload(){
    try{
      const ac=getAC(),t0=ac.currentTime;
      // Pump slide — two metallic clunks
      tone(320,'square',0.06,0.4,420); // slide out
      setTimeout(()=>{ tone(280,'square',0.07,0.5,180); noise(0.05,0.3,900); },140); // click lock
      setTimeout(()=>{ tone(180,'sine',0.05,0.3,90); },220); // chamber close
    }catch(e){}
  },
};

// ══════════════════════════════════════
// PALETTE
// ══════════════════════════════════════
const C = {
  grass1:'#1a5c1a', grass2:'#1d6b1d', line:'rgba(255,255,255,0.45)',
  player:'#e8ff00', playerD:'#b8cc00',
  blood:'#c62828',
};

// ══════════════════════════════════════
// BIOME SYSTEM
// ══════════════════════════════════════
// biome: 0=grass, 1=desert(10k), 2=snow(20k), 3=graveyard(30k)
let biome = 0;
let biomeTransition = 0;  // 0→1 over 180 frames (3s)
let biomePrev = 0;        // previous biome for colour lerp
let snowflakes = [];      // active snowflakes
let biomeObstacles = [];  // trees or graves: {x,y,w,h,type}

// Colour palettes per biome
const BIOMES = [
  { g1:'#1a5c1a', g2:'#1d6b1d', line:'rgba(255,255,255,0.45)', stand:'#111111', filter:null },
  { g1:'#c8a96e', g2:'#b89558', line:'rgba(200,180,140,0.55)', stand:'#1a1206', filter:'rgba(200,160,80,0.13)' },
  { g1:'#c8d8e8', g2:'#b8c8da', line:'rgba(200,220,255,0.6)',  stand:'#0a1220', filter:'rgba(180,210,255,0.12)' },
  { g1:'#3a3a3a', g2:'#2e2e2e', line:'rgba(160,160,180,0.5)', stand:'#080808', filter:'rgba(20,10,30,0.18)'   },
];

function lerpColor(c1, c2, t){
  // Parse hex or rgba strings → lerp → return hex
  const p = s => {
    const m = s.match(/[\da-f]{2}/gi);
    if(m && m.length>=3) return m.slice(0,3).map(x=>parseInt(x,16));
    const r2 = s.match(/[\d.]+/g);
    if(r2) return [+r2[0],+r2[1],+r2[2]];
    return [0,0,0];
  };
  const a=p(c1), b=p(c2);
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g2=Math.round(a[1]+(b[1]-a[1])*t);
  const bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g2},${bl})`;
}

function getCurrentBiomeColors(){
  const t = biomeTransition;
  const A = BIOMES[biomePrev], B = BIOMES[biome];
  return {
    g1:   t>=1 ? B.g1   : lerpColor(A.g1,   B.g1,   t),
    g2:   t>=1 ? B.g2   : lerpColor(A.g2,   B.g2,   t),
    line: t>=1 ? B.line : B.line,  // just swap at end
    stand:t>=1 ? B.stand: lerpColor(A.stand, B.stand, t),
    filter: B.filter,
    filterAlpha: t,
  };
}

function spawnBiomeObstacles(){
  biomeObstacles = [];
  if(biome===0) return;
  const count = biome===1 ? 16 : biome===2 ? 0 : 20; // trees/graves — ×2
  const margin = 80;
  let attempts=0;
  while(biomeObstacles.length<count && attempts<400){
    attempts++;
    const ox = PITCH.x+margin + Math.random()*(PITCH.w-margin*2);
    const oy = PITCH.y+margin + Math.random()*(PITCH.h-margin*2);
    // Not too close to center (keep gameplay area open)
    if(Math.hypot(ox-(PITCH.x+PITCH.w/2), oy-(PITCH.y+PITCH.h/2))<120) continue;
    // Not too close to other obstacles
    if(biomeObstacles.some(o=>Math.hypot(o.x-ox,o.y-oy)<90)) continue;
    // Not too close to player spawn
    if(Math.hypot(ox-player.x, oy-player.y)<100) continue;
    const isGrave = biome===3;
    biomeObstacles.push({
      x:ox, y:oy,
      w: isGrave?18:20, h: isGrave?24:32,
      type: isGrave?'grave':'tree',
      emergeFrame: frameCount + Math.floor(Math.random()*120), // stagger emergence
      emerged: 0, // 0→1
    });
  }
}

function updateBiome(){
  // Check score thresholds
  const newBiome = score>=30000?3 : score>=20000?2 : score>=10000?1 : 0;
  if(newBiome !== biome && biomeTransition>=1){
    biomePrev = biome;
    biome = newBiome;
    biomeTransition = 0;
    // Spawn obstacles for new biome
    spawnBiomeObstacles();
    // Init snowflakes for snow biome
    if(biome===2){
      snowflakes = [];
      for(let i=0;i<40;i++) snowflakes.push({
        x: Math.random()*VW, y: Math.random()*VH,
        spd: 0.4+Math.random()*0.8, sz: 1+Math.random()*2,
        drift: (Math.random()-0.5)*0.3, life:1,
      });
    }
  }
  if(biomeTransition<1) biomeTransition = Math.min(1, biomeTransition+1/180);

  // Emerge obstacles
  for(const o of biomeObstacles){
    if(frameCount>=o.emergeFrame && o.emerged<1) o.emerged=Math.min(1, o.emerged+0.03);
  }

  // Snow update
  if(biome===2 || (biomePrev===2 && biomeTransition<1)){
    for(const s of snowflakes){
      s.y += s.spd; s.x += s.drift;
      if(s.y>VH){ s.y=0; s.x=Math.random()*VW; }
      if(s.x<0) s.x=VW; if(s.x>VW) s.x=0;
    }
  }
}

function checkObstacleCollision(entity, hw, hh){
  // Push entity out of all obstacles. entity must have .x .y
  for(const o of biomeObstacles){
    if(o.emerged<0.5) continue; // not fully emerged yet
    const ow=o.w*0.5, oh=o.h*0.4; // collision half-sizes (tighter than visual)
    const dx=entity.x-o.x, dy=entity.y-o.y;
    const overX=hw+ow-Math.abs(dx), overY=hh+oh-Math.abs(dy);
    if(overX>0 && overY>0){
      // Push out on smallest axis
      if(overX<overY){ entity.x+=dx>0?overX:-overX; }
      else           { entity.y+=dy>0?overY:-overY; }
    }
  }
}

function drawBiomeObstacles(){
  for(const o of biomeObstacles){
    if(o.emerged<=0) continue;
    const ox=Math.round(sx(o.x)), oy=Math.round(sy(o.y));
    const scl=o.emerged;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(scl, scl);
    if(o.type==='tree') drawDeadTree();
    else drawGrave();
    ctx.restore();
  }
}

function drawDeadTree(){
  // Dead tree: dark brown trunk + bare branches
  // Trunk
  ctx.fillStyle='#3b2208';
  ctx.fillRect(-5,-30,10,38);
  // Bark texture lines
  ctx.fillStyle='#2a1804';
  ctx.fillRect(-3,-28,2,32); ctx.fillRect(2,-24,2,28);
  // Main branches
  ctx.strokeStyle='#3b2208'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(-22,-38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(20,-34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-14,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(14,-20); ctx.stroke();
  // Twigs
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-22,-38); ctx.lineTo(-28,-44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-22,-38); ctx.lineTo(-16,-46); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-34);  ctx.lineTo(26,-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-34);  ctx.lineTo(14,-42); ctx.stroke();
  // Root shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0,8,12,4,0,0,Math.PI*2); ctx.fill();
}

function drawGrave(){
  // Stone grave cross
  // Base stone
  ctx.fillStyle='#555566';
  ctx.fillRect(-10,0,20,16);
  // Stone shading
  ctx.fillStyle='#44445a';
  ctx.fillRect(-10,0,3,16); ctx.fillRect(-10,0,20,3);
  ctx.fillStyle='#666677';
  ctx.fillRect(7,2,3,14);
  // Cross vertical
  ctx.fillStyle='#6a6a7a';
  ctx.fillRect(-4,-28,8,32);
  // Cross horizontal
  ctx.fillRect(-14,-20,28,8);
  // Stone texture/moss
  ctx.fillStyle='rgba(80,120,60,0.35)';
  ctx.fillRect(-8,4,5,8); ctx.fillRect(3,8,4,6);
  // Crack
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-2,-10); ctx.lineTo(1,-2); ctx.lineTo(-1,6); ctx.stroke();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0,18,14,5,0,0,Math.PI*2); ctx.fill();
}

function drawBiomeFilter(){
  const bc = getCurrentBiomeColors();
  if(!bc.filter || bc.filterAlpha<=0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, bc.filterAlpha) * 0.85;
  ctx.fillStyle = bc.filter;
  ctx.fillRect(0,0,VW,VH);
  ctx.restore();
}

function drawSnowflakes(){
  if(biome!==2) return;
  const alpha = Math.min(1, biomeTransition);
  ctx.save();
  ctx.globalAlpha = alpha * 0.75;
  ctx.fillStyle = '#ddeeff';
  for(const s of snowflakes){
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function zombieTypeForWave(){
  const r = Math.random();
  if(wave >= 2 && r < 0.18) return 3; // fast (single fast type)
  if(wave >= 4 && r < 0.10) return 2; // tank
  if(wave >= 2 && r < 0.26) return 1; // big
  return 0; // normal
}

// Track how many dig-spawn zombies are currently emerging on screen
function countEmerging(){ return zombies.filter(z=>!z.dead&&z.emerging>0).length; }

function spawnZombie(immediate){
  const margin = 35;
  let wx2, wy2;
  let isDigSpawn = false;

  if(immediate){
    // Edge spawn (off-screen)
    const side = Math.floor(Math.random()*4);
    const offMin = (VW/ZOOM)*0.55, offMax = (VW/ZOOM)*1.5;
    const offX = offMin + Math.random()*(offMax-offMin);
    const offY = (VH/ZOOM)*0.55 + Math.random()*((VH/ZOOM)*0.8);
    if(side===0)      { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y-offY; }
    else if(side===1) { wx2=player.x+offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
    else if(side===2) { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y+offY; }
    else              { wx2=player.x-offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
  } else {
    // Dig spawn: random pitch position, not too close to player
    // Max 4-5 dig zombies on screen at once
    if(countEmerging() >= 4){
      // Fallback to edge spawn if too many already digging
      const side = Math.floor(Math.random()*4);
      const offMin = (VW/ZOOM)*0.6, offMax = (VW/ZOOM)*1.5;
      const offX = offMin + Math.random()*(offMax-offMin);
      const offY = (VH/ZOOM)*0.6 + Math.random()*((VH/ZOOM)*0.8);
      if(side===0)      { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y-offY; }
      else if(side===1) { wx2=player.x+offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
      else if(side===2) { wx2=player.x+(Math.random()-0.5)*PITCH.w*0.9; wy2=player.y+offY; }
      else              { wx2=player.x-offX; wy2=player.y+(Math.random()-0.5)*PITCH.h*0.9; }
    } else {
      // Dig out of ground on pitch — can spawn near player for drama
      const minDist = 80, maxDist = (VW/ZOOM)*0.85;
      let attempts=0;
      do {
        const angle = Math.random()*Math.PI*2;
        const dist = minDist + Math.random()*(maxDist-minDist);
        wx2 = player.x + Math.cos(angle)*dist;
        wy2 = player.y + Math.sin(angle)*dist;
        attempts++;
      } while(attempts<15 && (wx2<PITCH.x+margin||wx2>PITCH.x+PITCH.w-margin||wy2<PITCH.y+margin||wy2>PITCH.y+PITCH.h-margin));
      isDigSpawn = true;
    }
  }

  wx2 = Math.max(PITCH.x+margin, Math.min(PITCH.x+PITCH.w-margin, wx2));
  wy2 = Math.max(PITCH.y+margin, Math.min(PITCH.y+PITCH.h-margin, wy2));

  const ti = zombieTypeForWave();
  const tmpl = ZTYPES[ti];
  const spdActual = tmpl.spd + (Math.random()-0.5)*tmpl.spdVar*2;
  // Pick random skin/clothing variants
  const zSkin   = tmpl.skins[Math.floor(Math.random()*tmpl.skins.length)];
  const zShirt  = tmpl.shirts[Math.floor(Math.random()*tmpl.shirts.length)];
  const zPants  = tmpl.pants[Math.floor(Math.random()*tmpl.pants.length)];
  // Direction: face toward player initially
  const initDir = (player.x > wx2) ? 1 : -1;

  zombies.push({
    ...tmpl,
    x:wx2, y:wy2,
    hp:tmpl.maxHp,
    spd: Math.max(0.1, spdActual),
    // Speed variant: 30% of zombies are "slow" (0.55–0.75×), rest are normal-to-fast (0.85–1.15×)
    speedVariant: Math.random()<0.30 ? 0.55+Math.random()*0.20 : 0.85+Math.random()*0.30,
    vx:0, vy:0,
    knockX:0, knockY:0,
    dead:false, deadAnim:0,
    animFrame:0, hitFlash:0,
    nextGrowl: frameCount + Math.floor(Math.random()*300+80),
    blinkPhase: Math.random()*Math.PI*2,
    skin: zSkin, shirt: zShirt, pants: zPants,
    dir: initDir,
    emerging: isDigSpawn ? 180 : 0, // 180 frames (3s) slow dig-out animation
    emergeY: wy2,                   // ground level
  });
  // Spawn dirt particles at dig location
  if(isDigSpawn){ spawnDirt(wx2, wy2); SFX.zombieEmerge(); }
}

let joystickActive=false, joystickBase={x:0,y:0}, joystickDelta={x:0,y:0};

canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); getAC();
  const t=e.touches[0], r=canvas.getBoundingClientRect();
  const scX=VW/r.width, scY=VH/r.height;
  const tx=(t.clientX-r.left)*scX, ty=(t.clientY-r.top)*scY;
  // Pause button zone: bottom-right 48×48
  if(!gameOver && tx>VW-48 && ty>VH-48){ isPaused=!isPaused; return; }
  // Invincible mode checkbox (only when paused)
  if(isPaused){ updateInvincCbY(); if(tx>=INVINC_CB.x && tx<=INVINC_CB.x+INVINC_CB.w && ty>=INVINC_CB.y && ty<=INVINC_CB.y+INVINC_CB.h){ invincibleMode=!invincibleMode; return; } }
  // Mega Power button zone (low hp emergency)
  if(!gameOver && !megaDash.active && megaDash.lowHpBtn &&
     tx>=MEGA_BTN.x && tx<=MEGA_BTN.x+MEGA_BTN.w &&
     ty>=MEGA_BTN.y && ty<=MEGA_BTN.y+MEGA_BTN.h){
    startMegaDash(); return;
  }
  joystickBase={x:tx,y:ty}; joystickDelta={x:0,y:0}; joystickActive=true;
},{passive:false});

canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  const scX=VW/r.width, scY=VH/r.height;
  const tx=(e.clientX-r.left)*scX, ty=(e.clientY-r.top)*scY;
  if(!gameOver && tx>VW-48 && ty>VH-48){ isPaused=!isPaused; return; }
  if(isPaused){ updateInvincCbY(); if(tx>=INVINC_CB.x && tx<=INVINC_CB.x+INVINC_CB.w && ty>=INVINC_CB.y && ty<=INVINC_CB.y+INVINC_CB.h){ invincibleMode=!invincibleMode; return; } }
});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!joystickActive)return;
  const t=e.touches[0], r=canvas.getBoundingClientRect();
  const scX=VW/r.width, scY=VH/r.height;
  const dx=(t.clientX-r.left)*scX-joystickBase.x;
  const dy=(t.clientY-r.top)*scY-joystickBase.y;
  const d=Math.sqrt(dx*dx+dy*dy), maxR=55;
  joystickDelta.x = d>maxR?(dx/d)*maxR:dx;
  joystickDelta.y = d>maxR?(dy/d)*maxR:dy;
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault(); joystickActive=false; joystickDelta={x:0,y:0};
},{passive:false});

const keys={};
addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='Escape'||e.key==='p')&&!gameOver) isPaused=!isPaused;
  if(e.key==='m'&&!gameOver&&!megaDash.active) startMegaDash();
});
addEventListener('keyup',  e=>keys[e.key]=false);

// HELPERS
// ══════════════════════════════════════
function nearestVisible(){
  // Zombie must be at least 20% inside the visible screen to be targetable
  const marginX = VW * 0.20;
  const marginY = VH * 0.20;
  let best=null, bestD=Infinity;
  for(const z of zombies){
    if(z.dead) continue;
    if(z.emerging>0) continue;
    if(z.onFire) continue; // already burning — treated as dead, don't target
    const scx=sx(z.x), scy=sy(z.y);
    if(scx < marginX || scx > VW-marginX || scy < marginY || scy > VH-marginY) continue;
    const dx=z.x-player.x, dy=z.y-player.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestD){bestD=d;best=z;}
  }
  return best;
}

function spawnDirt(wx2, wy2){
  // Dirt hole puddle (stays for 3s like blood)
  for(let i=0;i<5;i++){
    particles.push({x:wx2+(Math.random()-0.5)*8, y:wy2+(Math.random()-0.5)*6,
      vx:0, vy:0, life:360, maxLife:360,
      color: i%2===0 ? '#5d4037' : '#4e342e',
      sz:4+Math.random()*5, type:'puddle', gravity:0});
  }
  // Flying dirt clumps
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*3;
    particles.push({x:wx2, y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2,
      life:360, maxLife:360,
      color: Math.random()<0.6?'#6d4c41':'#795548',
      sz:2+Math.random()*3, type:'dirt', gravity:0.15,
      bounceCount:0, landed:false, groundY:wy2+5+Math.random()*8,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.2});
  }
}

function blood(wx2,wy2,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*4;
    particles.push({x:wx2,y:wy2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:28+Math.random()*22,maxLife:50,color:C.blood,sz:2+Math.random()*3,type:'blood'});

}

// Gore explosion: zombie bursts in the direction of the hit
// dirX/dirY = direction the zombie was knocked (ball impact direction)
function goreExplosion(wx2,wy2,dirX,dirY,zColor){
  // 1. Directional blood splatter — speed halved
  for(let i=0;i<35;i++){
    const spread=(Math.random()-0.5)*2.1;
    const baseAngle=Math.atan2(dirY,dirX);
    const a=baseAngle+spread;
    const spd=(3+Math.random()*9)*0.5; // ×0.5
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:40+Math.random()*30,maxLife:70,
      color:Math.random()<0.7?C.blood:'#8b0000',
      sz:2+Math.random()*4, type:'blood', gravity:0.08});
  }

  // 2. Body chunks — speed halved
  const chunkColors=[zColor||'#9e9e9e','#888',C.blood,'#555','#c62828'];
  for(let i=0;i<18;i++){
    const spread=(Math.random()-0.5)*2.5;
    const baseAngle=Math.atan2(dirY,dirX);
    const a=baseAngle+spread;
    const spd=(4+Math.random()*10)*0.5; // ×0.5
    const col=chunkColors[Math.floor(Math.random()*chunkColors.length)];
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1, // -1 instead of -2
      life:660, maxLife:660,
      color:col, sz:3+Math.random()*5,
      type:'chunk', gravity:0.18,
      bounceCount:0, landed:false,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.4,
      groundY: wy2+10+Math.random()*20});
  }

  // 3. Blood puddles — speed halved
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2;
    const spd=(0.8+Math.random()*2.5)*0.5; // ×0.5
    particles.push({x:wx2,y:wy2,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:660, maxLife:660,
      color:'#7b0000', sz:4+Math.random()*7,
      type:'puddle', gravity:0});
  }
}

function stars(wx2,wy2,color){
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    particles.push({x:wx2,y:wy2,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,
      life:28,maxLife:28,color:color||'#ffeb3b',sz:3.5,type:'star'});
  }
}
function scorePopup(wx2,wy2,pts){

    color:'#e8ff00',sz:0,text:'+'+pts});

// Sound: ascending power chime + deep impact boom
function sfxOneUpEarn(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    [0,0.09,0.18,0.27].forEach((dt,i)=>{
      const freqs=[400,530,660,880];
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='square'; o.frequency.value=freqs[i];
      g.gain.setValueAtTime(0.28,t0+dt); g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.18);
      o.connect(g); g.connect(ac.destination); o.start(t0+dt); o.stop(t0+dt+0.2);
    });
  }catch(e){}
}
function sfxOneUpActivate(){
  try{
    const ac=getAC(), t0=ac.currentTime;
    // Deep boom
    const ob=ac.createOscillator(), gb=ac.createGain();
    ob.type='sine'; ob.frequency.setValueAtTime(55,t0); ob.frequency.exponentialRampToValueAtTime(20,t0+0.5);
    gb.gain.setValueAtTime(1.0,t0); gb.gain.exponentialRampToValueAtTime(0.0001,t0+0.55);
    ob.connect(gb); gb.connect(ac.destination); ob.start(); ob.stop(t0+0.6);
    noise(0.35, 0.9, 200);
    // Electric crackle
    setTimeout(()=>{ noise(0.18,0.7,3500); noise(0.12,0.5,1800); },100);
    // Rising power tone
    setTimeout(()=>{
      const or=ac.createOscillator(), gr=ac.createGain();
      or.type='sawtooth'; or.frequency.setValueAtTime(80,ac.currentTime); or.frequency.exponentialRampToValueAtTime(900,ac.currentTime+0.6);
      gr.gain.setValueAtTime(0.0,ac.currentTime); gr.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.1);
      gr.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.65);
      const flt=ac.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=600; flt.Q.value=0.8;
      or.connect(flt); flt.connect(gr); gr.connect(ac.destination); or.start(); or.stop(ac.currentTime+0.7);
    },120);
  }catch(e){}
}

// Trigger the 1UP activation sequence when HP hits 0 and oneUpCount > 0
function triggerOneUp(){
  oneUpCount--;
  oneUpFX.phase=1; // start blackout
  oneUpFX.timer=65;
  sfxOneUpActivate();
}

// Called each frame during One Up FX — returns true while active
function updateOneUpFX(){
  if(oneUpFX.phase===0) return false;
  oneUpFX.timer--;

  if(oneUpFX.phase===1){
    // Blackout: ~65 frames
    if(oneUpFX.timer<=0){ oneUpFX.phase=2; oneUpFX.timer=45; }
  } else if(oneUpFX.phase===2){
    // White flash + vibrate: 45 frames
    cam.shake=18;
    if(oneUpFX.timer<=0){
      // Launch shockwave, restore HP
      oneUpFX.phase=3; oneUpFX.timer=70; oneUpFX.shockR=0;
      player.hp=player.maxHp*0.5;
      // Kill all zombies on screen
      for(const z of zombies){
        if(z.dead) continue;
        z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        const a=Math.random()*Math.PI*2;
        z.knockX=Math.cos(a)*14; z.knockY=Math.sin(a)*14; z.flyingCorpse=true;
        goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.skin||'#9e9e9e');
        scorePopup(z.x,z.y,z.pts);
      }
      // Reset zombie speed
      zombieSpeedMult=1;
    }
  } else if(oneUpFX.phase===3){
    // Shockwave expanding: 70 frames
    oneUpFX.shockR = (1-(oneUpFX.timer/70)) * 800;
    if(oneUpFX.timer<=0){ oneUpFX.phase=0; oneUpFX.timer=0; }
  }
  return true;
}

function drawOneUpFX(){
  if(oneUpFX.phase===0) return;
  const plsx=Math.round(sx(player.x)), plsy=Math.round(sy(player.y));

  if(oneUpFX.phase===1){
    // Black overlay, player visible
    ctx.fillStyle='rgba(0,0,0,0.94)';
    ctx.fillRect(0,0,VW,VH);
    // Keep player bright — redraw player area as a circle of light
    ctx.save();
    const grad=ctx.createRadialGradient(plsx,plsy,0,plsx,plsy,55);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(1,'rgba(0,0,0,0.94)');
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(plsx,plsy,55,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,1)'; ctx.fill();
    ctx.restore();
    // Redraw player on top (bright)
    drawPlayer();
  } else if(oneUpFX.phase===2){
    // White flash — intensity peaks then fades
    const t=oneUpFX.timer/45;
    const alpha=0.95-t*0.3;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.fillRect(0,0,VW,VH);
    // Player stays visible in centre
    drawPlayer();
  } else if(oneUpFX.phase===3){
    // Yellow shockwave ring from player
    const r=oneUpFX.shockR*ZOOM*0.12; // screen radius
    const alpha=Math.max(0, oneUpFX.timer/70);
    ctx.save();
    ctx.strokeStyle=`rgba(255,230,0,${alpha})`;
    ctx.lineWidth=Math.max(2, 18*(oneUpFX.timer/70));
    ctx.shadowColor='#e8ff00';
    ctx.shadowBlur=28*(oneUpFX.timer/70);
    ctx.beginPath(); ctx.arc(plsx,plsy,r,0,Math.PI*2); ctx.stroke();
    // Inner glow ring
    ctx.strokeStyle=`rgba(255,255,255,${alpha*0.6})`;
    ctx.lineWidth=6*(oneUpFX.timer/70);
    ctx.beginPath(); ctx.arc(plsx,plsy,r*0.7,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function spawnPowerup(){
  // Spawn within visible screen area near the player
  const margin = 30;
  const halfW = (VW/2 - margin) / ZOOM;
  const halfH = (VH/2 - margin) / ZOOM;
  const MIN_DIST = 70; // minimum world-unit distance between two powerups

  let wx, wy, attempts=0;
  let tooClose;
  do {
    const rx = (0.3 + Math.random()*0.6) * (Math.random()<0.5?1:-1);
    const ry = (0.3 + Math.random()*0.6) * (Math.random()<0.5?1:-1);
    wx = player.x + rx * halfW;
    wy = player.y + ry * halfH;
    wx = Math.max(PITCH.x+20, Math.min(PITCH.x+PITCH.w-20, wx));
    wy = Math.max(PITCH.y+20, Math.min(PITCH.y+PITCH.h-20, wy));
    // Check distance from existing powerups
    tooClose = powerups.some(p => Math.hypot(p.x-wx, p.y-wy) < MIN_DIST);
    attempts++;
  } while(tooClose && attempts < 40);

  const def = PUDEF[Math.floor(Math.random()*PUDEF.length)];
  powerups.push({ x:wx, y:wy, def, life:480, maxLife:480 });
}

function makeBallObj(offsetX, offsetY){
  return {
    x:player.x+offsetX, y:player.y+offsetY,
    vx:0, vy:0, active:false, returning:false, r:7, spin:0,
    footSpin:0, bounce:0, z:0, zv:0, shootCooldown:40,
    offsetX, offsetY, // foot-position offset from player center
  };
}

// Extra ball foot positions in order: left, above, below
const EXTRA_BALL_OFFSETS = [
  { x:-8,  y:0  },   // ball 2: left side
  { x:0,   y:-12 },  // ball 3: above
  { x:0,   y:12  },  // ball 4: below
];

function activatePowerup(def){
  SFX.powerupPickup();
  switch(def.id){
    case 'fireball':
      fx.fireBall.active=true; fx.fireBall.timer=fx.fireBall.max; break;
    case 'bomb':
      triggerBomb(); break;
    case 'ricochet':
      ricochetCount = Math.min(5, ricochetCount+1);
      ricochetTimer = 1800; // 30s at 60fps (refresh/stack duration)
      break;
    case 'health':
      player.hp=player.maxHp; break;
    case 'thunder':
      fx.thunder.active=true; fx.thunder.timer=fx.thunder.max; fx.thunder.nextStrike=frameCount+30; break;
    case 'slowmo':
      fx.slowMo.active=true; fx.slowMo.timer=fx.slowMo.max; break;
    case 'doubleball':
      if(extraBalls.length < 3){
        const off = EXTRA_BALL_OFFSETS[extraBalls.length];
        extraBalls.push(makeBallObj(off.x, off.y));
      }
      break;
    case 'shotgun':
      fx.shotgun.active=true; fx.shotgun.timer=fx.shotgun.max;
      fx.shotgun.reloading=0; fx.shotgun.muzzleFlash=0;
      fireShotgun();
      break;
    case 'resetspeed':
      // Reset zombie speed to default (phase 1)
      zombieSpeedMult=1;
      // Visual flash
      for(let i=0;i<30;i++){
        const a=Math.random()*Math.PI*2;
        particles.push({x:player.x,y:player.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,
          life:30,maxLife:30,color:'#00e5ff',sz:4+Math.random()*4,type:'star'});
      }
      break;
    case 'megadash':
      startMegaDash();
      break;
    case 'x6balls':
      activateX6Balls();
      break;
    case 'samurai':
      activateSamurai();
      break;
  }
  cam.shake=4; cam.shakeDecay=0.7;
}

// ── BOMB: kill all visible zombies ──
function triggerBomb(){
  SFX.bombExplode(); screenBlast(18);
  let killed=0;
  for(const z of zombies){
    if(z.dead) continue;
    const scx=sx(z.x), scy=sy(z.y);
    if(scx>-30 && scx<VW+30 && scy>-30 && scy<VH+30){
      z.dead=true; z.deadAnim=38;
      score+=z.pts; totalKills++;
      if(killsByType[z.id]!==undefined) killsByType[z.id]++;
      const a=Math.random()*Math.PI*2;
      z.knockX=Math.cos(a)*6; z.knockY=Math.sin(a)*6;
      z.flyingCorpse=true;
      goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.body);
      scorePopup(z.x,z.y,z.pts);
      killed++;
    }
  }
  // Big concentric shockwave particles
  for(let i=0;i<60;i++){
    const a2=Math.random()*Math.PI*2, spd=4+Math.random()*8;
    particles.push({x:player.x,y:player.y,vx:Math.cos(a2)*spd,vy:Math.sin(a2)*spd,
      life:35,maxLife:35,color:i%3===0?'#ff9800':'#ffeb3b',sz:4+Math.random()*5,type:'star'});
  }
}

function activateX6Balls(){
  // Replace any existing orbit balls, reset 20s timer
  orbitBalls = [];
  orbitBallsTimer = 1200; // 20s at 60fps
  for(let i=0;i<6;i++){
    const angle = (i/6)*Math.PI*2;
    orbitBalls.push({
      angle,           // current angle in orbit
      r: ORBIT_R,     // orbit radius
      ballR: 7,       // ball visual radius
      active: false,  // false = orbiting, true = flying to target
      returning: false,
      x: player.x + Math.cos(angle)*ORBIT_R,
      y: player.y + Math.sin(angle)*ORBIT_R,
      vx: 0, vy: 0,
      spin: angle,
      shootCooldown: i*10, // stagger initial shots
      ricochetsLeft: 0,
      hitZombies: [],
      z: 0, zv: 0,
    });
  }
  // Burst particles
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    particles.push({x:player.x+Math.cos(a)*ORBIT_R, y:player.y+Math.sin(a)*ORBIT_R,
      vx:Math.cos(a)*3, vy:Math.sin(a)*3,
      life:24, maxLife:24, color:'#e8ff00', sz:5+Math.random()*4, type:'star'});
  }
}

function makeOrbitBallFireSeg(ob){
  const seg={x:ob.x,y:ob.y,life:120,maxLife:120,dead:false,pixels:[]};
  const nPx=4+Math.floor(Math.random()*4);
  for(let i=0;i<nPx;i++) seg.pixels.push({type:'block',ox:(Math.random()-0.5)*10,oy:-(Math.random()*14),sz:5+Math.floor(Math.random()*7),col:Math.random()<0.5?'#ff6d00':Math.random()<0.6?'#ff9800':'#ffeb3b',birthLife:120});
  const nSp=3+Math.floor(Math.random()*2);
  for(let i=0;i<nSp;i++) seg.pixels.push({type:'spark',ox:(Math.random()-0.5)*14,oy:-(8+Math.random()*16),vox:(Math.random()-0.5)*0.25,voy:-(0.3+Math.random()*0.4),sz:2+Math.floor(Math.random()*3),col:Math.random()<0.6?'#ffeb3b':'#fff9c4',birthLife:120});
  fireTrails.push(seg);
}

function updateOrbitBalls(){
  if(orbitBalls.length===0) return;
  const ORBIT_SPD = 0.045; // radians per frame — smooth rotation
  const BALL_SPD  = 4.5;

  for(let bi=0;bi<orbitBalls.length;bi++){
    const ob=orbitBalls[bi];
    ob.spin+=0.22;

    if(!ob.active){
      // ── ORBITING: rotate around player ──
      ob.angle += ORBIT_SPD;
      ob.x = player.x + Math.cos(ob.angle)*ob.r;
      ob.y = player.y + Math.sin(ob.angle)*ob.r;
      ob.shootCooldown--;

      if(ob.shootCooldown<=0 && player.stunned<=0){
        const t=nearestVisible();
        if(t){
          const dx=t.x-ob.x, dy=t.y-ob.y, d=Math.sqrt(dx*dx+dy*dy)||1;
          ob.vx=(dx/d)*BALL_SPD; ob.vy=(dy/d)*BALL_SPD;
          ob.active=true; ob.returning=false;
          ob.z=0; ob.zv=3.5;
          ob.ricochetsLeft=ricochetCount; // ricochet applies!
          ob.hitZombies=[];
          SFX.kick();
        }
      }

    } else {
      // ── FLYING ──
      ob.x+=ob.vx; ob.y+=ob.vy;
      if(ob.z>0||ob.zv>0){ ob.z+=ob.zv; ob.zv-=0.22; if(ob.z<0){ob.z=0;ob.zv=0;} }

      // Fire trail
      if(fx.fireBall.active && !ob.returning && frameCount%2===0) makeOrbitBallFireSeg(ob);

      if(!ob.returning){
        let didBounce=false;
        for(const z of zombies){
          if(z.dead||z.emerging>0) continue;
          if(ob.hitZombies&&ob.hitZombies.includes(z)) continue;
          const dx=ob.x-z.x, dy=ob.y-z.y, d=Math.sqrt(dx*dx+dy*dy);
          if(d<z.w/2+ob.ballR){
            if(ob.hitZombies) ob.hitZombies.push(z);
            if(fx.fireBall.active){
              igniteZombie(z); SFX.hit();
            } else {
              z.hp--; z.hitFlash=10; blood(z.x,z.y,12);
              const nd=d||1; z.knockX=(dx/nd)*5; z.knockY=(dy/nd)*5;
              SFX.hit();
              if(z.hp<=0){
                z.dead=true; z.deadAnim=38; score+=z.pts; totalKills++;
                if(killsByType[z.id]!==undefined) killsByType[z.id]++;
                const bdx=ob.vx/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                const bdy=ob.vy/(Math.sqrt(ob.vx*ob.vx+ob.vy*ob.vy)||1);
                z.knockX=bdx*7; z.knockY=bdy*7; z.flyingCorpse=true;
                goreExplosion(z.x,z.y,bdx,bdy,z.body);
                scorePopup(z.x,z.y,z.pts); SFX.explode();
              }
            }
            // Ricochet — affects all orbit balls if ricochetCount>0
            if(ob.ricochetsLeft>0){
              const next=zombies.filter(z2=>!z2.dead&&!z2.onFire&&z2.emerging===0&&!(ob.hitZombies&&ob.hitZombies.includes(z2)))
                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];
              if(next){
                ob.ricochetsLeft--;
                const nx=next.x-ob.x,ny=next.y-ob.y,nd2=Math.sqrt(nx*nx+ny*ny)||1;
                ob.vx=(nx/nd2)*BALL_SPD; ob.vy=(ny/nd2)*BALL_SPD; ob.z=0; ob.zv=2;
                didBounce=true; break;
              }
            }
            if(!didBounce){
              ob.returning=true;
              const ang=Math.atan2(player.y-ob.y,player.x-ob.x);
              ob.vx=Math.cos(ang)*BALL_SPD; ob.vy=Math.sin(ang)*BALL_SPD;
              ob.z=0; ob.zv=2;
            }
            break;
          }
        }
        // Out of pitch → return
        if(!didBounce&&!ob.returning&&(ob.x<PITCH.x||ob.x>PITCH.x+PITCH.w||ob.y<PITCH.y||ob.y>PITCH.y+PITCH.h)){
          ob.returning=true;
          const ang=Math.atan2(player.y-ob.y,player.x-ob.x);
          ob.vx=Math.cos(ang)*BALL_SPD; ob.vy=Math.sin(ang)*BALL_SPD;
        }
      } else {
        // ── RETURNING: come back to orbit position ──
        const targetX=player.x+Math.cos(ob.angle)*ob.r;
        const targetY=player.y+Math.sin(ob.angle)*ob.r;
        const dx=targetX-ob.x, dy=targetY-ob.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<18){
          ob.active=false; ob.returning=false;
          ob.x=targetX; ob.y=targetY;
          ob.shootCooldown=55 + bi*8; // stagger cooldowns
        } else {
          ob.vx=(dx/d)*BALL_SPD*1.1; ob.vy=(dy/d)*BALL_SPD*1.1;
        }
      }
    }
  }
}

function drawOrbitBalls(){
  if(orbitBalls.length===0) return;
  // Draw orbit trail ring when balls are home
  const allHome = orbitBalls.every(ob=>!ob.active);
  if(allHome){

}

function updateSamurai(){
  if(!samurai.active) return;
  samurai.timer--;
  if(samurai.timer<=0){ samurai.active=false; samurai.ghosts=[]; return; }

  // ── Constant wild sword swinging — reverses every ~22 frames ──
  samurai.swingAngle += samurai.swingDir * samurai.swingSpeed;
  // Reverse at extremes: swing covers a wide arc (−2.2 to +2.2 rad from base)
  if(samurai.swingAngle > 2.2){ samurai.swingDir=-1; sfxSamuraiSlash(); }
  if(samurai.swingAngle < -2.2){ samurai.swingDir=1; sfxSamuraiSlash(); }

  // ── Sword hit radius — tip of blade ──
  const BLADE_LEN = 32; // world units
  const BASE_ANG = player.dir > 0 ? 0 : Math.PI; // faces player direction
  const swordAng = BASE_ANG + samurai.swingAngle;
  const tipX = player.x + Math.cos(swordAng) * BLADE_LEN;
  const tipY = player.y + Math.sin(swordAng) * BLADE_LEN;

  if(samurai.hitCooldown>0) samurai.hitCooldown--;

  // Kill zombies touched by sword tip/arc — sweep the full blade
  for(const z of zombies){
    if(z.dead) continue;
    // Check along blade (3 test points)
    let hit=false;
    for(let t=0.4;t<=1.0;t+=0.3){
      const bx=player.x+Math.cos(swordAng)*BLADE_LEN*t;
      const by=player.y+Math.sin(swordAng)*BLADE_LEN*t;
      if(Math.hypot(bx-z.x, by-z.y) < z.w/2+10){ hit=true; break; }
    }
    if(hit && samurai.hitCooldown===0){
      z.hp=0; z.dead=true; z.deadAnim=38;
      score+=z.pts; totalKills++;
      if(killsByType[z.id]!==undefined) killsByType[z.id]++;
      const ka=Math.atan2(z.y-player.y, z.x-player.x);
      z.knockX=Math.cos(ka)*9; z.knockY=Math.sin(ka)*9; z.flyingCorpse=true;
      goreExplosion(z.x,z.y,Math.cos(ka),Math.sin(ka),z.skin||'#9e9e9e');
      scorePopup(z.x,z.y,z.pts);
      sfxSamuraiKill(); screenBlast(4);
      samurai.hitCooldown=6; // brief cooldown to avoid multi-hit same frame
      // Slash particles along blade
      for(let i=0;i<8;i++){
        const sp=0.3+i/8*0.7;
        const a2=swordAng+(-Math.PI/2+Math.random()*Math.PI)*0.4;
        particles.push({
          x:player.x+Math.cos(swordAng)*BLADE_LEN*sp,
          y:player.y+Math.sin(swordAng)*BLADE_LEN*sp,
          vx:Math.cos(a2)*3, vy:Math.sin(a2)*3,
          life:14,maxLife:14,
          color:Math.random()<0.5?'#c62828':Math.random()<0.5?'#ffffff':'#c0c0c0',
          sz:2+Math.random()*3, type:'star'});
      }
    }
  }

  // ── Player moves 40% faster with samurai ──
  // (handled in the player move block via samurai.active flag)

  // ── Ninja ghost trail — leave dark ghost every 5 frames when moving ──
  samurai.ghostTimer++;
  const isMoving = Math.abs(player.knockX)>0.5 || Math.abs(player.knockY)>0.5 ||
    joystickActive || keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||
    keys['a']||keys['d']||keys['w']||keys['s'];
  if(isMoving && samurai.ghostTimer>=2){  // every 2 frames = denser trail
    samurai.ghostTimer=0;
    samurai.ghosts.push({
      x:player.x, y:player.y,
      dir:player.dir,
      alpha:0.72,
      life:36, maxLife:36,  // 2× longer trail
    });
  }
  samurai.ghosts=samurai.ghosts.filter(g=>{ g.life--; g.alpha=0.72*(g.life/g.maxLife); return g.life>0; });
}

function _randomDir(){
  const a = Math.random()*Math.PI*2;
  return { dx: Math.cos(a), dy: Math.sin(a) };
}

function startMegaDash(){
  if(megaDash.active) return;
  megaDash.active=true;
  megaDash.timer=megaDash.max;
  megaDash.lasers=[];
  megaDash.lowHpBtn=false;
  megaDash.lowHpUsed=true;
  // Use joystick/keyboard if active, otherwise random direction
  let dx, dy;
  const jx=joystickDelta.x, jy=joystickDelta.y;
  const jlen=Math.sqrt(jx*jx+jy*jy);
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a']) kx=-1;
  if(keys['ArrowRight']||keys['d']) kx=1;
  if(keys['ArrowUp']||keys['w'])  ky=-1;
  if(keys['ArrowDown']||keys['s']) ky=1;
  if(kx!==0||ky!==0){ const kl=Math.sqrt(kx*kx+ky*ky); dx=kx/kl; dy=ky/kl; }
  else if(jlen>=5){ dx=jx/jlen; dy=jy/jlen; }
  else { const r=_randomDir(); dx=r.dx; dy=r.dy; } // random if no input
  megaDash.vx=dx; megaDash.vy=dy;
  megaDash.pendingVx=dx; megaDash.pendingVy=dy;
  // Start immediately in hop phase
  megaDash.phase='hop';
  megaDash.phaseTimer=megaDash.HOP_DUR;
  megaDash.hopStartX=player.x; megaDash.hopStartY=player.y;
  sfxMegaDashStart();
  screenBlast(14);
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2;
    particles.push({x:player.x,y:player.y,
      vx:Math.cos(a)*(5+Math.random()*5), vy:Math.sin(a)*(5+Math.random()*5),
      life:30,maxLife:30,color:i%3===0?'#00eeff':i%3===1?'#ffffff':'#0066ff',
      sz:3+Math.random()*5,type:'star'});
  }
}

function _readInputDir(){
  // Read joystick / keyboard for direction (normalized), return {dx,dy} or null if no input
  let dx=joystickDelta.x, dy=joystickDelta.y;
  let kx=0, ky=0;
  if(keys['ArrowLeft']||keys['a']) kx=-1;
  if(keys['ArrowRight']||keys['d']) kx=1;
  if(keys['ArrowUp']||keys['w'])  ky=-1;
  if(keys['ArrowDown']||keys['s']) ky=1;
  if(kx!==0||ky!==0){ dx=kx; dy=ky; }
  const l=Math.sqrt(dx*dx+dy*dy);
  if(l<5) return null;
  return {dx:dx/l, dy:dy/l};
}

function updateMegaDash(){
  if(!megaDash.active) return;

  // Age laser trails
  megaDash.lasers=megaDash.lasers.filter(l=>{ l.life--; return l.life>0; });

  megaDash.timer--;
  if(megaDash.timer<=0){
    megaDash.active=false;
    sfxMegaDashEnd();
    screenBlast(6);
    return;
  }

  megaDash.phaseTimer--;

  if(megaDash.phase==='pause'){
    // ── PAUSE PHASE: read input for next hop direction ──
    const inp=_readInputDir();
    if(inp){ megaDash.pendingVx=inp.dx; megaDash.pendingVy=inp.dy; }
    // No input → keep current pending (set to random on transition)

    // Electric idle sparks during pause
    if(frameCount%4===0){
      for(let i=0;i<2;i++){
        const a=Math.random()*Math.PI*2;
        particles.push({x:player.x+(Math.random()-0.5)*10, y:player.y+(Math.random()-0.5)*10,
          vx:Math.cos(a)*1.5, vy:Math.sin(a)*1.5,
          life:12,maxLife:12,color:Math.random()<0.5?'#00eeff':'#ffffff',
          sz:2+Math.random()*3,type:'star'});
      }
    }

    if(megaDash.phaseTimer<=0){
      // Transition to hop: lock direction from pending
      megaDash.vx=megaDash.pendingVx; megaDash.vy=megaDash.pendingVy;
      if(megaDash.vx>0.1) player.dir=1; else if(megaDash.vx<-0.1) player.dir=-1;
      megaDash.phase='hop';
      megaDash.phaseTimer=megaDash.HOP_DUR;
      megaDash.hopStartX=player.x; megaDash.hopStartY=player.y;
      sfxMegaDashLoop();
      screenBlast(5);
    }

  } else {
    // ── HOP PHASE: blast forward at ultra speed, direction LOCKED ──
    const DASH_SPD=18; // ×2 of previous 9 — éclair speed
    player.x+=megaDash.vx*DASH_SPD;
    player.y+=megaDash.vy*DASH_SPD;
    player.x=Math.max(PITCH.x+player.w/2, Math.min(PITCH.x+PITCH.w-player.w/2, player.x));
    player.y=Math.max(PITCH.y+player.h/2, Math.min(PITCH.y+PITCH.h-player.h/2, player.y));

    // Kill zombies on contact during hop
    for(const z of zombies){
      if(z.dead) continue;
      const zdx=z.x-player.x, zdy=z.y-player.y;
      if(Math.sqrt(zdx*zdx+zdy*zdy)<z.w/2+player.w+10){
        z.hp=0; z.dead=true; z.deadAnim=38;
        score+=z.pts; totalKills++;
        if(killsByType[z.id]!==undefined) killsByType[z.id]++;
        const ka=Math.atan2(zdy,zdx);
        z.knockX=Math.cos(ka)*12; z.knockY=Math.sin(ka)*12; z.flyingCorpse=true;
        goreExplosion(z.x,z.y,Math.cos(ka),Math.sin(ka),z.skin||'#9e9e9e');
        scorePopup(z.x,z.y,z.pts);
      }
    }

    // Electric arc sparks during hop
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2;
      particles.push({x:player.x+(Math.random()-0.5)*10, y:player.y+(Math.random()-0.5)*10,
        vx:Math.cos(a)*(2+Math.random()*4), vy:Math.sin(a)*(2+Math.random()*4),
        life:8+Math.floor(Math.random()*8), maxLife:16,
        color:Math.random()<0.4?'#00eeff':Math.random()<0.5?'#ffffff':'#ffff88',
        sz:1+Math.random()*3, type:'star'});
    }
    // Electric arc bolt between two random points around player
    if(frameCount%2===0){
      const a1=Math.random()*Math.PI*2, a2=a1+Math.PI*(0.3+Math.random()*0.5);
      const r1=6+Math.random()*8;
      particles.push({
        x:player.x+Math.cos(a1)*r1, y:player.y+Math.sin(a1)*r1,
        vx:(Math.cos(a2)-Math.cos(a1))*0.3, vy:(Math.sin(a2)-Math.sin(a1))*0.3,
        life:5, maxLife:5,
        color:'#00eeff', sz:1.5, type:'star'});
    }

    if(megaDash.phaseTimer<=0){
      // End of hop: record laser segment from start → current pos
      megaDash.lasers.push({
        x1:megaDash.hopStartX, y1:megaDash.hopStartY,
        x2:player.x, y2:player.y,
        life:90, maxLife:90,  // ~1.5s fade
      });
      // Mini shockwave at landing spot
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2;
        particles.push({x:player.x,y:player.y,
          vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5,
          life:18,maxLife:18,color:i%2===0?'#00eeff':'#ffffff',sz:3+Math.random()*3,type:'star'});
      }
      // Transition to pause — pre-set pending to a NEW random direction
      // Player can override it during the pause window; if they don't, random fires
      megaDash.phase='pause';
      megaDash.phaseTimer=megaDash.PAUSE_DUR;
      const rnd=_randomDir();
      megaDash.pendingVx=rnd.dx; megaDash.pendingVy=rnd.dy;
    }
  }
}

// Re-check input once per frame during pause and override random if player steers
// (already handled inside pause block via _readInputDir — nothing extra needed)

function drawMegaDashTrail(){
  // Draw laser segments (hop trails)
  for(const l of megaDash.lasers){
    const alpha=l.life/l.maxLife;
    const lx1=sx(l.x1), ly1=sy(l.y1), lx2=sx(l.x2), ly2=sy(l.y2);
    const thick=(12+8*alpha)*ZOOM*0.4; // thick laser, fades

    ctx.save();
    ctx.globalAlpha=alpha;
    // Outer glow (wide, soft)
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=Math.round(32*alpha);
    ctx.strokeStyle=`rgba(0,200,255,${alpha*0.5})`;
    ctx.lineWidth=thick*2.5;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // Mid glow
    ctx.shadowBlur=Math.round(16*alpha);
    ctx.strokeStyle=`rgba(100,230,255,${alpha*0.8})`;
    ctx.lineWidth=thick;
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // Bright white core
    ctx.shadowBlur=6;
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
    ctx.lineWidth=Math.max(1, thick*0.35);
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
    // ── Electric branch sparks along the laser ──
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=10;
    ctx.strokeStyle=`rgba(0,238,255,${alpha*0.7})`;
    ctx.lineWidth=1;
    const segLen=Math.hypot(lx2-lx1,ly2-ly1);
    const nBranches=Math.floor(segLen/18);
    for(let bi=0;bi<nBranches;bi++){
      const t2=(bi+0.5)/nBranches;
      const bx=lx1+(lx2-lx1)*t2, by=ly1+(ly2-ly1)*t2;
      const perpA=Math.atan2(ly2-ly1,lx2-lx1)+Math.PI/2;
      const blen=(4+Math.random()*8)*alpha;
      const side=Math.random()<0.5?1:-1;
      const ex=bx+Math.cos(perpA)*blen*side+(Math.random()-0.5)*4;
      const ey=by+Math.sin(perpA)*blen*side+(Math.random()-0.5)*4;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex,ey); ctx.stroke();
    }
    ctx.restore();
  }

  // Energy ball + electricity around player while megaDash is active
  if(megaDash.active){
    const px=sx(player.x), py=sy(player.y);
    const pulse=0.8+0.2*Math.sin(frameCount*0.25);
    const r=Math.round((player.w*ZOOM*0.85)*pulse);
    ctx.save();
    // Outer soft glow
    ctx.globalAlpha=0.35+0.15*Math.sin(frameCount*0.18);
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=30;
    ctx.strokeStyle='#00cfff';
    ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(px,py,r*1.5,0,Math.PI*2); ctx.stroke();
    // Mid ring
    ctx.globalAlpha=0.6+0.2*Math.sin(frameCount*0.3);
    ctx.shadowBlur=18;
    ctx.strokeStyle='#00eeff';
    ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke();
    // Inner bright ring
    ctx.globalAlpha=0.9;
    ctx.shadowBlur=8;
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(px,py,r*0.6,0,Math.PI*2); ctx.stroke();
    // Rotating arc
    const rot=(frameCount*0.18)%(Math.PI*2);
    ctx.globalAlpha=0.7;
    ctx.strokeStyle='#00eeff';
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(px,py,r,rot,rot+Math.PI*1.1); ctx.stroke();
    ctx.beginPath(); ctx.arc(px,py,r,rot+Math.PI,rot+Math.PI*2.1); ctx.stroke();

    // ── Electric arc bolts jumping around the player ──
    ctx.globalAlpha=0.8;
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=14;
    ctx.strokeStyle='#00eeff'; ctx.lineWidth=1.2;
    for(let i=0;i<4;i++){
      const a1=(frameCount*0.15+i*Math.PI*0.5)%(Math.PI*2);
      const a2=a1+0.6+Math.random()*0.8;
      const r1=r*(0.7+Math.random()*0.5);
      const r2=r*(0.7+Math.random()*0.5);
      // Jagged bolt: 3 segments
      const x1=px+Math.cos(a1)*r1, y1=py+Math.sin(a1)*r1;
      const x2=px+Math.cos(a2)*r2, y2=py+Math.sin(a2)*r2;
      const mx2=(x1+x2)/2+(Math.random()-0.5)*12, my2=(y1+y2)/2+(Math.random()-0.5)*12;
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx2,my2); ctx.lineTo(x2,y2);
      ctx.stroke();
    }
    // Yellow lightning flashes
    ctx.globalAlpha=0.4;
    ctx.strokeStyle='#ffff88'; ctx.lineWidth=1; ctx.shadowColor='#ffff00'; ctx.shadowBlur=8;
    for(let i=0;i<2;i++){
      const a=Math.random()*Math.PI*2;
      const x1=px+Math.cos(a)*r*0.3, y1=py+Math.sin(a)*r*0.3;
      const x2=px+Math.cos(a+0.4+Math.random())*r*1.3, y2=py+Math.sin(a+0.4+Math.random())*r*1.3;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
  }
}

function drawMegaDashButton(){
  const show = !megaDash.active && !megaDash.lowHpUsed && player.hp<=20 && player.hp>0;
  megaDash.lowHpBtn = show;
  if(!show) return;

  const {x,y,w,h} = MEGA_BTN;
  const t = frameCount;
  const pulse = 0.82+0.18*Math.sin(t*0.15);
  const glowR  = 18+10*Math.abs(Math.sin(t*0.1));

  function rr(cx,cy,cw,ch,cr){
    ctx.beginPath();
    ctx.moveTo(cx+cr,cy);
    ctx.lineTo(cx+cw-cr,cy); ctx.arcTo(cx+cw,cy,cx+cw,cy+cr,cr);
    ctx.lineTo(cx+cw,cy+ch-cr); ctx.arcTo(cx+cw,cy+ch,cx+cw-cr,cy+ch,cr);
    ctx.lineTo(cx+cr,cy+ch); ctx.arcTo(cx,cy+ch,cx,cy+ch-cr,cr);
    ctx.lineTo(cx,cy+cr); ctx.arcTo(cx,cy,cx+cr,cy,cr);
    ctx.closePath();
  }

  ctx.save();

  // ── Strong outer glow halo ──
  ctx.shadowColor='#00eeff'; ctx.shadowBlur=glowR*2;
  ctx.globalAlpha=0.4*pulse;
  ctx.fillStyle='#00eeff';
  rr(x-6,y-6,w+12,h+12,14); ctx.fill();

  // ── Button background ──
  ctx.globalAlpha=0.96;
  ctx.shadowBlur=glowR;
  ctx.fillStyle='#001a2e';
  rr(x,y,w,h,12); ctx.fill();

  // ── Pulsing border (double border for emphasis) ──
  ctx.globalAlpha=pulse;
  ctx.strokeStyle='#00eeff'; ctx.lineWidth=3.5;
  ctx.shadowColor='#00eeff'; ctx.shadowBlur=glowR;
  rr(x,y,w,h,12); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
  ctx.shadowBlur=0;
  rr(x+4,y+4,w-8,h-8,9); ctx.stroke();

  // ── Main label — BOLD, twice bigger ──
  ctx.globalAlpha=1;
  ctx.shadowColor='#00eeff'; ctx.shadowBlur=20;
  ctx.fillStyle='#00eeff';
  ctx.font='bold 22px Courier New';
  ctx.textAlign='center';
  ctx.fillText('⚡ MEGA POWER ⚡', x+w/2, y+h/2+2);

  // ── Sub label ──
  ctx.fillStyle='#ffffff';
  ctx.font='bold 11px Courier New';
  ctx.shadowBlur=8;
  ctx.fillText('TAP TO ACTIVATE', x+w/2, y+h/2+17);

  // ── Animated bouncing arrow above button ──
  const arrowBounce = 6*Math.abs(Math.sin(t*0.18)); // bounces up/down
  const arrowY = y - 16 - arrowBounce;
  const arrowCX = x+w/2;

  ctx.shadowColor='#00eeff'; ctx.shadowBlur=22;
  ctx.globalAlpha=0.9+0.1*Math.sin(t*0.2);
  // Arrow shaft
  ctx.fillStyle='#00eeff';
  ctx.fillRect(arrowCX-3, arrowY-2, 6, 14);
  // Arrow head (pointing down toward button)
  ctx.beginPath();
  ctx.moveTo(arrowCX-12, arrowY+10);
  ctx.lineTo(arrowCX+12, arrowY+10);
  ctx.lineTo(arrowCX, arrowY+24);
  ctx.closePath();
  ctx.fill();
  // White core highlight on arrow
  ctx.fillStyle='#ffffff';
  ctx.globalAlpha=0.6;
  ctx.fillRect(arrowCX-1, arrowY-2, 2, 12);

  ctx.restore();
}

// ── FIRE ZOMBIE: set a zombie on fire ──
function makeFireParticle(z){
  // Each fire particle: a big pixel block that floats up slowly with wobble
  const col=Math.random()<0.55?'#ff6d00':Math.random()<0.6?'#ffeb3b':'#ff3d00';
  return {
    ox: (Math.random()-0.5)*(z.w*0.9),   // offset from zombie center X
    oy: (Math.random())*(z.h*0.5)+(z.h*0.1), // offset Y (body height)
    vx: (Math.random()-0.5)*0.22,          // slow horizontal drift
    vy: -(0.28+Math.random()*0.32),        // slow upward rise
    life: 30+Math.floor(Math.random()*50), // long life for slow anim
    maxLife: 80,
    sz: 5+Math.floor(Math.random()*5),     // large pixel block 5–9px
    col,
    phase: Math.random()*Math.PI*2,        // wobble phase
    isSpark: Math.random()<0.18,           // 18% are sparks (smaller, faster, chaotic)
  };
}

function igniteZombie(z){
  if(z.dead||z.onFire) return;
  z.onFire=true;
  z.fireTimer=180;      // 3s on fire before ash
  z.fireFrozen=true;    // zombie freezes — can't move while burning
  z.vx=0; z.vy=0;
  z.knockX=0; z.knockY=0;
  z.fireParticles=[];
  for(let i=0;i<12;i++) z.fireParticles.push(makeFireParticle(z));
}

// ── SHOTGUN FIRE in a direction ──
function fireShotgun(){
  // Always aim toward nearest visible zombie, fallback to player direction
  const t=nearestVisible();
  let dirX=player.dir, dirY=0;
  if(t){ const dx=t.x-player.x,dy=t.y-player.y,d=Math.sqrt(dx*dx+dy*dy)||1; dirX=dx/d; dirY=dy/d; }
  const baseAng=Math.atan2(dirY,dirX);

  // Store aim for drawing
  fx.shotgun.aimX=dirX; fx.shotgun.aimY=dirY;
  fx.shotgun.muzzleFlash=14;

  SFX.shotgunFire(); screenBlast(8);

  // Kill all zombies in narrow beam to screen edge (±15°)
  for(const z of zombies){
    if(z.dead||z.emerging>0) continue;
    const dx=z.x-player.x, dy=z.y-player.y;
    const ang=Math.atan2(dy,dx);
    let diff=ang-baseAng;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<Math.PI*0.08){
      z.hp=0; z.dead=true; z.deadAnim=38;
      score+=z.pts; totalKills++;
      if(killsByType[z.id]!==undefined) killsByType[z.id]++;
      z.knockX=dirX*9; z.knockY=dirY*9;
      z.flyingCorpse=true;
      goreExplosion(z.x,z.y,dirX,dirY,z.body);
      scorePopup(z.x,z.y,z.pts);
    }
  }
  // Beam flash particles
  for(let i=0;i<18;i++){
    const dist=30+i*24, spread=(Math.random()-0.5)*0.12;
    const a=baseAng+spread;
    particles.push({x:player.x+Math.cos(baseAng)*dist,y:player.y+Math.sin(baseAng)*dist,
      vx:Math.cos(a)*2,vy:Math.sin(a)*2,
      life:12,maxLife:12,color:i%2===0?'#ffeb3b':'#fffde7',sz:4+Math.random()*5,type:'star'});
  }

  // Start reload immediately after shot (20f = ~0.33s)
  fx.shotgun.reloading=20;
}

// ── THUNDER STRIKE ──
function spawnThunder(){
  SFX.thunderStrike(); screenBlast(12);
  const visible=zombies.filter(z=>!z.dead&&z.emerging===0&&sx(z.x)>60&&sx(z.x)<VW-60&&sy(z.y)>60&&sy(z.y)<VH-60);
  let landX, landY;
  if(visible.length>0 && Math.random()<0.75){
    const target=visible[Math.floor(Math.random()*visible.length)];
    landX=target.x+(Math.random()-0.5)*60; landY=target.y+(Math.random()-0.5)*40;
  } else {
    landX=cam.x+(Math.random()-0.5)*(VW/ZOOM*0.7);
    landY=cam.y+(Math.random()-0.5)*(VH/ZOOM*0.7);
  }
  landX=Math.max(PITCH.x+20,Math.min(PITCH.x+PITCH.w-20,landX));
  landY=Math.max(PITCH.y+20,Math.min(PITCH.y+PITCH.h-20,landY));
  const worldTop=cam.y-(VH/2)/ZOOM-80;
  // Bolt travels for 20 frames then hits ground — damage deferred to impact
  thunderbolts.push({ x:landX, yStart:worldTop, yEnd:landY, life:60, maxLife:60,
    landX, landY, impactDone:false });
}

// Called when bolt reaches ground — explode zombies in radius
function thunderImpact(landX, landY){
  screenBlast(14);
  let killed=0;
  for(const z of zombies){
    if(z.dead||killed>=6) continue;
    if(Math.hypot(z.x-landX,z.y-landY)<90){
      z.hp=0; z.dead=true; z.deadAnim=38;
      score+=z.pts; totalKills++;
      if(killsByType[z.id]!==undefined) killsByType[z.id]++;
      const a=Math.atan2(z.y-landY,z.x-landX);
      z.knockX=Math.cos(a)*5; z.knockY=Math.sin(a)*5; z.flyingCorpse=true;
      goreExplosion(z.x,z.y,Math.cos(a),Math.sin(a),z.body);
      scorePopup(z.x,z.y,z.pts);
      particles.push({x:z.x+(Math.random()-0.5)*20,y:z.y+(Math.random()-0.5)*20,
        vx:0,vy:0,life:720,maxLife:720,color:Math.random()<0.5?'#1a237e':'#212121',
        sz:18+Math.random()*14,type:'puddle',gravity:0});
      killed++;
    }
  }
  // Burn marks
  for(let i=0;i<6;i++) particles.push({x:landX+(Math.random()-0.5)*30,y:landY+(Math.random()-0.5)*20,
    vx:0,vy:0,life:600,maxLife:600,color:i%2===0?'#0d47a1':'#212121',
    sz:14+Math.random()*10,type:'puddle',gravity:0});
}

// ══════════════════════════════════════
// UPDATE
// ══════════════════════════════════════
function update(){
  frameCount++;
  if(cam.shake>0) cam.shake *= 0.8;

  // ── Powerup unlock at wave 2 ──
  if(!powerupsUnlocked && wave >= 2){
    powerupsUnlocked = true;
    // Spawn 3 powerups simultaneously right away
    spawnPowerup(); spawnPowerup(); spawnPowerup();
    // Prime the extra-spawn timer
    powerupExtraInterval = Math.round((4*60) + Math.random()*2*60); // 4–6s in frames
    powerupExtraTimer = 0;
  }

  // ── Ongoing random powerup every ~5s (±1s) from wave 2 onward ──
  if(powerupsUnlocked){
    powerupExtraTimer++;
    if(powerupExtraTimer >= powerupExtraInterval){
      powerupExtraTimer = 0;
      powerupExtraInterval = Math.round((4*60) + Math.random()*2*60); // re-randomise
      spawnPowerup();
    }
  }

  // ── Powerup lifetime + pickup check ──
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];
    pu.life--;
    if(pu.life<=0){ powerups.splice(i,1); continue; }
    // Pickup: player touches square (world coords, 22px half-size)
    const dx=player.x-pu.x, dy=player.y-pu.y;
    if(Math.abs(dx)<22 && Math.abs(dy)<22){ activatePowerup(pu.def); powerups.splice(i,1); }
  }

  // ── Active effect timers ──
  for(const k in fx){
    if(fx[k].active){ fx[k].timer--; if(fx[k].timer<=0){ fx[k].active=false;
      if(k==='fireBall'){ _ballFirePx=[]; fireTrails=[]; }
      if(k==='shotgun'){ fx.shotgun.reloading=0; fx.shotgun.shots=3; fx.shotgun.muzzleFlash=0; }
    }}
  }
  // ── Ricochet timer (30s) ──
  if(ricochetCount>0 && ricochetTimer>0){
    ricochetTimer--;
    if(ricochetTimer<=0){ ricochetCount=0; ricochetTimer=0; }
  }
  // ── Orbit balls timer (20s) ──
  if(orbitBalls.length>0 && orbitBallsTimer>0){
    orbitBallsTimer--;
    if(orbitBallsTimer<=0){ orbitBalls=[]; orbitBallsTimer=0; }
  }

  // ── Thunder periodic strikes ──
  if(fx.thunder.active && frameCount>=fx.thunder.nextStrike){ spawnThunder(); fx.thunder.nextStrike=frameCount+70; }

  // ── Thunderbolt lifetime + impact trigger ──
  for(let i=thunderbolts.length-1;i>=0;i--){
    const tb=thunderbolts[i];
    tb.life--;
    // Impact fires exactly when bolt tip reaches yEnd (at travelFrames=20 age)
    const age=tb.maxLife-tb.life;
    if(!tb.impactDone && age>=20){ tb.impactDone=true; thunderImpact(tb.landX,tb.landY); }
    if(tb.life<=0) thunderbolts.splice(i,1);
  }

  // ── Wave break: block spawning for 2s on new wave ──
  if(waveBreakTimer>0){ waveBreakTimer--; }

  // ── Shotgun auto-fire ──
  if(fx.shotgun.active){
    if(fx.shotgun.muzzleFlash>0) fx.shotgun.muzzleFlash--;
    if(fx.shotgun.reloading>0){
      fx.shotgun.reloading--;
      // Halfway through reload: play clack sound once
      if(fx.shotgun.reloading===10) SFX.shotgunReload();
      if(fx.shotgun.reloading<=0){ fx.shotgun.reloading=0; fireShotgun(); } // fire immediately after reload
    }
  }

  // ── Zombie fire tick ──
  for(const z of zombies){
    if(!z.onFire||z.dead) continue;
    z.fireTimer--;

    // Frozen while on fire — override velocity to zero
    if(z.fireFrozen){ z.vx=0; z.vy=0; z.knockX=0; z.knockY=0; }

    // Update fire particles (slow simulation, runs every frame but moves slowly)
    if(!z.fireParticles) z.fireParticles=[];
    for(let i=z.fireParticles.length-1;i>=0;i--){
      const fp=z.fireParticles[i];
      fp.life--;
      if(fp.life<=0){ z.fireParticles.splice(i,1); continue; }
      // Slow wobble + rise
      fp.phase+=0.055;
      fp.ox += fp.vx + Math.sin(fp.phase)*0.18;
      fp.oy -= fp.isSpark ? 0.55+Math.random()*0.4 : (fp.vy*-1); // sparks rise faster
      if(fp.isSpark) fp.ox += (Math.random()-0.5)*0.9; // chaotic spark horizontal
    }
    // Replenish particles to maintain ~12 active
    const needed = Math.max(0, 12 - z.fireParticles.length);
    for(let i=0;i<needed;i++) z.fireParticles.push(makeFireParticle(z));

    // Spread fire to nearby zombies (freeze them too)
    if(frameCount%25===0){
      for(const z2 of zombies){
        if(z2===z||z2.dead||z2.onFire) continue;
        const dx=z2.x-z.x,dy=z2.y-z.y;
        if(Math.sqrt(dx*dx+dy*dy)<z.w+z2.w+10) igniteZombie(z2);
      }
    }

    if(z.fireTimer<=0){
      z.onFire=false; z.fireFrozen=false; z.fireParticles=[];
      // Zombie bursts apart — gore explosion + ash overlay
      z.hp=0; z.dead=true; z.deadAnim=38;
      score+=z.pts; totalKills++;

                .sort((a2,b2)=>Math.hypot(a2.x-z.x,a2.y-z.y)-Math.hypot(b2.x-z.x,b2.y-z.y))[0];

    // ── Speed phases: 5 phases based on totalKills, hard cap at phase 5 ──
    // Phase thresholds (kills needed to reach each phase)

    const killPhaseBoost = totalKills>=180 ? 2.0
